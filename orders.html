<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>受注一覧 | MeguRee</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f3ee;--surface:#fff;--border:#e2d9ce;
  --orange:#e8630a;--orange-light:#f97316;--orange-pale:#fff4ec;
  --green:#1e6641;--green-pale:#e8f5ee;
  --yellow:#d97706;--yellow-pale:#fffbeb;
  --text:#1a1208;--text-muted:#7a6a55;
  --sidebar-bg:#1a1208;--sidebar-text:#e8d5bc;
}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex}
.sidebar{width:240px;min-height:100vh;background:var(--sidebar-bg);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100}
.sidebar-logo{padding:20px 24px;border-bottom:1px solid rgba(255,255,255,0.08)}
.sidebar-logo img{width:140px;margin-bottom:4px;display:block}
.sidebar-logo-sub{font-size:10px;color:rgba(232,213,188,0.4);letter-spacing:2px;text-transform:uppercase}
.sidebar-nav{padding:16px 12px;flex:1}
.nav-label{font-size:10px;color:rgba(232,213,188,0.3);letter-spacing:2px;text-transform:uppercase;padding:0 12px;margin-bottom:8px;margin-top:16px}
.nav-label:first-child{margin-top:0}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;color:var(--sidebar-text);font-size:13px;font-weight:500;transition:all 0.2s;text-decoration:none;margin-bottom:2px}
.nav-item:hover{background:rgba(255,255,255,0.06)}
.nav-item.active{background:var(--orange);color:#fff}
.nav-item .icon{font-size:16px;width:20px;text-align:center}
.main{margin-left:240px;flex:1;min-height:100vh;display:flex;flex-direction:column}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.page-title{font-size:18px;font-weight:700}
.page-sub{font-size:12px;color:var(--text-muted);margin-top:2px}
.content{padding:28px 32px;flex:1}
.card{background:var(--surface);border-radius:16px;border:1px solid var(--border);overflow:hidden}
.filter-tabs{display:flex;gap:8px;padding:14px 20px;border-bottom:1px solid var(--border);align-items:center}
.search-box{display:flex;align-items:center;gap:8px;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:7px 14px}
.search-box input{border:none;background:none;outline:none;font-size:13px;font-family:'Noto Sans JP',sans-serif;color:var(--text);width:200px}
.search-box input::placeholder{color:var(--text-muted)}
.search-box:focus-within{border-color:var(--orange)}
.tab{padding:6px 14px;border-radius:100px;font-size:12px;font-weight:500;border:1px solid var(--border);background:var(--surface);cursor:pointer;transition:all 0.2s;font-family:'Noto Sans JP',sans-serif;color:var(--text-muted)}
.tab.active{background:var(--orange);border-color:var(--orange);color:#fff;font-weight:600}
.tab:hover:not(.active){border-color:var(--orange);color:var(--orange)}
.table-wrapper{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead tr{background:var(--bg);border-bottom:1px solid var(--border)}
th{padding:10px 14px;text-align:left;font-size:11px;font-weight:700;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase;white-space:nowrap}
tbody tr{border-bottom:1px solid var(--border);transition:background 0.15s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--bg)}
td{padding:13px 14px;font-size:13px;vertical-align:middle;white-space:nowrap}
.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge::before{content:'';width:6px;height:6px;border-radius:50%;flex-shrink:0}
.badge-new{background:var(--orange-pale);color:var(--orange);border:1px solid rgba(232,99,10,0.2)}
.badge-new::before{background:var(--orange)}
.badge-processing{background:var(--yellow-pale);color:var(--yellow);border:1px solid rgba(217,119,6,0.2)}
.badge-processing::before{background:var(--yellow)}
.badge-shipped{background:var(--green-pale);color:var(--green);border:1px solid rgba(30,102,65,0.2)}
.badge-shipped::before{background:var(--green)}
.status-sel{border-radius:20px;font-size:11px;font-weight:600;padding:4px 10px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;outline:none;-webkit-appearance:none;appearance:none;transition:box-shadow 0.2s}
.status-sel.s-new{background:var(--orange-pale);color:var(--orange);border:1px solid rgba(232,99,10,0.2)}
.status-sel.s-processing{background:var(--yellow-pale);color:var(--yellow);border:1px solid rgba(217,119,6,0.2)}
.status-sel.s-shipped{background:var(--green-pale);color:var(--green);border:1px solid rgba(30,102,65,0.2)}
.status-sel.saved{box-shadow:0 0 0 2px var(--green)}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.kpi-card{background:var(--surface);border-radius:16px;border:1px solid var(--border);padding:20px;position:relative;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,0.06);transition:box-shadow 0.2s}
.kpi-card:hover{box-shadow:0 8px 28px rgba(0,0,0,0.1)}
.kpi-card::before{content:'';position:absolute;top:0;right:0;width:80px;height:80px;border-radius:0 16px 0 80px;opacity:.08;background:var(--orange)}
.kpi-card.green::before{background:var(--green)}
.kpi-card.yellow::before{background:var(--yellow)}
.kpi-card.blue::before{background:#3b82f6}
.kpi-label{font-size:11px;color:var(--text-muted);font-weight:600;margin-bottom:6px;letter-spacing:0.5px;text-transform:uppercase}
.kpi-value{font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;color:var(--text);line-height:1.2}
.kpi-value.warn{color:var(--orange)}
.kpi-value.green{color:var(--green)}
.kpi-sub{font-size:12px;color:var(--text-muted);margin-top:4px}
.topbar-user{display:flex;align-items:center;gap:10px}
.topbar-user-name{font-size:13px;font-weight:600;color:var(--text)}
.topbar-user-role{font-size:11px;color:var(--text-muted)}
.topbar-avatar{width:34px;height:34px;border-radius:10px;background:var(--orange);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}
.num-right{text-align:right}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:10px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:all 0.2s;font-family:'Noto Sans JP',sans-serif}
.btn:hover{opacity:0.85}
.btn-primary{background:var(--orange);color:#fff}
.btn-outline{background:var(--surface);border:1.5px solid var(--orange);color:var(--orange)}
.btn-sm{padding:5px 12px;font-size:12px;border-radius:8px}
/* モーダル */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;align-items:flex-start;justify-content:center;padding-top:40px;overflow-y:auto;backdrop-filter:blur(4px)}
.overlay.open{display:flex}
.modal{background:var(--surface);border-radius:20px;width:860px;max-width:95vw;margin-bottom:40px;overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,0.18)}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:22px 28px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface)}
.modal-title{font-size:17px;font-weight:700}
.modal-close{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:none;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:background 0.2s}
.modal-close:hover{background:var(--bg)}
.modal-body{padding:24px 28px}
.info-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.info-item label{font-size:11px;color:var(--text-muted);margin-bottom:4px;display:block;font-weight:600;letter-spacing:0.5px;text-transform:uppercase}
.info-item span{font-size:14px;font-weight:600}
.items-section-title{font-size:12px;font-weight:700;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px}
.badge-food{background:var(--green-pale);color:var(--green);border:1px solid rgba(30,102,65,0.3);font-size:11px;padding:2px 7px;border-radius:4px;display:inline-block}
.badge-regular{background:var(--bg);color:var(--text-muted);border:1px solid var(--border);font-size:11px;padding:2px 7px;border-radius:4px;display:inline-block}
.modal-footer{padding:16px 28px;border-top:2px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:var(--bg)}
.totals{display:flex;gap:24px;font-size:13px}
.totals-item{text-align:right}
.totals-item label{display:block;font-size:11px;color:var(--text-muted);margin-bottom:2px;text-transform:uppercase;letter-spacing:0.5px}
.totals-item span{font-weight:700;font-size:15px;font-family:'Space Grotesk',sans-serif}
.totals-item span.highlight{color:var(--orange)}
.totals-item span.green{color:var(--green)}
.modal-btns{display:flex;gap:8px}
/* 新規受注入力モーダル */
.form-row2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.form-group2{display:flex;flex-direction:column;gap:5px}
.form-label2{font-size:11px;font-weight:700;color:var(--text-muted);letter-spacing:0.5px;text-transform:uppercase}
.form-input2{padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:'Noto Sans JP',sans-serif;color:var(--text);background:var(--bg);outline:none;transition:border-color 0.2s}
.form-input2:focus{border-color:var(--orange);background:#fff}
.add-item-row{display:grid;grid-template-columns:1fr 80px auto;gap:10px;align-items:flex-end;margin-bottom:14px}
.entry-items-table{width:100%;border-collapse:collapse;margin-top:8px}
.entry-items-table th{font-size:11px;font-weight:700;color:var(--text-muted);padding:7px 10px;background:var(--bg);border-bottom:1px solid var(--border);text-align:left;text-transform:uppercase;letter-spacing:0.5px}
.entry-items-table td{padding:9px 10px;font-size:13px;border-bottom:1px solid var(--border)}
.entry-items-table tr:last-child td{border-bottom:none}
.entry-total{text-align:right;padding:12px 0 4px;font-size:15px;font-weight:700}
.btn-danger-sm{background:none;border:none;color:#dc2626;cursor:pointer;font-size:16px;padding:2px 6px}
.entry-error{color:#dc2626;font-size:12px;margin-top:4px;display:none}
.entry-error.show{display:block}

.sidebar-footer{padding:12px 12px 16px;border-top:1px solid rgba(255,255,255,0.08);margin-top:auto}
.logout-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;color:rgba(232,213,188,0.5);font-size:13px;font-weight:500;transition:all 0.2s;text-decoration:none}
.logout-item:hover{background:rgba(255,69,0,0.15);color:#ff9a7a}
</style>

<script>

  checkAuth();
  const SB_URL = 'https://vrnayxmwcbxblfokveok.supabase.co';

  const BADGE      = {'新規受注':'badge-new','処理中':'badge-processing','出荷済み':'badge-shipped'};

    nameEl.textContent = userName;
    roleEl.textContent = userRole === 'admin' ? '管理者' : 'スタッフ';
    avatarEl.textContent = userName.charAt(0);
  }

  function sbFetch(path, options = {}) {
    return fetch(SB_URL + path, {
      ...options,
      headers: {
        'apikey': SB_KEY,
        'Authorization': 'Bearer ' + getAccessToken(),
        'Content-Type': 'application/json',
        ...(options.headers || {})
      }
    });
  }

  let allOrders = [];
  let currentFilter = 'all';
  let currentSearch = '';

  function esc(s) {
    if (s == null) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* 受注一覧：orders + customers(名前) + order_items(金額計算用) */
  async function loadOrders() {
    document.getElementById('ordersTbody').innerHTML =
      '<tr><td colspan="9" style="text-align:center;padding:20px;color:var(--text-muted)">読み込み中...</td></tr>';
    try {
      const res = await sbFetch(
        `/rest/v1/orders?tenant_id=eq.${tenantId}&select=id,order_code,order_date,status,customers(company_name),order_items(quantity,unit_price,cost_price,products(is_food))&order=order_date.desc`
      );
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      allOrders = data.map(r => {
        const items = r.order_items || [];
        const excl  = items.reduce((s, i) => s + (i.quantity * i.unit_price), 0);
        const tax   = items.reduce((s, i) => {
          const rate = i.products?.is_food ? 0.08 : 0.10;
          return s + Math.round(i.quantity * i.unit_price * rate);
        }, 0);
        const cost  = items.reduce((s, i) => s + (i.quantity * (i.cost_price || 0)), 0);
        return {
          id:       r.id,
          code:     r.order_code || r.id.slice(0,8),
          customer: r.customers?.company_name || '',
          date:     r.order_date || '',
          status:   r.status || '',
          excl,
          tax,
          incl: excl + tax,
          cost,
        };
      });
      renderOrders();
      updateKPIs();
    } catch(e) {
      console.error('受注データ取得失敗:', e);
      document.getElementById('ordersTbody').innerHTML =
        '<tr><td colspan="9" style="text-align:center;padding:20px;color:var(--text-muted)">データ取得に失敗しました</td></tr>';
    }
  }

  function updateKPIs() {
    const today = new Date().toISOString().slice(0, 10);
    const thisMonth = today.slice(0, 7);
    const pending = allOrders.filter(o => o.status === '新規受注' || o.status === '処理中').length;
    const todayCount = allOrders.filter(o => o.date === today).length;
    const monthly = allOrders.filter(o => o.date && o.date.startsWith(thisMonth)).reduce((s, o) => s + o.excl, 0);
    document.getElementById('kpiPending').textContent = pending;
    document.getElementById('kpiToday').textContent = todayCount;
    document.getElementById('kpiMonthly').textContent = '¥' + monthly.toLocaleString();
    document.getElementById('kpiTotal').textContent = allOrders.length;
  }

  function onSearchInput(val) {
    currentSearch = val.trim();
    renderOrders();
  }

  function renderOrders() {
    const tbody = document.getElementById('ordersTbody');
    let list = currentFilter === 'all' ? allOrders : allOrders.filter(o => o.status === currentFilter);
    if (currentSearch) {
      const q = currentSearch.toLowerCase();
      list = list.filter(o => o.customer.toLowerCase().includes(q) || o.code.toLowerCase().includes(q));
    }
    if (list.length === 0) {
      tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;padding:20px;color:var(--text-muted)">受注データがありません</td></tr>';
      return;
    }
    tbody.innerHTML = list.map(o => {
      const profit = o.excl - o.cost;
      return `<tr>
        <td><button onclick="openDetail('${esc(o.id)}')" style="background:none;border:none;padding:0;cursor:pointer;font-family:'Space Grotesk',sans-serif;color:var(--orange);font-size:12px;font-weight:600;text-decoration:underline;text-underline-offset:2px">${esc(o.code)}</button></td>
        <td style="font-weight:500">${esc(o.customer)}</td>
        <td style="color:var(--text-muted);font-size:12px">${esc(o.date)}</td>
        <td><select class="status-sel ${STATUS_CLS[o.status]||''}" onchange="patchStatus('${esc(o.id)}',this)">${STATUSES.map(s=>`<option value="${s}"${o.status===s?' selected':''}>${s}</option>`).join('')}</select></td>
        <td class="num-right" style="font-family:'Space Grotesk',sans-serif">¥${o.excl.toLocaleString()}</td>
        <td class="num-right" style="color:var(--text-muted);font-family:'Space Grotesk',sans-serif">¥${o.tax.toLocaleString()}</td>
        <td class="num-right" style="font-weight:700;font-family:'Space Grotesk',sans-serif">¥${o.incl.toLocaleString()}</td>
        <td class="num-right" style="color:var(--green);font-weight:600;font-family:'Space Grotesk',sans-serif">¥${profit.toLocaleString()}</td>
        <td><button class="btn btn-outline btn-sm" onclick="openDetail('${esc(o.id)}')">詳細 →</button></td>
      </tr>`;
    }).join('');
  }

  async function patchStatus(orderId, sel) {
    const newStatus = sel.value;
    const prevStatus = sel.dataset.prev || newStatus;
    sel.dataset.prev = newStatus;
    sel.className = 'status-sel ' + (STATUS_CLS[newStatus] || '');
    try {
      const res = await sbFetch(`/rest/v1/orders?id=eq.${orderId}`, {
        method: 'PATCH',
        headers: { 'Prefer': 'return=minimal' },
        body: JSON.stringify({ status: newStatus })
      });
      if (!res.ok) throw new Error('PATCH failed');
      const order = allOrders.find(o => o.id === orderId);
      if (order) order.status = newStatus;
      updateKPIs();
      sel.classList.add('saved');
      setTimeout(() => sel.classList.remove('saved'), 1000);
    } catch(e) {
      console.error(e);
      sel.value = prevStatus;
      sel.dataset.prev = prevStatus;
      sel.className = 'status-sel ' + (STATUS_CLS[prevStatus] || '');
      alert('ステータスの更新に失敗しました');
    }
  }

  let currentDetailId = null;
  function openDetail(orderId) {
    currentDetailId = orderId;
    const o = allOrders.find(x => x.id === orderId);
    if (!o) return;
    document.getElementById('modalTitle').textContent = `受注詳細 — ${o.code}`;
    document.getElementById('modalInfo').innerHTML = [
      {label:'受注ID',    val:`<span style="font-family:'Space Grotesk',sans-serif;color:var(--orange)">${esc(o.code)}</span>`},
      {label:'取引先名',  val:esc(o.customer)},
      {label:'受注日',    val:esc(o.date)},
      {label:'ステータス',val:`<span class="badge ${BADGE[o.status]||''}">${esc(o.status)}</span>`},
    ].map(x=>`<div class="info-item"><label>${x.label}</label><span>${x.val}</span></div>`).join('');
    document.getElementById('modalItems').innerHTML =
      `<thead><tr><th>商品コード</th><th>商品名</th><th class="num-right">数量</th><th class="num-right">単価</th><th class="num-right">小計</th><th>税率</th></tr></thead>
      <tbody><tr><td colspan="6" style="text-align:center;padding:20px;color:var(--text-muted)">読み込み中...</td></tr></tbody>`;
    document.getElementById('detailStatusSelect').value = o.status;
    document.getElementById('detailStatusMsg').style.display = 'none';
    document.getElementById('detailOverlay').classList.add('open');
    loadOrderDetail(orderId);
  }

  async function updateOrderStatus() {
    const newStatus = document.getElementById('detailStatusSelect').value;
    const btn = document.getElementById('detailStatusBtn');
    const msg = document.getElementById('detailStatusMsg');
    btn.disabled = true;
    btn.textContent = '保存中...';
    msg.style.display = 'none';
    try {
      const res = await sbFetch(`/rest/v1/orders?id=eq.${currentDetailId}`, {
        method: 'PATCH',
        headers: { 'Prefer': 'return=minimal' },
        body: JSON.stringify({ status: newStatus })
      });
      if (!res.ok) throw new Error('PATCH failed: ' + res.status);
      const order = allOrders.find(o => o.id === currentDetailId);
      if (order) order.status = newStatus;
      renderOrders();
      updateKPIs();
      msg.style.display = 'inline';
      setTimeout(() => { msg.style.display = 'none'; }, 2500);
    } catch(e) {
      console.error('ステータス更新失敗:', e);
      alert('ステータスの更新に失敗しました。もう一度お試しください。');
    } finally {
      btn.disabled = false;
      btn.textContent = '保存';
    }
  }

  async function loadOrderDetail(orderId) {
    const o = allOrders.find(x => x.id === orderId);
    if (!o) return;
    try {
      const res = await sbFetch(
        `/rest/v1/order_items?select=quantity,unit_price,products(product_code,product_name,is_food)&order_id=eq.${orderId}`
      );
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const items = await res.json();

      let excl = 0, tax = 0;
      const rows = items.map(it => {
        const qty     = it.quantity || 0;
        const price   = it.unit_price || 0;
        const isFood  = it.products?.is_food || false;
        const taxRate = isFood ? 0.08 : 0.10;
        const sub     = qty * price;
        excl  += sub;
        tax   += Math.round(sub * taxRate);
        return `<tr>
          <td style="font-size:12px;color:var(--text-muted)">${esc(it.products?.product_code || '—')}</td>
          <td style="font-weight:500;white-space:normal">${esc(it.products?.product_name || '—')}</td>
          <td class="num-right">${qty}</td>
          <td class="num-right">¥${price.toLocaleString()}</td>
          <td class="num-right" style="font-weight:600">¥${sub.toLocaleString()}</td>
          <td><span class="${isFood?'badge-food':'badge-regular'}">${isFood?'軽減8%':'標準10%'}</span></td>
        </tr>`;
      }).join('');

      const incl = excl + tax;
      document.getElementById('modalItems').innerHTML =
        `<thead><tr><th>商品コード</th><th>商品名</th><th class="num-right">数量</th><th class="num-right">単価</th><th class="num-right">小計</th><th>税率</th></tr></thead>
        <tbody>${rows || '<tr><td colspan="6" style="text-align:center;padding:20px;color:var(--text-muted)">明細データなし</td></tr>'}</tbody>`;
      document.getElementById('modalTotals').innerHTML = `
        <div class="totals-item"><label>税抜合計</label><span>¥${excl.toLocaleString()}</span></div>
        <div class="totals-item"><label>消費税</label><span style="color:var(--text-muted)">¥${tax.toLocaleString()}</span></div>
        <div class="totals-item"><label>税込合計</label><span class="highlight">¥${incl.toLocaleString()}</span></div>`;
    } catch(e) {
      console.error('注文明細取得失敗:', e);
      document.getElementById('modalItems').innerHTML =
        `<thead><tr><th>商品名</th><th>数量</th><th>単価</th><th>小計</th></tr></thead>
        <tbody><tr><td colspan="4" style="text-align:center;padding:20px;color:var(--text-muted)">明細データの取得に失敗しました</td></tr></tbody>`;
    }
  }

  function closeDetail() { document.getElementById('detailOverlay').classList.remove('open'); }

  async function deleteOrder() {
    const o = allOrders.find(x => x.id === currentDetailId);
    if (!o) return;
    if (!confirm(`受注「${o.code}」を削除しますか？\nこの操作は取り消せません。`)) return;
    try {
      const r1 = await sbFetch(`/rest/v1/order_items?order_id=eq.${currentDetailId}`, { method: 'DELETE', headers: { 'Prefer': 'return=minimal' } });
      if (!r1.ok) throw new Error('明細削除失敗');
      const r2 = await sbFetch(`/rest/v1/orders?id=eq.${currentDetailId}`, { method: 'DELETE', headers: { 'Prefer': 'return=minimal' } });
      if (!r2.ok) throw new Error('受注削除失敗');
      allOrders = allOrders.filter(x => x.id !== currentDetailId);
      closeDetail();
      renderOrders();
      updateKPIs();
    } catch(e) {
      console.error(e);
      alert('削除に失敗しました。もう一度お試しください。');
    }
  }

  document.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      currentFilter = t.dataset.filter;
      renderOrders();
    });
  });

  // ===== 新規受注入力 =====
  let newOrderItems = [];
  let allCustomers = [];
  let allProducts = [];
  let allPricing = [];

  async function openNewOrderModal() {
    newOrderItems = [];
    document.getElementById('newOrderDate').value = new Date().toISOString().slice(0, 10);
    document.getElementById('newOrderStatus').value = '新規受注';
    document.getElementById('newOrderCustomer').value = '';
    document.getElementById('newItemProduct').value = '';
    document.getElementById('newItemQty').value = '1';
    document.getElementById('itemError').classList.remove('show');
    document.getElementById('orderError').classList.remove('show');
    renderNewItems();
    document.getElementById('newOrderOverlay').classList.add('open');
    await Promise.all([loadCustomersForEntry(), loadProductsForEntry()]);
  }

  function closeNewOrder() {
    document.getElementById('newOrderOverlay').classList.remove('open');
  }

  async function loadCustomersForEntry() {
    if (allCustomers.length) return;
    const res = await sbFetch(`/rest/v1/customers?tenant_id=eq.${tenantId}&select=id,company_name&order=company_name`);
    allCustomers = await res.json();
    const sel = document.getElementById('newOrderCustomer');
    sel.innerHTML = '<option value="">選択してください</option>' +
      allCustomers.map(c => `<option value="${esc(c.id)}">${esc(c.company_name)}</option>`).join('');
  }

  async function loadProductsForEntry() {
    if (allProducts.length) return;
    const res = await sbFetch(`/rest/v1/products?tenant_id=eq.${tenantId}&select=id,product_name,price&order=product_name`);
    allProducts = await res.json();
    const sel = document.getElementById('newItemProduct');
    sel.innerHTML = '<option value="">商品を選択してください</option>' +
      allProducts.map(p => `<option value="${esc(p.id)}">${esc(p.product_name)}</option>`).join('');
  }

  async function onCustomerChange() {
    const customerId = document.getElementById('newOrderCustomer').value;
    if (!customerId) { allPricing = []; return; }
    const res = await sbFetch(`/rest/v1/pricing?tenant_id=eq.${tenantId}&customer_id=eq.${customerId}&select=product_id,rate`);
    allPricing = await res.json();
  }

  function getUnitPrice(productId) {
    const product = allProducts.find(p => p.id === productId);
    if (!product) return 0;
    const pricing = allPricing.find(p => p.product_id === productId);
    if (pricing) return Math.round(product.price * pricing.rate);
    return product.price;
  }

  function addNewItem() {
    const productId = document.getElementById('newItemProduct').value;
    const qty = parseInt(document.getElementById('newItemQty').value, 10);
    const errEl = document.getElementById('itemError');
    if (!productId || !qty || qty < 1) { errEl.classList.add('show'); return; }
    errEl.classList.remove('show');
    const product = allProducts.find(p => p.id === productId);
    const unitPrice = getUnitPrice(productId);
    const existing = newOrderItems.find(i => i.productId === productId);
    if (existing) {
      existing.qty += qty;
    } else {
      newOrderItems.push({ productId, name: product.product_name, qty, unitPrice, costPrice: 0 });
    }
    document.getElementById('newItemProduct').value = '';
    document.getElementById('newItemQty').value = '1';
    renderNewItems();
  }

  function removeNewItem(index) {
    newOrderItems.splice(index, 1);
    renderNewItems();
  }

  function renderNewItems() {
    const tbody = document.getElementById('newItemsTbody');
    const table = document.getElementById('newItemsTable');
    const totalEl = document.getElementById('newOrderTotal');
    if (newOrderItems.length === 0) { table.style.display = 'none'; totalEl.style.display = 'none'; return; }
    table.style.display = 'table';
    totalEl.style.display = 'block';
    let total = 0;
    tbody.innerHTML = newOrderItems.map((item, i) => {
      const sub = item.qty * item.unitPrice;
      total += sub;
      return `<tr>
        <td style="white-space:normal">${esc(item.name)}</td>
        <td style="text-align:right">${item.qty}</td>
        <td style="text-align:right">¥${item.unitPrice.toLocaleString()}</td>
        <td style="text-align:right;font-weight:600">¥${sub.toLocaleString()}</td>
        <td><button class="btn-danger-sm" onclick="removeNewItem(${i})">✕</button></td>
      </tr>`;
    }).join('');
    totalEl.innerHTML = `税抜合計 <span style="color:var(--orange);font-family:'Space Grotesk',sans-serif">¥${total.toLocaleString()}</span>`;
  }

  async function saveNewOrder() {
    const customerId = document.getElementById('newOrderCustomer').value;
    const orderDate  = document.getElementById('newOrderDate').value;
    const status     = document.getElementById('newOrderStatus').value;
const errEl      = document.getElementById('orderError');
    errEl.classList.remove('show');

    if (!customerId) { errEl.textContent = '取引先を選択してください'; errEl.classList.add('show'); return; }
    if (!orderDate)  { errEl.textContent = '受注日を入力してください'; errEl.classList.add('show'); return; }
    if (newOrderItems.length === 0) { errEl.textContent = '商品を1つ以上追加してください'; errEl.classList.add('show'); return; }

    const btn = document.getElementById('saveOrderBtn');
    btn.disabled = true; btn.textContent = '登録中...';

    try {
      const code = 'M-' + orderDate.replace(/-/g, '') + '-' + Math.floor(1000 + Math.random() * 9000);
      const orderRes = await sbFetch('/rest/v1/orders', {
        method: 'POST',
        headers: { 'Prefer': 'return=representation' },
        body: JSON.stringify({ order_code: code, customer_id: customerId, order_date: orderDate, status, tenant_id: tenantId })
      });
      if (!orderRes.ok) throw new Error('order POST failed');
      const orderData = await orderRes.json();
      const orderId = orderData[0]?.id;

      await Promise.all(newOrderItems.map(item =>
        sbFetch('/rest/v1/order_items', {
          method: 'POST',
          headers: { 'Prefer': 'return=minimal' },
          body: JSON.stringify({ order_id: orderId, product_id: item.productId, quantity: item.qty, unit_price: item.unitPrice, cost_price: item.costPrice, tenant_id: tenantId })
        })
      ));

      closeNewOrder();
      await loadOrders();
    } catch(e) {
      console.error(e);
      errEl.textContent = '登録に失敗しました。もう一度お試しください。';
      errEl.classList.add('show');
    } finally {
      btn.disabled = false; btn.textContent = '受注を登録する';
    }
  }

  loadOrders();
</script>
<script src="mobile.js"></script>
</body>
