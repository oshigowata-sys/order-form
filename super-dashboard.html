<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スーパー管理画面 | MeguRee</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a; --border: #2d3148;
    --orange: #e8630a; --orange-pale: rgba(232,99,10,0.12);
    --green: #1e6641; --green-pale: rgba(30,102,65,0.15);
    --text: #f0ede8; --text-muted: #8b8fa8;
  }
  body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
  .topbar-logo { display: flex; align-items: center; gap: 12px; }
  .topbar-logo img { width: 120px; filter: brightness(0) invert(1); opacity: 0.9; }
  .badge { display: inline-block; background: var(--orange); color: #fff; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px; letter-spacing: 1px; }
  .topbar-right { display: flex; align-items: center; gap: 16px; }
  .admin-name { font-size: 13px; color: var(--text-muted); }
  .logout-btn { font-size: 13px; color: var(--text-muted); cursor: pointer; background: none; border: none; font-family: inherit; }
  .logout-btn:hover { color: var(--text); }
  .content { padding: 32px; max-width: 1100px; margin: 0 auto; }
  .section-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 12px; }
  .btn-primary { background: var(--orange); color: #fff; border: none; padding: 10px 20px; border-radius: 10px; font-size: 13px; font-weight: 700; font-family: inherit; cursor: pointer; }
  .btn-primary:hover { opacity: 0.9; }
  .btn-sm { padding: 6px 14px; font-size: 12px; border-radius: 8px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; margin-bottom: 28px; }
  .card-header { padding: 18px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .card-title { font-size: 15px; font-weight: 700; }
  table { width: 100%; border-collapse: collapse; }
  th { padding: 12px 16px; text-align: left; font-size: 11px; font-weight: 700; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; border-bottom: 1px solid var(--border); background: var(--surface2); }
  td { padding: 14px 16px; font-size: 13px; border-bottom: 1px solid rgba(45,49,72,0.5); }
  tr:last-child td { border-bottom: none; }
  .status-active { display: inline-block; background: var(--green-pale); color: #4ade80; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
  .status-suspended { display: inline-block; background: rgba(239,68,68,0.15); color: #f87171; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
  .invite-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 20px 24px; margin-top: 20px; }
  .invite-box-title { font-size: 14px; font-weight: 700; margin-bottom: 14px; }
  .invite-url-wrap { display: flex; gap: 10px; align-items: center; }
  .invite-url { flex: 1; padding: 10px 14px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 8px; font-size: 12px; font-family: monospace; color: var(--text-muted); word-break: break-all; }
  .copy-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 10px 16px; border-radius: 8px; font-size: 12px; font-weight: 700; font-family: inherit; cursor: pointer; white-space: nowrap; }
  .copy-btn:hover { border-color: var(--orange); color: var(--orange); }
  .invite-expire { font-size: 12px; color: var(--text-muted); margin-top: 8px; }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 32px; width: 100%; max-width: 440px; }
  .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 20px; }
  .form-group { margin-bottom: 16px; }
  label { display: block; font-size: 11px; font-weight: 700; color: var(--text-muted); margin-bottom: 6px; letter-spacing: 1px; text-transform: uppercase; }
  input { width: 100%; padding: 10px 14px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 8px; font-size: 13px; font-family: inherit; color: var(--text); outline: none; }
  input:focus { border-color: var(--orange); }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
  .btn-cancel { background: none; border: 1px solid var(--border); color: var(--text-muted); padding: 10px 20px; border-radius: 10px; font-size: 13px; font-family: inherit; cursor: pointer; }
  .empty { padding: 32px; text-align: center; color: var(--text-muted); font-size: 13px; }
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-logo">
    <img src="https://raw.githubusercontent.com/oshigowata-sys/order-form/main/meguree_final%20(2).svg" alt="MeguRee" />
    <span class="badge">SUPER ADMIN</span>
  </div>
  <div class="topbar-right">
    <span class="admin-name" id="adminName"></span>
    <button class="logout-btn" onclick="logout()">ログアウト</button>
  </div>
</div>

<div class="content">
  <div class="card">
    <div class="card-header">
      <div class="card-title">契約者一覧</div>
      <button class="btn-primary" onclick="openInviteModal()">＋ 招待URLを発行</button>
    </div>
    <table>
      <thead><tr>
        <th>会社名</th>
        <th>メール</th>
        <th>プラン</th>
        <th>ステータス</th>
        <th>契約日</th>
        <th>操作</th>
      </tr></thead>
      <tbody id="tenantTbody"><tr><td colspan="6" class="empty">読み込み中...</td></tr></tbody>
    </table>
  </div>

  <div id="inviteResult" style="display:none">
    <div class="card">
      <div class="card-header">
        <div class="card-title">招待URL発行完了</div>
      </div>
      <div style="padding:24px">
        <div class="invite-box">
          <div class="invite-box-title">以下のURLを契約希望者に送ってください</div>
          <div class="invite-url-wrap">
            <div class="invite-url" id="inviteUrlText"></div>
            <button class="copy-btn" onclick="copyUrl()">コピー</button>
          </div>
          <div class="invite-expire" id="inviteExpire"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="inviteModal">
  <div class="modal">
    <div class="modal-title">招待URLを発行</div>
    <div class="form-group">
      <label>メールアドレス（任意）</label>
      <input type="email" id="inviteEmail" placeholder="送り先のメールアドレス" />
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
      <button class="btn-primary" id="issueBtn" onclick="issueInvite()">URLを発行する</button>
    </div>
  </div>
</div>

<script>
  const SB_URL = 'https://vrnayxmwcbxblfokveok.supabase.co';
  const SB_KEY = 'sb_publishable_NIKtwat_yat2LxbACHVMbA_PT_8F53O';
  const BASE_URL = location.origin + location.pathname.replace('super-dashboard.html', '');

  const superAdmin = JSON.parse(sessionStorage.getItem('superAdmin') || 'null');
  if (!superAdmin) location.replace('super-login.html');
  document.getElementById('adminName').textContent = superAdmin?.name || '';

  function logout() {
    sessionStorage.removeItem('superAdmin');
    location.replace('super-login.html');
  }

  function sbFetch(path, opts = {}) {
    return fetch(SB_URL + path, {
      ...opts,
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation', ...(opts.headers || {}) }
    });
  }

  function esc(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  async function loadTenants() {
    const res = await sbFetch('/rest/v1/tenants?select=*&order=created_at.desc');
    const tenants = await res.json();
    const tbody = document.getElementById('tenantTbody');
    if (!tenants.length) { tbody.innerHTML = '<tr><td colspan="6" class="empty">契約者が登録されていません</td></tr>'; return; }
    tbody.innerHTML = tenants.map(t => `<tr>
      <td style="font-weight:600">${esc(t.name)}</td>
      <td style="color:var(--text-muted)">${esc(t.email) || '—'}</td>
      <td><span style="font-size:12px">${esc(t.plan) || 'standard'}</span></td>
      <td>${t.status === 'active' ? '<span class="status-active">稼働中</span>' : '<span class="status-suspended">停止中</span>'}</td>
      <td style="color:var(--text-muted);font-size:12px">${(t.created_at||'').slice(0,10)}</td>
      <td><button class="btn-primary btn-sm" onclick="reissueInvite('${esc(t.id)}')">招待再発行</button></td>
    </tr>`).join('');
  }

  function openInviteModal() {
    document.getElementById('inviteEmail').value = '';
    document.getElementById('inviteModal').classList.add('open');
    document.getElementById('inviteResult').style.display = 'none';
  }

  function closeModal() {
    document.getElementById('inviteModal').classList.remove('open');
  }

  async function issueInvite(existingTenantId = null) {
    const btn = document.getElementById('issueBtn');
    btn.disabled = true; btn.textContent = '発行中...';
    try {
      let tId = existingTenantId;
      if (!tId) {
        const email = document.getElementById('inviteEmail').value.trim() || null;
        const tRes = await sbFetch('/rest/v1/tenants', {
          method: 'POST',
          body: JSON.stringify({ name: '（未登録）', email, status: 'active' })
        });
        const tData = await tRes.json();
        tId = tData[0]?.id;
      }

      const invRes = await sbFetch('/rest/v1/invitations', {
        method: 'POST',
        body: JSON.stringify({ tenant_id: tId, email: document.getElementById('inviteEmail')?.value?.trim() || null })
      });
      const invData = await invRes.json();
      const token = invData[0]?.token;
      const expiresAt = invData[0]?.expires_at;

      closeModal();
      const url = `${BASE_URL}invite.html?token=${token}`;
      document.getElementById('inviteUrlText').textContent = url;
      document.getElementById('inviteExpire').textContent = `有効期限: ${new Date(expiresAt).toLocaleString('ja-JP')}`;
      document.getElementById('inviteResult').style.display = 'block';
      document.getElementById('inviteResult').scrollIntoView({ behavior: 'smooth' });
      await loadTenants();
    } catch(e) {
      console.error(e);
      alert('発行に失敗しました');
    } finally {
      btn.disabled = false; btn.textContent = 'URLを発行する';
    }
  }

  async function reissueInvite(tenantId) {
    if (!confirm('この契約者に招待URLを再発行しますか？')) return;
    document.getElementById('inviteModal').classList.add('open');
    await issueInvite(tenantId);
  }

  function copyUrl() {
    const url = document.getElementById('inviteUrlText').textContent;
    navigator.clipboard.writeText(url).then(() => alert('コピーしました'));
  }

  loadTenants();
</script>
</body>
</html>
