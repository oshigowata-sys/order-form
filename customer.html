<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>取引先マスタ | MeguRee</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;background:#f9f7f4;display:flex;min-height:100vh;color:#1a1a1a}
.sidebar{width:200px;background:#1a1a1a;color:#fff;position:fixed;height:100vh;overflow-y:auto;display:flex;flex-direction:column;z-index:100}
.sidebar-logo{padding:20px 16px;font-size:17px;font-weight:700;color:#e8630a;border-bottom:1px solid #2a2a2a}
.sidebar-logo span{color:#fff;font-weight:400}
.sidebar-section{padding:16px 16px 4px;font-size:10px;color:#555;text-transform:uppercase;letter-spacing:1px}
.sidebar-nav{list-style:none}
.sidebar-nav li a{display:flex;align-items:center;gap:8px;padding:9px 16px;color:#aaa;text-decoration:none;font-size:13.5px;transition:all 0.15s}
.sidebar-nav li a:hover{background:#242424;color:#fff}
.sidebar-nav li a.active{background:#e8630a;color:#fff;font-weight:500}
.sidebar-nav li a .icon{font-size:15px;width:18px;text-align:center}
.main{margin-left:200px;flex:1;padding:28px 32px}
.page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.page-title{font-size:24px;font-weight:700}
.card{background:#fff;border-radius:12px;border:0.5px solid #e8e4df;overflow:hidden}
.table-wrapper{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{background:#f8f6f3;padding:10px 14px;text-align:left;font-size:12px;color:#666;font-weight:600;border-bottom:1px solid #ece8e2}
td{padding:11px 14px;font-size:13.5px;color:#333;border-bottom:1px solid #f5f2ee}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fdfcfa}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:500;transition:opacity 0.15s}
.btn:hover{opacity:0.85}
.btn-primary{background:#e8630a;color:#fff}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-outline{background:#fff;border:1.5px solid #e8630a;color:#e8630a}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:1000;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:16px;width:440px;max-width:95vw;overflow:hidden}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:20px 24px;border-bottom:1px solid #f0ede8}
.modal-title{font-size:17px;font-weight:700}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:#aaa;line-height:1}
.modal-body{padding:24px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:12px;font-weight:600;color:#555;margin-bottom:6px}
.form-group input{width:100%;padding:9px 12px;border:1px solid #d8d3cc;border-radius:8px;font-size:14px;outline:none;font-family:inherit;transition:border 0.15s}
.form-group input:focus{border-color:#e8630a;box-shadow:0 0 0 3px rgba(232,99,10,0.08)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-footer{padding:16px 24px;border-top:1px solid #f0ede8;display:flex;justify-content:flex-end;gap:8px}
</style>
</head>
<body>
<nav class="sidebar">
  <div class="sidebar-logo">MeguRee<span>·</span></div>
  <div class="sidebar-section">メニュー</div>
  <ul class="sidebar-nav">
    <li><a href="dashboard.html"><span class="icon">🏠</span>ダッシュボード</a></li>
    <li><a href="orders.html"><span class="icon">📋</span>受注一覧</a></li>
    <li><a href="invoice-list.html"><span class="icon">🧾</span>請求書管理</a></li>
  </ul>
  <div class="sidebar-section">マスタ管理</div>
  <ul class="sidebar-nav">
    <li><a href="customer.html" class="active"><span class="icon">🏢</span>取引先マスタ</a></li>
    <li><a href="products.html"><span class="icon">📦</span>商品マスタ</a></li>
    <li><a href="pricing.html"><span class="icon">💴</span>掛け率管理</a></li>
  </ul>
  <div class="sidebar-section">その他</div>
  <ul class="sidebar-nav">
    <li><a href="login.html"><span class="icon">⚙️</span>設定</a></li>
  </ul>
</nav>
<main class="main">
  <div class="page-header">
    <div class="page-title">取引先マスタ</div>
    <button class="btn btn-primary" onclick="openModal()">＋ 新規追加</button>
  </div>
  <div class="card">
    <div class="table-wrapper">
      <table>
        <thead><tr>
          <th>会社名</th><th>担当者名</th><th>電話</th><th>メール</th><th>締め日</th><th></th>
        </tr></thead>
        <tbody id="customerTbody"></tbody>
      </table>
    </div>
  </div>
</main>

<div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">新規取引先追加</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editId">
      <div class="form-group"><label>会社名 <span style="color:#e8630a">*</span></label><input id="fName" placeholder="例: ひかる商店"></div>
      <div class="form-row">
        <div class="form-group"><label>担当者名</label><input id="fContact" placeholder="例: 嶋田洋"></div>
        <div class="form-group"><label>電話番号</label><input id="fTel" placeholder="例: 011-123-4567"></div>
      </div>
      <div class="form-group"><label>メールアドレス</label><input id="fEmail" type="email" placeholder="例: info@example.com"></div>
      <div class="form-group"><label>締め日（1〜31）</label><input id="fClosing" type="number" min="1" max="31" placeholder="例: 31"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-primary" onclick="saveCustomer()">保存する</button>
    </div>
  </div>
</div>

<script>
let CUSTOMERS = [
  { id: 'rec001', name: 'ひかる商店',   contact: '嶋田洋',   tel: '011-123-4567', email: 'shimada@hikaru.co.jp',  closingDay: 31 },
  { id: 'rec002', name: 'サンエイ札幌', contact: '鈴木一郎', tel: '011-785-5571', email: 'suzuki@sanei.co.jp',    closingDay: 15 },
  { id: 'rec003', name: '北海道商事',   contact: '田中誠',   tel: '011-456-7890', email: 'tanaka@hokkaido.co.jp', closingDay: 20 },
  { id: 'rec004', name: '旭川フーズ',   contact: '佐藤花子', tel: '0166-22-3333', email: 'sato@asahikawa.co.jp',  closingDay: 25 },
];

function renderCustomers() {
  document.getElementById('customerTbody').innerHTML = CUSTOMERS.map(c => `
    <tr>
      <td style="font-weight:600">${c.name}</td>
      <td>${c.contact}</td>
      <td style="font-family:monospace;font-size:12px;color:#666">${c.tel}</td>
      <td style="font-size:12px;color:#666">${c.email}</td>
      <td>${c.closingDay}日</td>
      <td><button class="btn btn-sm btn-outline" onclick="openModal('${c.id}')">編集</button></td>
    </tr>`).join('');
}

function openModal(id = null) {
  document.getElementById('editId').value = id || '';
  if (id) {
    const c = CUSTOMERS.find(x => x.id === id);
    document.getElementById('modalTitle').textContent = '取引先を編集';
    document.getElementById('fName').value = c.name;
    document.getElementById('fContact').value = c.contact;
    document.getElementById('fTel').value = c.tel;
    document.getElementById('fEmail').value = c.email;
    document.getElementById('fClosing').value = c.closingDay;
  } else {
    document.getElementById('modalTitle').textContent = '新規取引先追加';
    ['fName','fContact','fTel','fEmail','fClosing'].forEach(id => document.getElementById(id).value = '');
  }
  document.getElementById('overlay').classList.add('open');
}

function closeModal() { document.getElementById('overlay').classList.remove('open'); }

function saveCustomer() {
  const id = document.getElementById('editId').value;
  const data = {
    name: document.getElementById('fName').value.trim(),
    contact: document.getElementById('fContact').value.trim(),
    tel: document.getElementById('fTel').value.trim(),
    email: document.getElementById('fEmail').value.trim(),
    closingDay: parseInt(document.getElementById('fClosing').value) || 31,
  };
  if (!data.name) { alert('会社名を入力してください'); return; }
  if (id) {
    const idx = CUSTOMERS.findIndex(x => x.id === id);
    CUSTOMERS[idx] = { ...CUSTOMERS[idx], ...data };
  } else {
    CUSTOMERS.push({ id: 'rec' + Date.now(), ...data });
  }
  console.log('保存:', data);
  closeModal();
  renderCustomers();
}

renderCustomers();
</script>
</body>
</html>
