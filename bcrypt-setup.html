<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bcryptハッシュ生成ツール | MeguRee 移行用</title>
<style>
  body { font-family: sans-serif; max-width: 560px; margin: 60px auto; padding: 0 20px; background: #fdf6ee; }
  h1 { font-size: 20px; margin-bottom: 8px; }
  p  { font-size: 13px; color: #666; margin-bottom: 24px; }
  label { display: block; font-size: 12px; font-weight: 700; color: #555; margin-bottom: 6px; }
  input { width: 100%; padding: 10px 14px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; margin-bottom: 16px; box-sizing: border-box; }
  button { background: #e8630a; color: white; border: none; padding: 12px 28px; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .result { margin-top: 24px; background: #fff; border: 1px solid #ddd; border-radius: 10px; padding: 16px; }
  .result label { color: #333; margin-bottom: 8px; }
  .hash { font-family: monospace; font-size: 13px; word-break: break-all; background: #f5f5f5; padding: 10px 12px; border-radius: 6px; }
  .copy-btn { margin-top: 10px; background: #1e6641; font-size: 12px; padding: 8px 16px; }
  .note { margin-top: 16px; font-size: 12px; color: #888; }
  .warn { background: #fff4ec; border: 1px solid #f97316; border-radius: 8px; padding: 12px 16px; font-size: 13px; color: #b45309; margin-bottom: 24px; }
</style>
</head>
<body>
<h1>bcryptハッシュ生成ツール</h1>
<p>MeguReeのパスワードハッシュ化移行用ツールです。生成したハッシュをSupabaseのaccountsテーブルに設定してください。</p>

<div class="warn">
  ⚠️ このツールは移行作業専用です。使用後はブラウザの履歴を消去してください。<br>
  インターネットには送信されません（ブラウザ内のみで処理）。
</div>

<label>パスワード（平文）</label>
<input type="password" id="pw" placeholder="ハッシュ化したいパスワードを入力" />

<button onclick="generate()" id="btn">ハッシュを生成する</button>

<div class="result" id="result" style="display:none">
  <label>生成されたbcryptハッシュ（DBに保存する値）:</label>
  <div class="hash" id="hash"></div>
  <button class="copy-btn" onclick="copyHash()">コピーする</button>
  <div class="note">
    このハッシュをSupabase SQL Editorで以下のように実行してください：<br><br>
    <code>UPDATE accounts SET password_hash = '&lt;上記のハッシュ&gt;' WHERE login_id = 'あなたのログインID';</code>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bcryptjs@2.4.3/dist/bcrypt.min.js"></script>
<script>
  async function generate() {
    const pw = document.getElementById('pw').value;
    if (!pw) { alert('パスワードを入力してください'); return; }

    const btn = document.getElementById('btn');
    btn.disabled = true;
    btn.textContent = '生成中...（数秒かかります）';

    const hash = await bcrypt.hash(pw, 10);

    document.getElementById('hash').textContent = hash;
    document.getElementById('result').style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'ハッシュを生成する';
  }

  function copyHash() {
    const text = document.getElementById('hash').textContent;
    navigator.clipboard.writeText(text).then(() => alert('コピーしました'));
  }
</script>
</body>
</html>
