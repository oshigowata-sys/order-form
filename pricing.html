<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>掛け率管理 | MeguRee</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;background:#f9f7f4;display:flex;min-height:100vh;color:#1a1a1a}
.sidebar{width:200px;background:#1a1a1a;color:#fff;position:fixed;height:100vh;overflow-y:auto;display:flex;flex-direction:column;z-index:100}
.sidebar-logo{padding:20px 16px;font-size:17px;font-weight:700;color:#e8630a;border-bottom:1px solid #2a2a2a}
.sidebar-logo span{color:#fff;font-weight:400}
.sidebar-section{padding:16px 16px 4px;font-size:10px;color:#555;text-transform:uppercase;letter-spacing:1px}
.sidebar-nav{list-style:none}
.sidebar-nav li a{display:flex;align-items:center;gap:8px;padding:9px 16px;color:#aaa;text-decoration:none;font-size:13.5px;transition:all 0.15s}
.sidebar-nav li a:hover{background:#242424;color:#fff}
.sidebar-nav li a.active{background:#e8630a;color:#fff;font-weight:500}
.sidebar-nav li a .icon{font-size:15px;width:18px;text-align:center}
.main{margin-left:200px;flex:1;padding:28px 32px}
.page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.page-title{font-size:24px;font-weight:700}
.layout{display:grid;grid-template-columns:1fr 340px;gap:20px;align-items:start}
.card{background:#fff;border-radius:12px;border:0.5px solid #e8e4df;overflow:hidden}
.card-header{padding:16px 20px;border-bottom:1px solid #f0ede8}
.card-title{font-size:15px;font-weight:700}
.table-wrapper{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{background:#f8f6f3;padding:10px 14px;text-align:left;font-size:12px;color:#666;font-weight:600;border-bottom:1px solid #ece8e2}
td{padding:11px 14px;font-size:13.5px;color:#333;border-bottom:1px solid #f5f2ee}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fdfcfa}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:500;transition:opacity 0.15s}
.btn:hover{opacity:0.85}
.btn-primary{background:#e8630a;color:#fff;width:100%;justify-content:center;margin-top:4px}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-outline{background:#fff;border:1.5px solid #e8630a;color:#e8630a}
.form-panel{padding:20px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:12px;font-weight:600;color:#555;margin-bottom:5px}
.form-group select,.form-group input{width:100%;padding:9px 12px;border:1px solid #d8d3cc;border-radius:8px;font-size:14px;outline:none;font-family:inherit;background:#fff;transition:border 0.15s}
.form-group select:focus,.form-group input:focus{border-color:#e8630a;box-shadow:0 0 0 3px rgba(232,99,10,0.08)}
.preview-box{background:#fef8f3;border:1px solid #e8630a;border-radius:10px;padding:14px;margin-bottom:16px;text-align:center}
.preview-label{font-size:11px;color:#e8630a;font-weight:600;margin-bottom:4px}
.preview-val{font-size:22px;font-weight:700;color:#e8630a}
.preview-sub{font-size:12px;color:#888;margin-top:2px}
</style>
</head>
<body>
<nav class="sidebar">
  <div class="sidebar-logo">MeguRee<span>·</span></div>
  <div class="sidebar-section">メニュー</div>
  <ul class="sidebar-nav">
    <li><a href="dashboard.html"><span class="icon">🏠</span>ダッシュボード</a></li>
    <li><a href="orders.html"><span class="icon">📋</span>受注一覧</a></li>
    <li><a href="invoice-list.html"><span class="icon">🧾</span>請求書管理</a></li>
  </ul>
  <div class="sidebar-section">マスタ管理</div>
  <ul class="sidebar-nav">
    <li><a href="customer.html"><span class="icon">🏢</span>取引先マスタ</a></li>
    <li><a href="products.html"><span class="icon">📦</span>商品マスタ</a></li>
    <li><a href="pricing.html" class="active"><span class="icon">💴</span>掛け率管理</a></li>
  </ul>
  <div class="sidebar-section">その他</div>
  <ul class="sidebar-nav">
    <li><a href="login.html"><span class="icon">⚙️</span>設定</a></li>
  </ul>
</nav>
<main class="main">
  <div class="page-header">
    <div class="page-title">掛け率管理</div>
  </div>
  <div class="layout">
    <div class="card">
      <div class="table-wrapper">
        <table>
          <thead><tr>
            <th>取引先名</th><th>商品名</th><th>掛け率</th><th>適用単価</th><th></th>
          </tr></thead>
          <tbody id="pricingTbody"></tbody>
        </table>
      </div>
    </div>
    <div class="card">
      <div class="card-header"><div class="card-title" id="formTitle">新規登録</div></div>
      <div class="form-panel">
        <input type="hidden" id="editKey">
        <div class="form-group">
          <label>取引先</label>
          <select id="fCustomer" onchange="updatePreview()">
            <option value="">選択してください</option>
          </select>
        </div>
        <div class="form-group">
          <label>商品</label>
          <select id="fProduct" onchange="updatePreview()">
            <option value="">選択してください</option>
          </select>
        </div>
        <div class="form-group">
          <label>掛け率（0〜1）</label>
          <input type="number" id="fRate" min="0" max="1" step="0.01" placeholder="例: 0.85" oninput="updatePreview()">
        </div>
        <div class="preview-box" id="previewBox" style="display:none">
          <div class="preview-label">適用単価（プレビュー）</div>
          <div class="preview-val" id="previewVal">¥0</div>
          <div class="preview-sub" id="previewSub"></div>
        </div>
        <button class="btn btn-primary" onclick="savePricing()">保存する</button>
        <button class="btn btn-outline" id="cancelBtn" style="display:none;width:100%;justify-content:center;margin-top:8px" onclick="resetForm()">キャンセル</button>
      </div>
    </div>
  </div>
</main>
<script>
const CUSTOMERS = [
  { id: 'rec001', name: 'ひかる商店' },
  { id: 'rec002', name: 'サンエイ札幌' },
  { id: 'rec003', name: '北海道商事' },
  { id: 'rec004', name: '旭川フーズ' },
];
const PRODUCTS = [
  { id: 'rec101', name: '1,100円丸ごと玉ねぎスープ', basePrice: 700 },
  { id: 'rec102', name: '700円北海道帆立スープ12入', basePrice: 700 },
  { id: 'rec103', name: '648円ホタテだし塩65g',      basePrice: 385 },
  { id: 'rec104', name: '北海道バターサンド',          basePrice: 480 },
  { id: 'rec105', name: '昆布だし醤油500ml',          basePrice: 320 },
];
let PRICING = [
  { customerId: 'rec001', productId: 'rec101', rate: 0.85 },
  { customerId: 'rec001', productId: 'rec102', rate: 0.80 },
  { customerId: 'rec001', productId: 'rec103', rate: 0.85 },
  { customerId: 'rec002', productId: 'rec101', rate: 0.90 },
  { customerId: 'rec002', productId: 'rec102', rate: 0.80 },
  { customerId: 'rec003', productId: 'rec103', rate: 0.75 },
  { customerId: 'rec003', productId: 'rec104', rate: 0.85 },
];

function init() {
  const cs = document.getElementById('fCustomer');
  const ps = document.getElementById('fProduct');
  CUSTOMERS.forEach(c => cs.innerHTML += `<option value="${c.id}">${c.name}</option>`);
  PRODUCTS.forEach(p => ps.innerHTML += `<option value="${p.id}">${p.name}</option>`);
}

function renderPricing() {
  document.getElementById('pricingTbody').innerHTML = PRICING.map((p, i) => {
    const c = CUSTOMERS.find(x => x.id === p.customerId);
    const pr = PRODUCTS.find(x => x.id === p.productId);
    const applied = Math.round(pr.basePrice * p.rate);
    return `<tr>
      <td>${c?.name || p.customerId}</td>
      <td style="font-size:12px">${pr?.name || p.productId}</td>
      <td><span style="font-weight:700;color:#e8630a">${(p.rate*100).toFixed(0)}%</span></td>
      <td style="font-weight:600">¥${applied.toLocaleString()}</td>
      <td><button class="btn btn-sm btn-outline" onclick="editPricing(${i})">編集</button></td>
    </tr>`;
  }).join('');
}

function updatePreview() {
  const pid = document.getElementById('fProduct').value;
  const rate = parseFloat(document.getElementById('fRate').value);
  const box = document.getElementById('previewBox');
  if (pid && rate > 0) {
    const p = PRODUCTS.find(x => x.id === pid);
    const applied = Math.round(p.basePrice * rate);
    document.getElementById('previewVal').textContent = '¥' + applied.toLocaleString();
    document.getElementById('previewSub').textContent = `基本単価 ¥${p.basePrice.toLocaleString()} × ${(rate*100).toFixed(0)}%`;
    box.style.display = 'block';
  } else {
    box.style.display = 'none';
  }
}

function editPricing(i) {
  const p = PRICING[i];
  document.getElementById('editKey').value = i;
  document.getElementById('fCustomer').value = p.customerId;
  document.getElementById('fProduct').value = p.productId;
  document.getElementById('fRate').value = p.rate;
  document.getElementById('formTitle').textContent = '掛け率を編集';
  document.getElementById('cancelBtn').style.display = '';
  updatePreview();
  document.querySelector('.card:last-child').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function resetForm() {
  document.getElementById('editKey').value = '';
  document.getElementById('fCustomer').value = '';
  document.getElementById('fProduct').value = '';
  document.getElementById('fRate').value = '';
  document.getElementById('formTitle').textContent = '新規登録';
  document.getElementById('cancelBtn').style.display = 'none';
  document.getElementById('previewBox').style.display = 'none';
}

function savePricing() {
  const key = document.getElementById('editKey').value;
  const data = {
    customerId: document.getElementById('fCustomer').value,
    productId: document.getElementById('fProduct').value,
    rate: parseFloat(document.getElementById('fRate').value),
  };
  if (!data.customerId || !data.productId || isNaN(data.rate)) { alert('全項目を入力してください'); return; }
  if (data.rate <= 0 || data.rate > 1) { alert('掛け率は0より大きく1以下で入力してください'); return; }
  if (key !== '') {
    PRICING[parseInt(key)] = data;
  } else {
    PRICING.push(data);
  }
  console.log('保存:', data);
  resetForm();
  renderPricing();
}

init();
renderPricing();
</script>
</body>
</html>
