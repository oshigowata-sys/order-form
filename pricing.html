<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>掛け率管理 | MeguRee</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f3ee;--surface:#fff;--border:#e2d9ce;
  --orange:#e8630a;--orange-light:#f97316;--orange-pale:#fff4ec;
  --green:#1e6641;--green-pale:#e8f5ee;
  --text:#1a1208;--text-muted:#7a6a55;
  --sidebar-bg:#1a1208;--sidebar-text:#e8d5bc;
}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex}
.sidebar{width:240px;min-height:100vh;background:var(--sidebar-bg);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100}
.sidebar-logo{padding:20px 24px;border-bottom:1px solid rgba(255,255,255,0.08)}
.sidebar-logo img{width:140px;margin-bottom:4px;display:block}
.sidebar-logo-sub{font-size:10px;color:rgba(232,213,188,0.4);letter-spacing:2px;text-transform:uppercase}
.sidebar-nav{padding:16px 12px;flex:1}
.nav-label{font-size:10px;color:rgba(232,213,188,0.3);letter-spacing:2px;text-transform:uppercase;padding:0 12px;margin-bottom:8px;margin-top:16px}
.nav-label:first-child{margin-top:0}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;color:var(--sidebar-text);font-size:13px;font-weight:500;transition:all 0.2s;text-decoration:none;margin-bottom:2px}
.nav-item:hover{background:rgba(255,255,255,0.06)}
.nav-item.active{background:var(--orange);color:#fff}
.nav-item .icon{font-size:16px;width:20px;text-align:center}
.main{margin-left:240px;flex:1;min-height:100vh;display:flex;flex-direction:column}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 32px;position:sticky;top:0;z-index:50}
.page-title{font-size:18px;font-weight:700}
.page-sub{font-size:12px;color:var(--text-muted);margin-top:2px}
.content{padding:28px 32px;flex:1}
.layout{display:grid;grid-template-columns:1fr 340px;gap:20px;align-items:start}
.card{background:var(--surface);border-radius:16px;border:1px solid var(--border);overflow:hidden}
.card-header{padding:18px 20px;border-bottom:1px solid var(--border)}
.card-title{font-size:14px;font-weight:700}
table{width:100%;border-collapse:collapse}
thead tr{background:var(--bg);border-bottom:1px solid var(--border)}
th{padding:10px 16px;text-align:left;font-size:11px;font-weight:700;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase;white-space:nowrap}
tbody tr{border-bottom:1px solid var(--border);transition:background 0.15s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--bg)}
td{padding:14px 16px;font-size:13px;vertical-align:middle}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:10px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:all 0.2s;font-family:'Noto Sans JP',sans-serif}
.btn:hover{opacity:0.85}
.btn-primary{background:var(--orange);color:#fff;width:100%;justify-content:center;margin-top:4px}
.btn-outline{background:var(--surface);border:1.5px solid var(--orange);color:var(--orange);width:100%;justify-content:center;margin-top:8px}
.btn-sm{padding:5px 12px;font-size:12px;border-radius:8px}
.form-panel{padding:20px}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:6px;letter-spacing:0.5px}
.form-input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:10px;font-size:14px;font-family:'Noto Sans JP',sans-serif;color:var(--text);background:var(--bg);outline:none;transition:border-color 0.2s}
.form-input:focus{border-color:var(--orange);background:#fff;box-shadow:0 0 0 3px rgba(232,99,10,0.08)}
.preview-box{background:var(--orange-pale);border:1px solid var(--orange);border-radius:12px;padding:16px;margin-bottom:16px;text-align:center}
.preview-label{font-size:11px;color:var(--orange);font-weight:600;margin-bottom:4px;text-transform:uppercase;letter-spacing:1px}
.preview-val{font-family:'Space Grotesk',sans-serif;font-size:24px;font-weight:700;color:var(--orange)}
.preview-sub{font-size:12px;color:var(--text-muted);margin-top:4px}

.sidebar-footer{padding:12px 12px 16px;border-top:1px solid rgba(255,255,255,0.08);margin-top:auto}
.logout-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;color:rgba(232,213,188,0.5);font-size:13px;font-weight:500;transition:all 0.2s;text-decoration:none}
.logout-item:hover{background:rgba(255,69,0,0.15);color:#ff9a7a}
</style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-logo">
    <img src="https://raw.githubusercontent.com/oshigowata-sys/order-form/main/meguree_final%20(2).svg" alt="MeguRee">
    <div class="sidebar-logo-sub">受注管理システム</div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-label">メニュー</div>
    <a class="nav-item" href="dashboard.html"><span class="icon">🏠</span>ダッシュボード</a>
    <a class="nav-item" href="orders.html"><span class="icon">📋</span>受注一覧</a>
    <a class="nav-item" href="invoice-list.html"><span class="icon">🧾</span>請求書管理</a>
    <div class="nav-label">マスタ管理</div>
    <a class="nav-item" href="customer.html"><span class="icon">🏢</span>取引先マスタ</a>
    <a class="nav-item" href="products.html"><span class="icon">📦</span>商品マスタ</a>
    <a class="nav-item active" href="pricing.html"><span class="icon">💹</span>掛け率管理</a>
    <div class="nav-label">その他</div>
    <a class="nav-item" href="settings.html"><span class="icon">⚙️</span>設定</a>
  </nav>
  <div class="sidebar-footer">
    <a class="logout-item" href="login.html"><span class="icon">🚪</span>ログアウト</a>
  </div>
</aside>
<main class="main">
  <div class="topbar">
    <div class="page-title">掛け率管理</div>
    <div class="page-sub">取引先ごとの商品掛け率を設定します</div>
  </div>
  <div class="content">
    <div class="layout">
      <div class="card">
        <div class="card-header"><div class="card-title">掛け率一覧</div></div>
        <table><thead><tr>
          <th>取引先名</th><th>商品名</th><th>掛け率</th><th>適用単価</th><th></th>
        </tr></thead>
        <tbody id="pricingTbody"></tbody></table>
      </div>
      <div class="card">
        <div class="card-header"><div class="card-title" id="formTitle">新規登録</div></div>
        <div class="form-panel">
          <input type="hidden" id="editKey">
          <div class="form-group">
            <label class="form-label">取引先</label>
            <select class="form-input" id="fCustomer" onchange="updatePreview()">
              <option value="">選択してください</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">商品</label>
            <select class="form-input" id="fProduct" onchange="updatePreview()">
              <option value="">選択してください</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">掛け率（0〜1）</label>
            <input type="number" class="form-input" id="fRate" min="0" max="1" step="0.01" placeholder="例: 0.85" oninput="updatePreview()">
          </div>
          <div class="preview-box" id="previewBox" style="display:none">
            <div class="preview-label">適用単価（プレビュー）</div>
            <div class="preview-val" id="previewVal">¥0</div>
            <div class="preview-sub" id="previewSub"></div>
          </div>
          <button class="btn btn-primary" onclick="savePricing()">保存する</button>
          <button class="btn btn-outline" id="cancelBtn" style="display:none" onclick="resetForm()">キャンセル</button>
        </div>
      </div>
    </div>
  </div>
</main>
<script>
const SB_URL = 'https://vrnayxmwcbxblfokveok.supabase.co';
const SB_KEY = 'sb_publishable_NIKtwat_yat2LxbACHVMbA_PT_8F53O';

function sbFetch(path, options = {}) {
  return fetch(SB_URL + path, {
    ...options,
    headers: {
      'apikey': SB_KEY,
      'Authorization': 'Bearer ' + SB_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation',
      ...(options.headers || {})
    }
  });
}

let CUSTOMERS = [];
let PRODUCTS  = [];
let PRICING   = [];
let editId = '';

/* ── 初期ロード ── */
async function loadAll() {
  setTableLoading(true);
  try {
    const [custRes, prodRes, pricingRes] = await Promise.all([
      sbFetch('/rest/v1/customers?select=id,company_name&order=company_name'),
      sbFetch('/rest/v1/products?select=id,product_name,price&order=product_name'),
      sbFetch('/rest/v1/pricing?select=id,rate,customer_id,product_id,customers(company_name),products(product_name,price)&order=created_at')
    ]);
    if (!custRes.ok || !prodRes.ok || !pricingRes.ok) throw new Error('データ取得失敗');

    CUSTOMERS = (await custRes.json()).map(r => ({ id: r.id, name: r.company_name }));
    PRODUCTS  = (await prodRes.json()).map(r => ({ id: r.id, name: r.product_name, basePrice: r.price }));
    PRICING   = (await pricingRes.json()).map(r => ({
      id:          r.id,
      customer_id: r.customer_id,
      product_id:  r.product_id,
      rate:        Number(r.rate),
      custName:    r.customers?.company_name || '',
      prodName:    r.products?.product_name  || '',
      basePrice:   r.products?.price         || 0,
    }));

    populateSelects();
    renderPricing();
  } catch(e) {
    console.error(e);
    document.getElementById('pricingTbody').innerHTML =
      '<tr><td colspan="5" style="text-align:center;padding:20px;color:#dc2626">データ読み込みエラー。コンソールを確認してください。</td></tr>';
  } finally {
    setTableLoading(false);
  }
}

function setTableLoading(on) {
  if (on) document.getElementById('pricingTbody').innerHTML =
    '<tr><td colspan="5" style="text-align:center;padding:20px;color:var(--text-muted)">読み込み中...</td></tr>';
}

/* ── ドロップダウン生成 ── */
function populateSelects() {
  const cs = document.getElementById('fCustomer');
  const ps = document.getElementById('fProduct');
  cs.innerHTML = '<option value="">選択してください</option>';
  ps.innerHTML = '<option value="">選択してください</option>';
  CUSTOMERS.forEach(c => cs.innerHTML += `<option value="${c.id}">${c.name}</option>`);
  PRODUCTS.forEach(p  => ps.innerHTML += `<option value="${p.id}">${p.name}</option>`);
}

/* ── 一覧描画 ── */
function renderPricing() {
  if (PRICING.length === 0) {
    document.getElementById('pricingTbody').innerHTML =
      '<tr><td colspan="5" style="text-align:center;padding:20px;color:var(--text-muted)">掛け率の登録がありません</td></tr>';
    return;
  }
  document.getElementById('pricingTbody').innerHTML = PRICING.map(p => {
    const applied = p.basePrice > 0 && p.rate > 0 ? Math.round(p.basePrice * p.rate) : null;
    return `<tr>
      <td style="font-weight:600">${p.custName}</td>
      <td style="font-size:12px;color:var(--text-muted)">${p.prodName}</td>
      <td><span style="font-family:'Space Grotesk',sans-serif;font-weight:700;color:var(--orange)">${p.rate > 0 ? (p.rate*100).toFixed(0)+'%' : '—'}</span></td>
      <td style="font-family:'Space Grotesk',sans-serif;font-weight:600">${applied !== null ? '¥'+applied.toLocaleString() : '—'}</td>
      <td style="white-space:nowrap">
        <button class="btn btn-sm" style="background:var(--bg);border:1px solid var(--border);color:var(--text)" onclick="editPricing('${p.id}')">編集</button>
      </td>
    </tr>`;
  }).join('');
}

/* ── プレビュー ── */
function updatePreview() {
  const pid  = document.getElementById('fProduct').value;
  const rate = parseFloat(document.getElementById('fRate').value);
  const box  = document.getElementById('previewBox');
  if (pid && rate > 0) {
    const prod = PRODUCTS.find(x => x.id === pid);
    if (prod && prod.basePrice > 0) {
      const applied = Math.round(prod.basePrice * rate);
      document.getElementById('previewVal').textContent = '¥' + applied.toLocaleString();
      document.getElementById('previewSub').textContent = `基本単価 ¥${prod.basePrice.toLocaleString()} × ${(rate*100).toFixed(0)}%`;
      box.style.display = 'block';
    } else { box.style.display = 'none'; }
  } else { box.style.display = 'none'; }
}

/* ── 編集開始 ── */
function editPricing(id) {
  const p = PRICING.find(x => x.id === id);
  if (!p) return;
  editId = id;
  document.getElementById('editKey').value          = id;
  document.getElementById('fCustomer').value         = p.customer_id;
  document.getElementById('fProduct').value          = p.product_id;
  document.getElementById('fRate').value             = p.rate;
  document.getElementById('formTitle').textContent   = '掛け率を編集';
  document.getElementById('cancelBtn').style.display = '';
  updatePreview();
  document.querySelector('.card:last-child').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

/* ── フォームリセット ── */
function resetForm() {
  editId = '';
  document.getElementById('editKey').value          = '';
  document.getElementById('fCustomer').value         = '';
  document.getElementById('fProduct').value          = '';
  document.getElementById('fRate').value             = '';
  document.getElementById('formTitle').textContent   = '新規登録';
  document.getElementById('cancelBtn').style.display = 'none';
  document.getElementById('previewBox').style.display = 'none';
}

/* ── 保存（新規 or 更新） ── */
async function savePricing() {
  const id         = document.getElementById('editKey').value;
  const customerId = document.getElementById('fCustomer').value;
  const productId  = document.getElementById('fProduct').value;
  const rate       = parseFloat(document.getElementById('fRate').value);
  if (!customerId || !productId || isNaN(rate)) { alert('すべての項目を入力してください'); return; }
  if (rate <= 0 || rate > 1) { alert('掛け率は0より大きく1以下にしてください'); return; }

  const btn = document.querySelector('.btn-primary');
  btn.disabled = true; btn.textContent = '保存中...';
  try {
    const payload = { customer_id: customerId, product_id: productId, rate };
    if (id) {
      const res = await sbFetch('/rest/v1/pricing?id=eq.' + id, { method: 'PATCH', body: JSON.stringify(payload) });
      if (!res.ok) throw new Error('HTTP ' + res.status);
    } else {
      const res = await sbFetch('/rest/v1/pricing', { method: 'POST', body: JSON.stringify(payload) });
      if (!res.ok) {
        const err = await res.json();
        if (err.code === '23505') { alert('この取引先・商品の組み合わせはすでに登録されています'); return; }
        throw new Error('HTTP ' + res.status);
      }
    }
    resetForm();
    await loadAll();
  } catch(e) {
    console.error(e);
    alert('保存に失敗しました');
  } finally {
    btn.disabled = false; btn.textContent = '保存する';
  }
}

loadAll();
</script>
</body>
</html>
