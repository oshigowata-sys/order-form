<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MeguRee - 管理者ログイン</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1117; --surface: #1a1d27; --border: #2d3148;
    --orange: #e8630a; --text: #f0ede8; --text-muted: #8b8fa8;
    --danger: #ef4444;
  }
  body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .wrapper { width: 100%; max-width: 420px; padding: 24px; }
  .logo { text-align: center; margin-bottom: 32px; }
  .logo img { width: 160px; filter: brightness(0) invert(1); opacity: 0.9; }
  .badge { display: inline-block; background: var(--orange); color: #fff; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; letter-spacing: 1px; margin-top: 10px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 36px; }
  .card-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
  .card-sub { font-size: 12px; color: var(--text-muted); margin-bottom: 28px; }
  .form-group { margin-bottom: 16px; }
  label { display: block; font-size: 11px; font-weight: 700; color: var(--text-muted); margin-bottom: 7px; letter-spacing: 1px; text-transform: uppercase; }
  input { width: 100%; padding: 12px 14px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 10px; font-size: 14px; font-family: 'Noto Sans JP', sans-serif; color: var(--text); outline: none; transition: border-color 0.2s; }
  input:focus { border-color: var(--orange); }
  .btn { width: 100%; padding: 14px; background: var(--orange); border: none; border-radius: 10px; color: #fff; font-size: 14px; font-weight: 700; font-family: 'Noto Sans JP', sans-serif; cursor: pointer; margin-top: 8px; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); border-radius: 8px; padding: 10px 14px; font-size: 13px; color: var(--danger); margin-bottom: 16px; display: none; }
  .error.show { display: block; }
  .loading { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="wrapper">
  <div class="logo">
    <img src="https://raw.githubusercontent.com/oshigowata-sys/order-form/main/meguree_final%20(2).svg" alt="MeguRee" />
    <div><span class="badge">SUPER ADMIN</span></div>
  </div>
  <div class="card">
    <div class="card-title">管理者ログイン</div>
    <div class="card-sub">MeguRee運営者専用のログインページです</div>
    <div class="error" id="errorMsg">IDまたはパスワードが正しくありません</div>
    <div class="form-group">
      <label>ログインID</label>
      <input type="text" id="loginId" placeholder="管理者ID" />
    </div>
    <div class="form-group">
      <label>パスワード</label>
      <input type="password" id="password" placeholder="パスワード" onkeydown="if(event.key==='Enter')login()" />
    </div>
    <button class="btn" id="loginBtn" onclick="login()">ログインする</button>
  </div>
</div>
<script>
  const SB_URL = 'https://vrnayxmwcbxblfokveok.supabase.co';
  const SB_KEY = 'sb_publishable_NIKtwat_yat2LxbACHVMbA_PT_8F53O';

  if (sessionStorage.getItem('superAdmin')) location.replace('super-dashboard.html');

  async function login() {
    const loginId  = document.getElementById('loginId').value.trim();
    const password = document.getElementById('password').value.trim();
    const btn      = document.getElementById('loginBtn');
    const errEl    = document.getElementById('errorMsg');

    if (!loginId || !password) { errEl.classList.add('show'); return; }
    btn.disabled = true;
    btn.innerHTML = '<span class="loading"></span>確認中...';
    errEl.classList.remove('show');

    try {
      const res = await fetch(`${SB_URL}/rest/v1/rpc/verify_login`, {
        method: 'POST',
        headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' },
        body: JSON.stringify({ p_login_id: loginId, p_password: password })
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      const account = data[0];
      if (!account || account.role !== 'super_admin') throw new Error('invalid');

      sessionStorage.setItem('superAdmin', JSON.stringify({ name: account.name, id: account.login_id }));
      location.replace('super-dashboard.html');
    } catch(e) {
      errEl.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'ログインする';
    }
  }
</script>
</body>
</html>
