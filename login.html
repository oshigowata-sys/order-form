<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MeguRee - ログイン</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #fdf6ee;
    --surface: #ffffff;
    --border: #e8d5bc;
    --orange: #e8630a;
    --orange-light: #f97316;
    --orange-pale: #fff4ec;
    --green: #2d7a4f;
    --green-light: #3da066;
    --green-pale: #edf7f1;
    --text: #1c1409;
    --text-muted: #8c7355;
    --danger: #dc2626;
  }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .bg-dots {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image: radial-gradient(circle, rgba(232,99,10,0.08) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events: none;
  }

  .bg-circle-1 {
    position: fixed; top: -120px; right: -120px;
    width: 400px; height: 400px; border-radius: 50%;
    background: radial-gradient(circle, rgba(232,99,10,0.12) 0%, transparent 70%);
    pointer-events: none;
  }

  .bg-circle-2 {
    position: fixed; bottom: -120px; left: -120px;
    width: 400px; height: 400px; border-radius: 50%;
    background: radial-gradient(circle, rgba(45,122,79,0.1) 0%, transparent 70%);
    pointer-events: none;
  }

  .login-wrapper {
    width: 100%; max-width: 440px; padding: 24px;
    animation: fadeUp 0.5s ease both; position: relative; z-index: 1;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .logo { text-align: center; margin-bottom: 36px; }
  .logo img { width: 200px; margin-bottom: 8px; }
  .logo-sub { font-size: 12px; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; }

  .card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 24px; padding: 40px;
    box-shadow: 0 8px 40px rgba(232,99,10,0.08), 0 2px 8px rgba(0,0,0,0.06);
  }

  .card-header {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 28px; padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  .card-header-icon {
    width: 44px; height: 44px; background: var(--orange-pale);
    border-radius: 12px; display: flex; align-items: center;
    justify-content: center; font-size: 20px;
  }

  .card-title { font-size: 18px; font-weight: 700; }
  .card-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

  .form-group { margin-bottom: 18px; }

  label {
    display: block; font-size: 12px; font-weight: 700;
    color: var(--text-muted); margin-bottom: 8px;
    letter-spacing: 1px; text-transform: uppercase;
  }

  .input-wrapper { position: relative; }

  .input-icon {
    position: absolute; left: 14px; top: 50%;
    transform: translateY(-50%); font-size: 16px;
  }

  input {
    width: 100%; padding: 13px 16px 13px 42px;
    background: var(--bg); border: 1.5px solid var(--border);
    border-radius: 12px; color: var(--text); font-size: 14px;
    font-family: 'Noto Sans JP', sans-serif;
    transition: border-color 0.2s, box-shadow 0.2s; outline: none;
  }

  input:focus {
    border-color: var(--orange);
    box-shadow: 0 0 0 3px rgba(232,99,10,0.1);
    background: white;
  }

  input::placeholder { color: var(--text-muted); opacity: 0.6; }

  .btn {
    width: 100%; padding: 15px;
    background: var(--orange); border: none; border-radius: 12px;
    color: white; font-size: 15px; font-weight: 700;
    font-family: 'Noto Sans JP', sans-serif; cursor: pointer;
    transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
    margin-top: 8px; box-shadow: 0 4px 16px rgba(232,99,10,0.3);
  }

  .btn:hover { background: var(--orange-light); box-shadow: 0 6px 20px rgba(232,99,10,0.4); }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; box-shadow: none; }

  .error-msg {
    background: #fef2f2; border: 1px solid #fecaca;
    border-radius: 10px; padding: 10px 14px; font-size: 13px;
    color: var(--danger); margin-bottom: 16px;
    display: none; align-items: center; gap: 8px;
  }
  .error-msg.show { display: flex; }

  .loading {
    display: inline-block; width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.4); border-top-color: white;
    border-radius: 50%; animation: spin 0.8s linear infinite;
    vertical-align: middle; margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .info-box {
    background: var(--green-pale); border: 1px solid rgba(45,122,79,0.2);
    border-radius: 12px; padding: 14px 16px; margin-top: 20px;
    display: flex; align-items: flex-start; gap: 10px;
  }

  .info-box-icon { font-size: 18px; margin-top: 1px; }
  .info-box-text { font-size: 12px; color: var(--green); line-height: 1.6; }

  .footer { text-align: center; margin-top: 20px; font-size: 11px; color: var(--text-muted); }
</style>
</head>
<body>

<div class="bg-dots"></div>
<div class="bg-circle-1"></div>
<div class="bg-circle-2"></div>

<div class="login-wrapper">
  <div class="logo">
    <img src="https://raw.githubusercontent.com/oshigowata-sys/order-form/main/meguree_final%20(2).svg" alt="MeguRee" />
    <div class="logo-sub">受注管理システム</div>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="card-header-icon">🔐</div>
      <div>
        <div class="card-title">ログイン</div>
        <div class="card-sub">IDとパスワードを入力してください</div>
      </div>
    </div>

    <div class="error-msg" id="errorMsg">
      <span>⚠️</span>
      <span id="errorText">IDまたはパスワードが正しくありません</span>
    </div>

    <div class="form-group">
      <label>ログインID</label>
      <div class="input-wrapper">
        <span class="input-icon">👤</span>
        <input type="text" id="loginId" placeholder="ログインIDを入力" />
      </div>
    </div>

    <div class="form-group">
      <label>パスワード</label>
      <div class="input-wrapper">
        <span class="input-icon">🔑</span>
        <input type="password" id="password" placeholder="パスワードを入力" onkeydown="if(event.key==='Enter')login()" />
      </div>
    </div>

    <button class="btn" id="loginBtn" onclick="login()">ログインする</button>

    <div class="info-box">
      <div class="info-box-icon">💡</div>
      <div class="info-box-text">
        ログインIDとパスワードはシステム管理者から発行されます。<br>
        不明な場合はMeguReeサポートにお問い合わせください。
      </div>
    </div>
  </div>

  <div class="footer">© 2026 MeguRee. All rights reserved.</div>
</div>

<!-- bcryptjs: ブラウザ対応の純JSbcrypt実装 -->
<script src="https://cdn.jsdelivr.net/npm/bcryptjs@2.4.3/dist/bcrypt.min.js"></script>
<script>
  const SB_URL = 'https://vrnayxmwcbxblfokveok.supabase.co';
  const SB_KEY = 'sb_publishable_NIKtwat_yat2LxbACHVMbA_PT_8F53O';

  async function sha256(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
  }

  async function login() {
    const loginId   = document.getElementById('loginId').value.trim();
    const password  = document.getElementById('password').value.trim();
    const btn       = document.getElementById('loginBtn');
    const errorMsg  = document.getElementById('errorMsg');
    const errorText = document.getElementById('errorText');

    if (!loginId || !password) {
      errorText.textContent = 'IDとパスワードを入力してください';
      errorMsg.classList.add('show');
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="loading"></span>確認中...';
    errorMsg.classList.remove('show');

    try {
      const res = await fetch(
        `${SB_URL}/rest/v1/accounts?login_id=eq.${encodeURIComponent(loginId)}&select=id,name,role,customer_id,password,password_hash&limit=1`,
        { headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY } }
      );
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      const account = data[0];
      if (!account) throw new Error('invalid');

      let valid = false;
      if (account.password_hash) {
        valid = await bcrypt.compare(password, account.password_hash);
      }
      if (!valid && account.password) {
        valid = (await sha256(password)) === account.password;
      }

      if (valid) {
        const user = { name: account.name, id: loginId, role: account.role, customerId: account.customer_id };
        sessionStorage.setItem('user', JSON.stringify(user));
        window.location.href = 'dashboard.html';
      } else {
        throw new Error('invalid');
      }
    } catch(e) {
      errorText.textContent = 'IDまたはパスワードが正しくありません';
      errorMsg.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'ログインする';
    }
  }
</script>
</body>
</html>
