<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ダッシュボード | MeguRee</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;background:#f9f7f4;display:flex;min-height:100vh;color:#1a1a1a}
.sidebar{width:200px;background:#1a1a1a;color:#fff;position:fixed;height:100vh;overflow-y:auto;display:flex;flex-direction:column;z-index:100}
.sidebar-logo{padding:20px 16px;font-size:17px;font-weight:700;color:#e8630a;border-bottom:1px solid #2a2a2a;letter-spacing:-0.3px}
.sidebar-logo span{color:#fff;font-weight:400}
.sidebar-section{padding:16px 16px 4px;font-size:10px;color:#555;text-transform:uppercase;letter-spacing:1px}
.sidebar-nav{list-style:none}
.sidebar-nav li a{display:flex;align-items:center;gap:8px;padding:9px 16px;color:#aaa;text-decoration:none;font-size:13.5px;transition:all 0.15s}
.sidebar-nav li a:hover{background:#242424;color:#fff}
.sidebar-nav li a.active{background:#e8630a;color:#fff;font-weight:500}
.sidebar-nav li a .icon{font-size:15px;width:18px;text-align:center}
.main{margin-left:200px;flex:1;padding:28px 32px}
.page-header{margin-bottom:28px}
.page-title{font-size:24px;font-weight:700;color:#1a1a1a}
.page-subtitle{font-size:14px;color:#777;margin-top:4px}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
.kpi-card{background:#fff;border-radius:12px;border:0.5px solid #e8e4df;padding:20px;position:relative;overflow:hidden}
.kpi-card::after{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:var(--accent,#e8630a)}
.kpi-card.green::after{background:#1e6641}
.kpi-card.orange-warn::after{background:#f0a500}
.kpi-label{font-size:12px;color:#888;font-weight:500;margin-bottom:8px}
.kpi-value{font-size:26px;font-weight:700;color:#1a1a1a;line-height:1.2}
.kpi-value.warn{color:#e8630a}
.kpi-sub{font-size:12px;color:#aaa;margin-top:4px}
.section-row{display:grid;grid-template-columns:1fr 1.2fr;gap:20px;align-items:start}
.card{background:#fff;border-radius:12px;border:0.5px solid #e8e4df;padding:20px}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.card-title{font-size:15px;font-weight:700;color:#1a1a1a}
.chart-container{height:200px;display:flex;align-items:flex-end;gap:10px;padding-bottom:24px;position:relative;border-bottom:1px solid #f0ede8}
.chart-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px}
.chart-bar{width:100%;border-radius:6px 6px 0 0;transition:opacity 0.2s;cursor:pointer;min-height:4px}
.chart-bar:hover{opacity:0.8}
.chart-bar.current{background:#e8630a}
.chart-bar.past{background:#ddd}
.chart-label{font-size:11px;color:#999;margin-top:4px}
.chart-amount{font-size:10px;color:#555;font-weight:600}
table{width:100%;border-collapse:collapse}
th{background:#f8f6f3;padding:9px 12px;text-align:left;font-size:12px;color:#666;font-weight:600;border-bottom:1px solid #ece8e2}
td{padding:10px 12px;font-size:13px;color:#333;border-bottom:1px solid #f5f2ee}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fdfcfa}
.badge{display:inline-block;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:500}
.badge-new{background:#fff0e6;color:#e8630a;border:1px solid rgba(232,99,10,0.3)}
.badge-processing{background:#fffbe0;color:#a07800;border:1px solid rgba(200,160,0,0.3)}
.badge-shipped{background:#e6f4ec;color:#1e6641;border:1px solid rgba(30,102,65,0.3)}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:500;transition:opacity 0.15s;text-decoration:none}
.btn:hover{opacity:0.85}
.btn-primary{background:#e8630a;color:#fff}
.btn-sm{padding:4px 10px;font-size:12px}
</style>
</head>
<body>
<nav class="sidebar">
  <div class="sidebar-logo">MeguRee<span>·</span></div>
  <div class="sidebar-section">メニュー</div>
  <ul class="sidebar-nav">
    <li><a href="dashboard.html" class="active"><span class="icon">🏠</span>ダッシュボード</a></li>
    <li><a href="orders.html"><span class="icon">📋</span>受注一覧</a></li>
    <li><a href="invoice-list.html"><span class="icon">🧾</span>請求書管理</a></li>
  </ul>
  <div class="sidebar-section">マスタ管理</div>
  <ul class="sidebar-nav">
    <li><a href="customer.html"><span class="icon">🏢</span>取引先マスタ</a></li>
    <li><a href="products.html"><span class="icon">📦</span>商品マスタ</a></li>
    <li><a href="pricing.html"><span class="icon">💴</span>掛け率管理</a></li>
  </ul>
  <div class="sidebar-section">その他</div>
  <ul class="sidebar-nav">
    <li><a href="login.html"><span class="icon">⚙️</span>設定</a></li>
  </ul>
</nav>
<main class="main">
  <div class="page-header">
    <div class="page-title">ダッシュボード</div>
    <div class="page-subtitle">2026年4月 — 月次サマリー</div>
  </div>

  <div class="kpi-grid">
    <div class="kpi-card">
      <div class="kpi-label">月次売上（税抜）</div>
      <div class="kpi-value">¥482,000</div>
      <div class="kpi-sub">前月比 +8.3%</div>
    </div>
    <div class="kpi-card green">
      <div class="kpi-label">月次利益</div>
      <div class="kpi-value">¥96,400</div>
      <div class="kpi-sub">利益率 20.0%</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">今月の受注件数</div>
      <div class="kpi-value">12件</div>
      <div class="kpi-sub">前月比 +2件</div>
    </div>
    <div class="kpi-card orange-warn">
      <div class="kpi-label">未処理受注</div>
      <div class="kpi-value warn">3件</div>
      <div class="kpi-sub">要対応</div>
    </div>
  </div>

  <div class="section-row">
    <div class="card">
      <div class="card-header">
        <div class="card-title">月次売上推移（過去6ヶ月）</div>
      </div>
      <div class="chart-container" id="chart"></div>
    </div>
    <div class="card">
      <div class="card-header">
        <div class="card-title">直近の受注</div>
        <a href="orders.html" class="btn btn-primary btn-sm">すべて見る →</a>
      </div>
      <div class="table-wrapper">
        <table id="recentOrders"></table>
      </div>
    </div>
  </div>
</main>

<script>
// ===== モックデータ =====
const MONTHLY_SALES = [
  { month: '11月', amount: 310000 },
  { month: '12月', amount: 425000 },
  { month: '1月',  amount: 388000 },
  { month: '2月',  amount: 452000 },
  { month: '3月',  amount: 445000 },
  { month: '4月',  amount: 482000, current: true },
];

const RECENT_ORDERS = [
  { id: 'ORD-2026-012', customer: 'ひかる商店',   date: '2026/4/7', status: '新規受注', total: 36720 },
  { id: 'ORD-2026-011', customer: 'サンエイ札幌', date: '2026/4/6', status: '処理中',   total: 88704 },
  { id: 'ORD-2026-010', customer: 'ひかる商店',   date: '2026/4/5', status: '新規受注', total: 52800 },
  { id: 'ORD-2026-009', customer: '北海道商事',   date: '2026/4/4', status: '出荷済み', total: 124080 },
  { id: 'ORD-2026-008', customer: 'サンエイ札幌', date: '2026/4/2', status: '出荷済み', total: 66000 },
];

// ===== グラフ描画 =====
function renderChart() {
  const max = Math.max(...MONTHLY_SALES.map(d => d.amount));
  const chart = document.getElementById('chart');
  chart.innerHTML = MONTHLY_SALES.map(d => {
    const h = Math.round((d.amount / max) * 160);
    return `
      <div class="chart-bar-wrap">
        <div class="chart-amount">¥${(d.amount/10000).toFixed(0)}万</div>
        <div class="chart-bar ${d.current ? 'current' : 'past'}" style="height:${h}px" title="¥${d.amount.toLocaleString()}"></div>
        <div class="chart-label">${d.month}</div>
      </div>`;
  }).join('');
}

// ===== 直近受注テーブル =====
function renderRecentOrders() {
  const tbl = document.getElementById('recentOrders');
  const badgeMap = { '新規受注': 'badge-new', '処理中': 'badge-processing', '出荷済み': 'badge-shipped' };
  tbl.innerHTML = `
    <thead><tr>
      <th>受注ID</th><th>取引先名</th><th>受注日</th><th>ステータス</th><th>税込合計</th>
    </tr></thead>
    <tbody>
      ${RECENT_ORDERS.map(o => `
        <tr>
          <td style="font-family:monospace;color:#e8630a;font-size:12px">${o.id}</td>
          <td>${o.customer}</td>
          <td style="color:#888;font-size:12px">${o.date}</td>
          <td><span class="badge ${badgeMap[o.status]}">${o.status}</span></td>
          <td style="font-weight:600">¥${o.total.toLocaleString()}</td>
        </tr>`).join('')}
    </tbody>`;
}

renderChart();
renderRecentOrders();
</script>
</body>
</html>
