<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ダッシュボード | MeguRee</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f3ee;--surface:#fff;--border:#e2d9ce;
  --orange:#e8630a;--orange-light:#f97316;--orange-pale:#fff4ec;
  --green:#1e6641;--green-pale:#e8f5ee;
  --yellow:#d97706;--yellow-pale:#fffbeb;
  --text:#1a1208;--text-muted:#7a6a55;
  --sidebar-bg:#1a1208;--sidebar-text:#e8d5bc;
}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex}
.sidebar{width:240px;min-height:100vh;background:var(--sidebar-bg);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100}
.sidebar-logo{padding:20px 24px;border-bottom:1px solid rgba(255,255,255,0.08)}
.sidebar-logo img{width:140px;margin-bottom:4px;display:block}
.sidebar-logo-sub{font-size:10px;color:rgba(232,213,188,0.4);letter-spacing:2px;text-transform:uppercase}
.sidebar-nav{padding:16px 12px;flex:1}
.nav-label{font-size:10px;color:rgba(232,213,188,0.3);letter-spacing:2px;text-transform:uppercase;padding:0 12px;margin-bottom:8px;margin-top:16px}
.nav-label:first-child{margin-top:0}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;color:var(--sidebar-text);font-size:13px;font-weight:500;transition:all 0.2s;text-decoration:none;margin-bottom:2px}
.nav-item:hover{background:rgba(255,255,255,0.06)}
.nav-item.active{background:var(--orange);color:#fff}
.nav-item .icon{font-size:16px;width:20px;text-align:center}
.main{margin-left:240px;flex:1;min-height:100vh;display:flex;flex-direction:column}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar-left{}
.page-title{font-size:18px;font-weight:700}
.page-sub{font-size:12px;color:var(--text-muted);margin-top:2px}
.period-select{display:flex;align-items:center;gap:8px}
.period-select label{font-size:13px;color:var(--text-muted);font-weight:500}
.period-select select{padding:7px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;font-family:'Noto Sans JP',sans-serif;background:var(--surface);color:var(--text);cursor:pointer;outline:none;transition:border-color 0.2s}
.period-select select:focus{border-color:var(--orange)}
.content{padding:28px 32px;flex:1}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
.kpi-card{background:var(--surface);border-radius:14px;border:1px solid var(--border);padding:20px;position:relative;overflow:hidden}
.kpi-card::after{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:var(--orange)}
.kpi-card.green::after{background:var(--green)}
.kpi-card.yellow::after{background:var(--yellow)}
.kpi-label{font-size:11px;color:var(--text-muted);font-weight:600;margin-bottom:8px;letter-spacing:0.5px}
.kpi-value{font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;color:var(--text);line-height:1.2}
.kpi-value.warn{color:var(--orange)}
.kpi-sub{font-size:12px;color:var(--text-muted);margin-top:4px}
.section-col{display:flex;flex-direction:column;gap:20px}
.card{background:var(--surface);border-radius:16px;border:1px solid var(--border);overflow:hidden}
.card-header{display:flex;justify-content:space-between;align-items:center;padding:18px 20px;border-bottom:1px solid var(--border)}
.card-title{font-size:14px;font-weight:700}
.card-body{padding:20px}
.chart-container{height:200px;display:flex;align-items:flex-end;gap:10px;padding-bottom:24px;position:relative;border-bottom:1px solid var(--border)}
.chart-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px}
.chart-bar{width:100%;border-radius:6px 6px 0 0;transition:opacity 0.2s;cursor:pointer;min-height:4px}
.chart-bar:hover{opacity:0.8}
.chart-bar.current{background:var(--orange)}
.chart-bar.past{background:var(--border)}
.chart-label{font-size:11px;color:var(--text-muted);margin-top:4px}
.chart-label.current-label{color:var(--orange);font-weight:700}
.chart-amount{font-size:10px;color:var(--text-muted);font-weight:600}
table{width:100%;border-collapse:collapse}
thead tr{background:var(--bg);border-bottom:1px solid var(--border)}
th{padding:10px 16px;text-align:left;font-size:11px;font-weight:700;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase;white-space:nowrap}
tbody tr{border-bottom:1px solid var(--border);transition:background 0.15s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--bg)}
td{padding:13px 16px;font-size:13px;vertical-align:middle}
.badge{display:inline-block;padding:3px 9px;border-radius:4px;font-size:11px;font-weight:500}
.badge-new{background:var(--orange-pale);color:var(--orange);border:1px solid rgba(232,99,10,0.3)}
.badge-processing{background:var(--yellow-pale);color:var(--yellow);border:1px solid rgba(217,119,6,0.3)}
.badge-shipped{background:var(--green-pale);color:var(--green);border:1px solid rgba(30,102,65,0.3)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:10px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:all 0.2s;font-family:'Noto Sans JP',sans-serif;text-decoration:none}
.btn:hover{opacity:0.85}
.btn-primary{background:var(--orange);color:#fff}
.btn-sm{padding:5px 12px;font-size:12px;border-radius:8px}

.sidebar-footer{padding:12px 12px 16px;border-top:1px solid rgba(255,255,255,0.08);margin-top:auto}
.logout-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;color:rgba(232,213,188,0.5);font-size:13px;font-weight:500;transition:all 0.2s;text-decoration:none}
.logout-item:hover{background:rgba(255,69,0,0.15);color:#ff9a7a}
</style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-logo">
    <img src="https://raw.githubusercontent.com/oshigowata-sys/order-form/main/meguree_final%20(2).svg" alt="MeguRee">
    <div class="sidebar-logo-sub">受注管理システム</div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-label">メニュー</div>
    <a class="nav-item active" href="dashboard.html"><span class="icon">🏠</span>ダッシュボード</a>
    <a class="nav-item" href="orders.html"><span class="icon">📋</span>受注一覧</a>
    <a class="nav-item" href="invoice-list.html"><span class="icon">🧾</span>請求書管理</a>
    <div class="nav-label">マスタ管理</div>
    <a class="nav-item" href="customer.html"><span class="icon">🏢</span>取引先マスタ</a>
    <a class="nav-item" href="products.html"><span class="icon">📦</span>商品マスタ</a>
    <a class="nav-item" href="pricing.html"><span class="icon">💹</span>掛け率管理</a>
    <div class="nav-label">その他</div>
    <a class="nav-item" href="settings.html"><span class="icon">⚙️</span>設定</a>
  </nav>
  <div class="sidebar-footer">
    <a class="logout-item" href="login.html"><span class="icon">🚪</span>ログアウト</a>
  </div>
</aside>
<main class="main">
  <div class="topbar">
    <div class="topbar-left">
      <div class="page-title">ダッシュボード</div>
      <div class="page-sub" id="periodLabel">月次サマリー</div>
    </div>
    <div class="period-select">
      <label>対象月</label>
      <select id="periodSelect" onchange="onPeriodChange()">
        <option value="2025-11">2025年11月</option>
        <option value="2025-12">2025年12月</option>
        <option value="2026-01">2026年 1月</option>
        <option value="2026-02">2026年 2月</option>
        <option value="2026-03">2026年 3月</option>
        <option value="2026-04" selected>2026年 4月</option>
      </select>
    </div>
  </div>
  <div class="content">
    <div class="kpi-grid">
      <div class="kpi-card"><div class="kpi-label">月次売上（税抜）</div><div class="kpi-value" id="kpiSales">¥482,000</div><div class="kpi-sub" id="kpiSalesSub">前月比 +8.3%</div></div>
      <div class="kpi-card green"><div class="kpi-label">月次利益</div><div class="kpi-value" id="kpiProfit">¥96,400</div><div class="kpi-sub" id="kpiProfitSub">利益率 20.0%</div></div>
      <div class="kpi-card"><div class="kpi-label">受注件数</div><div class="kpi-value" id="kpiOrders">12件</div><div class="kpi-sub" id="kpiOrdersSub">前月比 +2件</div></div>
      <div class="kpi-card yellow"><div class="kpi-label">未処理受注</div><div class="kpi-value warn" id="kpiPending">3件</div><div class="kpi-sub" id="kpiPendingSub">要対応</div></div>
    </div>
    <div class="section-col">
      <div class="card">
        <div class="card-header"><div class="card-title">月次売上推移（過去6ヶ月）</div></div>
        <div class="card-body"><div class="chart-container" id="chart"></div></div>
      </div>
      <div class="card">
        <div class="card-header">
          <div class="card-title">直近の受注</div>
          <a href="orders.html" class="btn btn-primary btn-sm">すべて見る →</a>
        </div>
        <table id="recentOrders"></table>
      </div>
    </div>
  </div>
</main>
<script>
  // ===== ページガード =====
  if (!sessionStorage.getItem('user')) { location.replace('login.html'); }
  const SB_URL = 'https://vrnayxmwcbxblfokveok.supabase.co';
  const SB_KEY = 'sb_publishable_NIKtwat_yat2LxbACHVMbA_PT_8F53O';
  const BADGE = {'新規受注':'badge-new','処理中':'badge-processing','出荷済み':'badge-shipped'};

  let allOrders = [];

  function esc(s) {
    if (s == null) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  async function loadDashboard() {
    try {
      const res = await fetch(
        SB_URL + '/rest/v1/orders?select=id,order_code,order_date,status,customers(company_name),order_items(unit_price,quantity,cost_price)',
        {
          headers: {
            'apikey': SB_KEY,
            'Authorization': 'Bearer ' + SB_KEY
          }
        }
      );
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      allOrders = data.map(r => {
        const items = Array.isArray(r.order_items) ? r.order_items : [];
        const total = items.reduce((s, i) => s + (i.unit_price * i.quantity), 0);
        const cost  = items.reduce((s, i) => s + (i.cost_price * i.quantity), 0);
        return {
          id:       r.order_code || r.id || '',
          customer: (r.customers && r.customers.company_name) || '',
          date:     r.order_date || '',
          status:   r.status || '',
          total,
          cost
        };
      });
      buildMonthOptions();
      renderAll();
    } catch(e) {
      console.error('受注データ取得失敗:', e);
      document.getElementById('periodLabel').textContent = 'データ取得に失敗しました';
    }
  } catch(e) {
        parsed = JSON.parse('[' + text + ']');
      }
      allOrders = parsed.map(r => ({
        id:       r['受注ID'] || r.id || '',
        customer: r['取引先名'] || '',
        date:     r['受注日'] || '',
        status:   r['受注ステータス'] || '',
        total:    Number(r['注文合計']) || 0,
        cost:     Number(r['原価合計']) || 0,
      }));
      buildMonthOptions();
      renderAll();
    } catch(e) {
      console.error('受注データ取得失敗:', e);
      document.getElementById('periodLabel').textContent = 'データ取得に失敗しました';
    }
  }

  function buildMonthOptions() {
    const monthSet = new Set();
    allOrders.forEach(o => { if (o.date) monthSet.add(o.date.substring(0, 7)); });
    const months = Array.from(monthSet).sort();

    const sel = document.getElementById('periodSelect');
    if (months.length === 0) {
      sel.innerHTML = '<option value="">データなし</option>';
      return;
    }
    sel.innerHTML = months.map(m => {
      const [y, mo] = m.split('-');
      return `<option value="${m}">${y}年${parseInt(mo)}月</option>`;
    }).join('');

    const now = new Date().toISOString().substring(0, 7);
    sel.value = months.includes(now) ? now : months[months.length - 1];
  }

  function ordersForMonth(key) {
    return allOrders.filter(o => o.date && o.date.startsWith(key));
  }

  function prevMonthKey(key) {
    let [y, m] = key.split('-').map(Number);
    m--; if (m === 0) { m = 12; y--; }
    return `${y}-${String(m).padStart(2,'0')}`;
  }

  function renderAll() {
    const key = document.getElementById('periodSelect').value;
    if (!key) return;
    const [y, mo] = key.split('-');
    document.getElementById('periodLabel').textContent = `${y}年${parseInt(mo)}月 — 月次サマリー`;

    const cur = ordersForMonth(key);
    const sales   = cur.reduce((s,o) => s + o.total, 0);
    const profit  = cur.reduce((s,o) => s + (o.total - o.cost), 0);
    const count   = cur.length;
    const pending = cur.filter(o => o.status === '新規受注').length;

    document.getElementById('kpiSales').textContent   = '¥' + sales.toLocaleString();
    document.getElementById('kpiProfit').textContent  = '¥' + profit.toLocaleString();
    document.getElementById('kpiProfitSub').textContent = sales > 0 ? '利益率 ' + (profit/sales*100).toFixed(1) + '%' : '—';
    document.getElementById('kpiOrders').textContent  = count + '件';
    document.getElementById('kpiPending').textContent = pending + '件';
    document.getElementById('kpiPendingSub').textContent = pending > 0 ? '要対応' : '処理待ちなし';

    const prev = ordersForMonth(prevMonthKey(key));
    const prevSales = prev.reduce((s,o) => s + o.total, 0);
    if (prevSales > 0) {
      const diff = ((sales - prevSales) / prevSales * 100).toFixed(1);
      document.getElementById('kpiSalesSub').textContent = diff >= 0 ? `前月比 ↑ +${diff}%` : `前月比 ↓ ${diff}%`;
    } else {
      document.getElementById('kpiSalesSub').textContent = '—';
    }
    const cDiff = count - prev.length;
    document.getElementById('kpiOrdersSub').textContent = `前月比 ${cDiff >= 0 ? '+' : ''}${cDiff}件`;

    renderChart(key);
    renderRecentOrders(cur);
  }

  function renderChart(key) {
    const chartMonths = [];
    let [cy, cm] = key.split('-').map(Number);
    for (let i = 5; i >= 0; i--) {
      let m = cm - i, y = cy;
      if (m <= 0) { m += 12; y--; }
      const k = `${y}-${String(m).padStart(2,'0')}`;
      const sales = ordersForMonth(k).reduce((s,o) => s + o.total, 0);
      chartMonths.push({ key: k, label: `${m}月`, sales });
    }
    const max = Math.max(...chartMonths.map(d => d.sales), 1);
    document.getElementById('chart').innerHTML = chartMonths.map(d => {
      const h = Math.round((d.sales / max) * 160);
      const isCurrent = d.key === key;
      return `<div class="chart-bar-wrap">
        <div class="chart-amount">${d.sales > 0 ? '¥'+(d.sales/10000).toFixed(0)+'万' : '—'}</div>
        <div class="chart-bar ${isCurrent?'current':'past'}" style="height:${Math.max(h,4)}px" title="¥${d.sales.toLocaleString()}"></div>
        <div class="chart-label ${isCurrent?'current-label':''}">${d.label}</div>
      </div>`;
    }).join('');
  }

  function renderRecentOrders(orders) {
    const sorted = [...orders].sort((a,b) => b.date.localeCompare(a.date)).slice(0, 5);
    document.getElementById('recentOrders').innerHTML =
      `<thead><tr><th>受注ID</th><th>取引先名</th><th>受注日</th><th>ステータス</th><th style="text-align:right">注文合計</th></tr></thead>
      <tbody>${sorted.length ? sorted.map(o=>`<tr>
        <td style="font-family:'Space Grotesk',sans-serif;color:var(--orange);font-size:12px">${esc(o.id)}</td>
        <td style="font-weight:500">${esc(o.customer)}</td>
        <td style="color:var(--text-muted);font-size:12px">${esc(o.date)}</td>
        <td><span class="badge ${BADGE[o.status]||''}">${esc(o.status)}</span></td>
        <td style="font-weight:700;text-align:right;font-family:'Space Grotesk',sans-serif">¥${o.total.toLocaleString()}</td>
      </tr>`).join('') : '<tr><td colspan="5" style="text-align:center;color:var(--text-muted);padding:20px">この月の受注はありません</td></tr>'}</tbody>`;
  }

  function onPeriodChange() { renderAll(); }

  loadDashboard();
</script>
</body>
</html>
