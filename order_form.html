<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注文フォーム</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f4f0;
      --surface: #ffffff;
      --border: #e0ddd6;
      --accent: #2d6a4f;
      --accent-light: #e8f4ee;
      --text: #1a1a1a;
      --text-muted: #6b6b6b;
      --danger: #c0392b;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 40px 16px;
    }

    .container { max-width: 720px; margin: 0 auto; }

    .header { text-align: center; margin-bottom: 40px; }
    .header h1 { font-size: 26px; font-weight: 700; letter-spacing: 0.05em; color: var(--accent); }
    .header p { margin-top: 8px; color: var(--text-muted); font-size: 14px; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px;
      margin-bottom: 24px;
      box-shadow: var(--shadow);
    }

    .card h2 {
      font-size: 15px; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.08em;
      margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid var(--border);
    }

    .form-group { margin-bottom: 16px; }

    label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; color: var(--text-muted); }

    input[type="text"], select {
      width: 100%; padding: 10px 14px; border: 1px solid var(--border);
      border-radius: 8px; font-size: 15px; font-family: inherit;
      background: #fafafa; transition: border-color 0.2s; outline: none;
    }

    input[type="text"]:focus, select:focus { border-color: var(--accent); background: #fff; }

    .product-list { display: flex; flex-direction: column; gap: 10px; }

    .product-row {
      display: grid; grid-template-columns: 1fr 100px 80px 32px;
      gap: 10px; align-items: center; padding: 12px 14px;
      border: 1px solid var(--accent); border-radius: 8px;
      background: var(--accent-light);
    }

    .product-name { font-size: 15px; font-weight: 500; }
    .product-price { font-size: 13px; color: var(--text-muted); text-align: right; }

    .qty-input {
      width: 100%; padding: 6px 10px; border: 1px solid var(--border);
      border-radius: 6px; font-size: 14px; font-family: inherit;
      text-align: center; background: #fff; outline: none;
    }

    .qty-input:focus { border-color: var(--accent); }

    .remove-btn {
      width: 32px; height: 32px; border: none; background: none;
      cursor: pointer; color: #ccc; font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 6px; transition: color 0.2s, background 0.2s;
    }

    .remove-btn:hover { color: var(--danger); background: #fdecea; }

    .add-product { display: flex; gap: 10px; margin-top: 14px; }
    .add-product select { flex: 1; }

    .add-btn {
      padding: 10px 20px; background: var(--accent); color: #fff;
      border: none; border-radius: 8px; font-size: 14px; font-weight: 500;
      font-family: inherit; cursor: pointer; white-space: nowrap; transition: opacity 0.2s;
    }

    .add-btn:hover { opacity: 0.85; }

    .total-bar {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border);
    }

    .total-label { font-size: 14px; color: var(--text-muted); }
    .total-amount { font-size: 22px; font-weight: 700; color: var(--accent); }

    .submit-btn {
      width: 100%; padding: 16px; background: var(--accent); color: #fff;
      border: none; border-radius: 10px; font-size: 16px; font-weight: 700;
      font-family: inherit; cursor: pointer; letter-spacing: 0.05em;
      transition: opacity 0.2s, transform 0.1s;
    }

    .submit-btn:hover { opacity: 0.88; }
    .submit-btn:active { transform: scale(0.99); }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .success { display: none; text-align: center; padding: 60px 20px; }
    .success-icon { font-size: 60px; margin-bottom: 20px; }
    .success h2 { font-size: 22px; font-weight: 700; color: var(--accent); margin-bottom: 10px; }
    .success p { color: var(--text-muted); font-size: 15px; }

    .error-msg { color: var(--danger); font-size: 13px; margin-top: 6px; display: none; }
    .empty-msg { text-align: center; color: var(--text-muted); font-size: 14px; padding: 20px 0; }
    .invalid-screen { display: none; text-align: center; padding: 80px 20px; }
    .invalid-screen.show { display: block; }
    .invalid-icon { font-size: 56px; margin-bottom: 20px; }
    .invalid-title { font-size: 20px; font-weight: 700; color: var(--danger); margin-bottom: 10px; }
    .invalid-sub { color: var(--text-muted); font-size: 14px; line-height: 1.8; }
  </style>
</head>
<body>
<div class="container">

  <div class="header">
    <h1>📦 注文フォーム</h1>
    <p>商品を選択して注文を送信してください</p>
  </div>

  <div class="invalid-screen" id="invalidScreen">
    <div class="invalid-icon">🔗</div>
    <div class="invalid-title">URLが正しくありません</div>
    <div class="invalid-sub">このURLは無効です。<br>担当者から共有された正しいURLをご使用ください。</div>
  </div>

  <div id="formArea">

    <div class="card">
      <h2>取引先情報</h2>
      <div class="form-group">
        <label>会社名 / 店舗名 <span style="color:var(--danger)">*</span></label>
        <input type="text" id="companyName" placeholder="例：メグリー">
        <div class="error-msg" id="companyError">会社名を入力してください</div>
      </div>
      <div class="form-group">
        <label>担当者名</label>
        <input type="text" id="personName" placeholder="例：担当者名">
      </div>
    </div>

    <div class="card">
      <h2>注文商品</h2>

      <div class="product-list" id="productList">
        <div class="empty-msg">商品が追加されていません</div>
      </div>

      <div class="total-bar">
        <span class="total-label">注文合計</span>
        <span class="total-amount" id="totalAmount">¥0</span>
      </div>

      <div class="add-product">
        <select id="productSelect">
          <option value="">-- 読み込み中... --</option>
        </select>
        <button class="add-btn" onclick="addProduct()">＋ 追加</button>
      </div>
      <div class="error-msg" id="productError">1つ以上の商品を追加してください</div>
    </div>

    <div class="card">
      <h2>備考</h2>
      <div class="form-group">
        <input type="text" id="note" placeholder="配送日の希望など（任意）">
      </div>
    </div>

    <div class="error-msg" id="submitError" style="margin-bottom:12px;font-size:14px;"></div>
    <button class="submit-btn" id="submitBtn" onclick="submitOrder()">注文を確定する</button>

  </div>

  <div class="success" id="successArea">
    <div class="success-icon">✅</div>
    <h2>注文を受け付けました</h2>
    <p>ご注文ありがとうございます。<br>担当者より確認のご連絡をいたします。</p>
  </div>

</div>

<script>
  // =============================
  // Supabase 接続設定
  // =============================
  const SB_URL = 'https://vrnayxmwcbxblfokveok.supabase.co';
  const SB_KEY = 'sb_publishable_NIKtwat_yat2LxbACHVMbA_PT_8F53O';
  // =============================

  function sbFetch(path, options = {}) {
    return fetch(SB_URL + path, {
      ...options,
      headers: {
        'apikey': SB_KEY,
        'Authorization': 'Bearer ' + SB_KEY,
        'Content-Type': 'application/json',
        ...(options.headers || {})
      }
    });
  }

  // テナントIDをURLパラメータから取得（必須）
  const TENANT_ID = new URLSearchParams(location.search).get('tenant') || null;
  if (!TENANT_ID) {
    document.getElementById('formArea').style.display = 'none';
    document.getElementById('invalidScreen').classList.add('show');
  }

  // ===== セッションキャッシュ =====
  const sessionCache = {};

  // XSSエスケープ：外部データをHTMLに埋め込む前に必ず通す
  function esc(str) {
    if (str === null || str === undefined) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#x27;');
  }

  function showError(message) {
    const el = document.getElementById('submitError');
    el.textContent = message;
    el.style.display = 'block';
  }

  function hideError() {
    document.getElementById('submitError').style.display = 'none';
  }

  let items = [];
  let products = [];

  async function loadProducts() {
    const sel = document.getElementById('productSelect');
    try {
      if (sessionCache.products) {
        products = sessionCache.products;
      } else {
        const tenantFilter = TENANT_ID ? `tenant_id=eq.${TENANT_ID}&` : '';
        const res = await sbFetch(`/rest/v1/products?${tenantFilter}select=id,product_name,price&order=product_name`);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        products = data.map(p => ({
          id: p.id,
          name: p.product_name || '',
          price: p.price || 0
        }));
        sessionCache.products = products;
      }

      sel.innerHTML = '<option value="">-- 商品を選択 --</option>' +
        products.map(p =>
          `<option value="${esc(p.id)}">　${esc(p.name)}　¥${Number(p.price).toLocaleString()}</option>`
        ).join('');

    } catch(e) {
      sel.innerHTML = '<option value="">-- 読み込み失敗 --</option>';
      console.error(e);
    }
  }

  function addProduct() {
    const sel = document.getElementById('productSelect');
    const val = sel.value;
    if (!val) return;

    const product = products.find(p => String(p.id) === String(val));
    if (!product) return;

    if (items.find(i => String(i.id) === String(product.id))) {
      alert('この商品はすでに追加されています');
      return;
    }

    items.push({ ...product, qty: 1 });
    sel.value = '';
    renderList();
  }

  function removeProduct(id) {
    items = items.filter(i => String(i.id) !== String(id));
    renderList();
  }

  function updateQty(id, qty) {
    const item = items.find(i => String(i.id) === String(id));
    if (item) item.qty = parseInt(qty) || 1;
    updateTotal();
  }

  function renderList() {
    const list = document.getElementById('productList');
    if (items.length === 0) {
      list.innerHTML = '<div class="empty-msg">商品が追加されていません</div>';
      updateTotal();
      return;
    }

    list.innerHTML = items.map(item => `
      <div class="product-row">
        <span class="product-name">${esc(item.name)}</span>
        <span class="product-price">¥${Number(item.price).toLocaleString()}</span>
        <input class="qty-input" type="number" min="1" value="${item.qty}"
          onchange="updateQty('${esc(item.id)}', this.value)">
        <button class="remove-btn" onclick="removeProduct('${esc(item.id)}')">✕</button>
      </div>
    `).join('');

    updateTotal();
  }

  function updateTotal() {
    const total = items.reduce((sum, i) => sum + i.price * i.qty, 0);
    document.getElementById('totalAmount').textContent = '¥' + total.toLocaleString();
  }

  async function generateOrderCode() {
    const today = new Date().toISOString().slice(0, 10);
    const dateStr = today.replace(/-/g, '');
    try {
      const res = await sbFetch(`/rest/v1/orders?order_date=eq.${today}&select=id`);
      if (!res.ok) return `ORD-${dateStr}-001`;
      const data = await res.json();
      const seq = String(data.length + 1).padStart(3, '0');
      return `ORD-${dateStr}-${seq}`;
    } catch(e) {
      return `ORD-${dateStr}-001`;
    }
  }

  async function getRate(customerId, productId) {
    try {
      const res = await sbFetch(
        `/rest/v1/pricing?customer_id=eq.${customerId}&product_id=eq.${productId}&select=rate`
      );
      if (!res.ok) return 1.0;
      const data = await res.json();
      return (data.length > 0 && data[0].rate != null) ? Number(data[0].rate) : 1.0;
    } catch(e) {
      return 1.0;
    }
  }

  async function submitOrder() {
    let valid = true;

    const company = document.getElementById('companyName').value.trim();
    if (!company) {
      document.getElementById('companyError').style.display = 'block';
      valid = false;
    } else {
      document.getElementById('companyError').style.display = 'none';
    }

    if (items.length === 0) {
      document.getElementById('productError').style.display = 'block';
      valid = false;
    } else {
      document.getElementById('productError').style.display = 'none';
    }

    if (!valid) return;

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = '送信中...';
    hideError();

    // フォームの会社名から customer_id を取得
    let customerId = null;
    try {
      const companyName = document.getElementById('companyName').value.trim();
      const tenantFilter = TENANT_ID ? `&tenant_id=eq.${TENANT_ID}` : '';
      const custRes = await sbFetch(
        '/rest/v1/customers?company_name=eq.' + encodeURIComponent(companyName) + tenantFilter + '&select=id&limit=1'
      );
      if (custRes.ok) {
        const custData = await custRes.json();
        if (custData.length > 0) customerId = custData[0].id;
      }
    } catch(e) {
      console.warn('顧客検索エラー:', e);
    }

    try {
      // 1. 各商品の掛け率を取得し unit_price を計算
      const orderItemsPayload = await Promise.all(items.map(async item => {
        const rate = customerId ? await getRate(customerId, item.id) : 1.0;
        const unit_price = Math.round(item.price * rate);
        return {
          product_id: item.id,
          quantity: item.qty,
          unit_price
        };
      }));

      // 2. orders テーブルに INSERT
      const today = new Date().toISOString().slice(0, 10);
      const orderCode = await generateOrderCode();
      const orderRes = await sbFetch('/rest/v1/orders', {
        method: 'POST',
        headers: { 'Prefer': 'return=representation' },
        body: JSON.stringify({
          customer_id: customerId,
          order_code: orderCode,
          order_date: today,
          status: '新規受注',
          tenant_id: TENANT_ID
        })
      });

      if (!orderRes.ok) {
        const errText = await orderRes.text();
        throw new Error('注文の登録に失敗しました: ' + errText);
      }

      const orderData = await orderRes.json();
      const orderId = orderData[0].id;

      // 3. order_items テーブルに一括 INSERT
      const itemsRes = await sbFetch('/rest/v1/order_items', {
        method: 'POST',
        headers: { 'Prefer': 'return=representation' },
        body: JSON.stringify(orderItemsPayload.map(i => ({ ...i, order_id: orderId })))
      });

      if (!itemsRes.ok) {
        const errText = await itemsRes.text();
        throw new Error('明細の登録に失敗しました: ' + errText);
      }

      // 4. 成功表示
      document.getElementById('formArea').style.display = 'none';
      document.getElementById('successArea').style.display = 'block';

    } catch(e) {
      console.error(e);
      btn.disabled = false;
      btn.textContent = '注文を確定する';
      showError(e.message || '送信に失敗しました。もう一度お試しください。');
    }
  }

  loadProducts();
</script>
</body>
</html>
