<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MeguRee - 商品マスタ管理</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f3ee;
    --surface: #ffffff;
    --border: #d4c9bb;
    --orange: #e8630a;
    --orange-light: #f97316;
    --orange-pale: #fff4ec;
    --green: #1e6641;
    --green-light: #2d9a5f;
    --green-pale: #e8f5ee;
    --text: #1a1208;
    --text-muted: #7a6a55;
    --sidebar-bg: #1a1208;
    --sidebar-text: #e8d5bc;
    --sidebar-active: #e8630a;
  }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
  }

  /* ===== SIDEBAR ===== */
  .sidebar {
    width: 240px; min-height: 100vh; background: var(--sidebar-bg);
    display: flex; flex-direction: column;
    position: fixed; top: 0; left: 0; bottom: 0; z-index: 100;
  }
  .sidebar-logo { padding: 20px 24px; border-bottom: 1px solid rgba(255,255,255,0.08); }
  .sidebar-logo img { width: 140px; margin-bottom: 4px; }
  .sidebar-nav { padding: 16px 12px; flex: 1; }
  .nav-label {
    font-size: 10px; color: rgba(232,213,188,0.3); letter-spacing: 2px;
    text-transform: uppercase; padding: 0 12px; margin-bottom: 8px; margin-top: 16px;
  }
  .nav-item {
    display: flex; align-items: center; gap: 10px; padding: 10px 12px;
    border-radius: 10px; cursor: pointer; color: var(--sidebar-text);
    font-size: 13px; font-weight: 500; transition: all 0.2s;
    text-decoration: none; margin-bottom: 2px;
  }
  .nav-item:hover { background: rgba(255,255,255,0.06); }
  .nav-item.active { background: var(--orange); color: white; }
  .nav-item .icon { font-size: 16px; width: 20px; text-align: center; }
  .sidebar-footer { padding: 16px 12px; border-top: 1px solid rgba(255,255,255,0.08); }
  .user-card {
    display: flex; align-items: center; gap: 10px; padding: 10px 12px;
    border-radius: 10px; background: rgba(255,255,255,0.05);
  }
  .user-avatar {
    width: 32px; height: 32px; border-radius: 8px; background: var(--orange);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; color: white; flex-shrink: 0;
  }
  .user-name { font-size: 12px; color: var(--sidebar-text); font-weight: 500; }
  .user-role { font-size: 10px; color: rgba(232,213,188,0.4); }
  .logout-btn {
    margin-top: 8px; width: 100%; padding: 8px; background: none;
    border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
    color: rgba(232,213,188,0.5); font-size: 12px; cursor: pointer;
    transition: all 0.2s; font-family: 'Noto Sans JP', sans-serif;
  }
  .logout-btn:hover { background: rgba(255,255,255,0.05); color: var(--sidebar-text); }

  /* ===== MAIN ===== */
  .main { margin-left: 240px; flex: 1; min-height: 100vh; display: flex; flex-direction: column; }
  .topbar {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 16px 32px; display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 50;
    box-shadow: 0 1px 8px rgba(15,10,5,0.06);
  }
  .page-title { font-size: 18px; font-weight: 700; font-family: 'Space Grotesk', sans-serif; letter-spacing: -0.3px; }
  .page-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .content { padding: 28px 32px; flex: 1; }

  /* ===== TABLE ===== */
  .section-header {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;
  }
  .section-title { font-size: 15px; font-weight: 700; font-family: 'Space Grotesk', sans-serif; }
  .table-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden;
    box-shadow: 0 2px 12px rgba(15,10,5,0.08);
  }
  .table-card-header{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;border-bottom:1px solid var(--border)}
  .table-card-title{font-size:14px;font-weight:700}
  .search-input{padding:6px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:12px;font-family:'Noto Sans JP',sans-serif;color:var(--text);background:var(--surface);outline:none;transition:border-color 0.2s;width:220px}
  .search-input:focus{border-color:var(--orange);background:#fff}
  table { width: 100%; border-collapse: collapse; }
  thead tr { background: var(--bg); border-bottom: 1px solid var(--border); }
  th {
    padding: 12px 16px; text-align: left; font-size: 11px; font-weight: 700;
    color: var(--text-muted); letter-spacing: 1.2px; text-transform: uppercase; white-space: nowrap;
    font-family: 'Space Grotesk', sans-serif;
  }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--bg); }
  td { padding: 14px 16px; font-size: 13px; vertical-align: middle; }
  .product-name { font-weight: 700; font-size: 13px; }
  .amount {
    font-family: 'Space Grotesk', sans-serif; font-weight: 700; color: var(--orange);
  }

  .spinner {
    display: inline-block; width: 20px; height: 20px;
    border: 2px solid var(--border); border-top-color: var(--orange);
    border-radius: 50%; animation: spin 0.8s linear infinite;
    vertical-align: middle; margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-row td { text-align: center; padding: 48px; color: var(--text-muted); font-size: 14px; }
  .empty-state { text-align: center; padding: 64px 24px; color: var(--text-muted); }
  .empty-state-icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state-text { font-size: 14px; }

  /* ===== BUTTONS ===== */
  .btn { display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:700;transition:all 0.2s;font-family:'Noto Sans JP',sans-serif; }
  .btn:hover { opacity:0.85; }
  .btn-primary { background:var(--orange);color:#fff; }
  .btn-outline { background:var(--surface);border:1.5px solid var(--orange);color:var(--orange); }
  .btn-sm { padding:5px 12px;font-size:12px;border-radius:8px; }

  .btn-secondary {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--bg); color: var(--text); padding: 7px 14px;
    border-radius: 8px; font-size: 12px; font-weight: 500;
    border: 1px solid var(--border); cursor: pointer; transition: all 0.2s;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .btn-secondary:hover { border-color: var(--orange); color: var(--orange); }

  .btn-danger {
    display: inline-flex; align-items: center; gap: 6px;
    background: #fef2f2; color: #dc2626; padding: 7px 14px;
    border-radius: 8px; font-size: 12px; font-weight: 500;
    border: 1px solid #fecaca; cursor: pointer; transition: all 0.2s;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .btn-danger:hover { background: #fee2e2; }

  /* ===== MODAL ===== */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200;
    display: none; align-items: center; justify-content: center;
    padding: 24px; backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); border-radius: 14px; width: 100%; max-width: 520px;
    max-height: 80vh; overflow-y: auto; box-shadow: 0 24px 64px rgba(0,0,0,0.2);
    animation: modalIn 0.3s ease;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.95) translateY(10px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  .modal-header {
    padding: 24px 28px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; background: var(--surface); border-radius: 14px 14px 0 0;
  }
  .modal-title { font-size: 16px; font-weight: 700; font-family: 'Space Grotesk', sans-serif; letter-spacing: -0.2px; }
  .modal-close {
    width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border);
    background: none; cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center; transition: background 0.2s;
  }
  .modal-close:hover { background: var(--bg); }
  .modal-body { padding: 24px 28px; }

  .form-group { margin-bottom: 16px; }
  .form-label {
    display: block; font-size: 12px; font-weight: 600;
    color: var(--text-muted); margin-bottom: 6px; letter-spacing: 0.5px;
  }
  .form-input {
    width: 100%; padding: 10px 14px; border: 1px solid var(--border);
    border-radius: 10px; font-size: 13px; font-family: 'Noto Sans JP', sans-serif;
    color: var(--text); background: var(--bg); outline: none; transition: border-color 0.2s;
  }
  .form-input:focus { border-color: var(--orange); background: white; }
  .form-input::placeholder { color: #bbb; }

  .form-actions { display: flex; gap: 12px; align-items: center; margin-top: 20px; }
  .save-success {
    display: none; align-items: center; gap: 6px;
    font-size: 13px; color: var(--green); font-weight: 600;
  }
  .save-success.show { display: flex; }

.sidebar-footer{padding:12px 12px 16px;border-top:1px solid rgba(255,255,255,0.08);margin-top:auto}
.logout-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;color:rgba(232,213,188,0.5);font-size:13px;font-weight:500;transition:all 0.2s;text-decoration:none}
.logout-item:hover{background:rgba(255,69,0,0.15);color:#ff9a7a}
.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px}
.kpi-card{background:var(--surface);border-radius:12px;border:1px solid var(--border);padding:18px 20px;position:relative;overflow:hidden;box-shadow:0 2px 10px rgba(15,10,5,0.07)}
.kpi-card::after{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:var(--orange)}
.kpi-card.green::after{background:var(--green)}
.kpi-card.yellow::after{background:#d97706}
.kpi-label{font-size:11px;color:var(--text-muted);font-weight:700;margin-bottom:6px;letter-spacing:0.8px;text-transform:uppercase}
.kpi-value{font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;color:var(--text);line-height:1.2}
.kpi-value.green{color:var(--green)}
.kpi-sub{font-size:12px;color:var(--text-muted);margin-top:3px}
.topbar-user{display:flex;align-items:center;gap:10px}
.topbar-user-name{font-size:13px;font-weight:600;color:var(--text)}
.topbar-user-role{font-size:11px;color:var(--text-muted)}
.topbar-avatar{width:34px;height:34px;border-radius:10px;background:var(--orange);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}

  .category-group-row { cursor: pointer; user-select: none; }
  .category-group-row td {
    background: #f0ebe3; font-size: 11px; font-weight: 700;
    color: var(--text-muted); padding: 9px 16px;
    letter-spacing: 0.8px; text-transform: uppercase;
    border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
    border-left: 3px solid var(--orange);
  }
  .category-group-row:hover td { background: #e8e2d8; color: var(--text); }
  .category-group-row:first-child td { border-top: none; }
  .cat-toggle {
    float: right; font-size: 11px; transition: transform 0.25s; display: inline-block; opacity: 0.5;
  }
  .category-group-row.collapsed .cat-toggle { transform: rotate(-90deg); }
  .cat-count {
    display: inline-block; background: rgba(26,18,8,0.07); color: var(--text-muted);
    border-radius: 10px; padding: 1px 8px; font-size: 10px; font-weight: 600;
    margin-left: 8px; vertical-align: middle;
  }
  .cat-product-row.cat-hidden { display: none; }
</style>

<!-- MAIN -->
<main class="main">
  <div class="topbar">
    <div>
      <div class="page-title">商品マスタ管理</div>
      <div class="page-sub">商品の追加・編集・基本単価の設定を管理します</div>
    </div>
    <div style="display:flex;align-items:center;gap:14px">
      <button class="btn btn-primary" onclick="openAddModal()">＋ 新規商品</button>
      <div class="topbar-user">
        <div>
          <div class="topbar-user-name" id="topbarUserName"></div>
          <div class="topbar-user-role" id="topbarUserRole"></div>

      </div>
    </div>
  </div>

  <div class="content">
    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="kpi-label">商品数</div>
        <div class="kpi-value" id="kpiTotal">—</div>
        <div class="kpi-sub">登録済み</div>
      </div>
      <div class="kpi-card green">
        <div class="kpi-label">食品（軽減8%）</div>

      <div class="kpi-card yellow">

      <table>
        <thead>
          <tr>
            <th>商品コード</th>
            <th>商品名</th>

          </tr>
        </thead>
        <tbody id="productTableBody">
          <tr class="loading-row"><td colspan="5"><span class="spinner"></span>読み込み中...</td></tr>
        </tbody>
      </table>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">

      <div class="modal-title" id="modalTitle">商品を追加</div>
      <button class="modal-close" onclick="closeModal()">✕</button>

        <button class="btn-primary" id="saveBtn" onclick="saveProduct()">保存する</button>

<script src="auth.js"></script>
<script>
  // ===== ページガード =====
  checkAuth();
  const SB_URL = 'https://vrnayxmwcbxblfokveok.supabase.co';
  const SB_KEY = 'sb_publishable_NIKtwat_yat2LxbACHVMbA_PT_8F53O';
  const userData = JSON.parse(sessionStorage.getItem('user') || '{}');
  const { tenantId, name: userName, role: userRole } = userData;
  (() => {
    const nameEl = document.getElementById('topbarUserName');
    const roleEl = document.getElementById('topbarUserRole');
    const avatarEl = document.getElementById('topbarAvatar');
    if (userName) { nameEl.textContent = userName; roleEl.textContent = userRole === 'admin' ? '管理者' : 'スタッフ'; avatarEl.textContent = userName.charAt(0); }
  })();

  function sbFetch(path, options = {}) {
    return fetch(SB_URL + path, {
      ...options,
      headers: {
        'apikey': SB_KEY,
        'Authorization': 'Bearer ' + getAccessToken(),
        'Content-Type': 'application/json',
        'Prefer': 'return=representation',
        ...(options.headers || {})
      }
    });
  }

  let products = [];
  let currentSearch = '';

  function onSearchInput(val) {
    currentSearch = val.trim();
    renderProducts();
  }

  function esc(str) {
    if (str === null || str === undefined) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  async function loadProducts() {
    const tbody = document.getElementById('productTableBody');
    tbody.innerHTML = '<tr class="loading-row"><td colspan="5"><span class="spinner"></span>読み込み中...</td></tr>';
    try {
      const res = await sbFetch(`/rest/v1/products?tenant_id=eq.${tenantId}&select=*&order=category.nullslast,product_name`);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      products = data.map(r => ({
        id:       r.id,
        code:     r.product_code || '',
        name:     r.product_name || '',
        price:    Number(r.price) || 0,
        isFood:   !!r.is_food,
        category: r.category || '',
        imageUrl: r.image_url || '',
      }));
      renderProducts();
    } catch(e) {
      console.error('商品データ取得失敗:', e);
      tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:20px;color:var(--text-muted)">データ取得に失敗しました</td></tr>';
    }
  }

  function updateKPIs() {
    const food = products.filter(p => p.isFood).length;
    document.getElementById('kpiTotal').textContent = products.length;
    document.getElementById('kpiFood').textContent = food;
    document.getElementById('kpiStandard').textContent = products.length - food;
  }

  function renderProducts() {
    updateKPIs();
    const tbody = document.getElementById('productTableBody');
    if (products.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:20px;color:var(--text-muted)">商品が登録されていません</td></tr>';
      return;
    }
    const q = currentSearch.toLowerCase();
    const list = q ? products.filter(p => p.name.toLowerCase().includes(q) || p.code.toLowerCase().includes(q)) : products;
    if (list.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:20px;color:var(--text-muted)">該当する商品が見つかりません</td></tr>';
      return;
    }
    const groups = {};
    list.forEach(p => {
      const cat = p.category || '未分類';
      if (!groups[cat]) groups[cat] = [];
      groups[cat].push(p);
    });
    const catKeys = Object.keys(groups).sort((a, b) => {
      if (a === '未分類') return 1;
      if (b === '未分類') return -1;
      return a.localeCompare(b, 'ja');
    });
    let html = '';
    catKeys.forEach((cat, idx) => {
      const catId = 'cg' + idx;
      html += `<tr class="category-group-row" data-catid="${catId}" data-catname="${esc(cat)}" onclick="toggleCategory('${catId}')">
        <td colspan="5">${esc(cat)}<span class="cat-count">${groups[cat].length}</span><span class="cat-toggle">▼</span></td>
      </tr>`;
      groups[cat].forEach(p => {
        html += `<tr class="cat-product-row" data-cat="${catId}">
          <td style="font-family:'Space Grotesk',sans-serif;font-size:12px;color:var(--text-muted)">${esc(p.code)}</td>
          <td style="font-weight:500;display:flex;align-items:center;gap:8px">${p.imageUrl ? `<img src="${esc(p.imageUrl)}" style="width:32px;height:32px;object-fit:cover;border-radius:6px;flex-shrink:0" onerror="this.style.display='none'" />` : ''}<span>${esc(p.name)}</span></td>
          <td style="font-family:'Space Grotesk',sans-serif">¥${p.price.toLocaleString()}</td>
          <td>${p.isFood
            ? '<span style="background:var(--green-pale);color:var(--green);border:1px solid rgba(30,102,65,0.3);padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500">軽減8%</span>'
            : '<span style="background:var(--bg);color:var(--text-muted);border:1px solid var(--border);padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500">標準10%</span>'
          }</td>
          <td style="white-space:nowrap">
            <button class="btn btn-outline btn-sm" onclick="openEditModal('${esc(p.id)}')">編集</button>
            <button class="btn btn-sm" style="background:#fff0f0;border:1px solid #fca5a5;color:#dc2626;margin-left:4px" onclick="deleteProduct('${esc(p.id)}')">削除</button>
          </td>
        </tr>`;
      });
    });
    tbody.innerHTML = html;

    const savedState = JSON.parse(sessionStorage.getItem('meguree_cat_state') || '{}');
    catKeys.forEach((cat, idx) => {
      if (!savedState[cat]) return;
      const catId = 'cg' + idx;
      const header = document.querySelector(`.category-group-row[data-catid="${catId}"]`);
      const rows = document.querySelectorAll(`.cat-product-row[data-cat="${catId}"]`);
      if (header) {
        header.classList.add('collapsed');
        rows.forEach(r => r.classList.add('cat-hidden'));
      }
    });
  }

  function toggleCategory(catId) {
    const header = document.querySelector(`.category-group-row[data-catid="${catId}"]`);
    const rows = document.querySelectorAll(`.cat-product-row[data-cat="${catId}"]`);
    const collapsed = header.classList.toggle('collapsed');
    rows.forEach(r => r.classList.toggle('cat-hidden', collapsed));

    const catName = header.dataset.catname;
    const state = JSON.parse(sessionStorage.getItem('meguree_cat_state') || '{}');
    if (collapsed) { state[catName] = true; } else { delete state[catName]; }
    sessionStorage.setItem('meguree_cat_state', JSON.stringify(state));
  }

  function openAddModal() {
    document.getElementById('editRecordId').value = '';
    document.getElementById('modalTitle').textContent = '商品を追加';
    document.getElementById('formProductName').value = '';
    document.getElementById('formCategory').value = '';
    document.getElementById('formPrice').value = '';
    document.getElementById('formIsFood').checked = false;
    document.getElementById('formImageUrl').value = '';
    document.getElementById('imagePreview').style.display = 'none';
    document.getElementById('imagePreviewImg').src = '';
    document.getElementById('saveSuccess').classList.remove('show');
    document.getElementById('modalOverlay').classList.add('open');
    setTimeout(() => document.getElementById('formProductName').focus(), 100);
  }

  function openEditModal(id) {
    const p = products.find(x => x.id === id);
    if (!p) return;
    document.getElementById('editRecordId').value = id;
    document.getElementById('modalTitle').textContent = '商品を編集';
    document.getElementById('formProductName').value = p.name;
    document.getElementById('formCategory').value = p.category;
    document.getElementById('formPrice').value = p.price;
    document.getElementById('formIsFood').checked = p.isFood;
    const _imgUrl = p.imageUrl || '';
    document.getElementById('formImageUrl').value = _imgUrl;
    const _prev = document.getElementById('imagePreview');
    const _prevImg = document.getElementById('imagePreviewImg');
    if (_imgUrl) { _prevImg.src = _imgUrl; _prev.style.display = 'block'; }
    else { _prev.style.display = 'none'; _prevImg.src = ''; }
    document.getElementById('saveSuccess').classList.remove('show');
    document.getElementById('modalOverlay').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
  }

  async function writeAuditLog(action, recordId, recordLabel, oldValues, newValues) {
    try {
      await sbFetch('/rest/v1/audit_log', {
        method: 'POST',
        headers: { 'Prefer': 'return=minimal' },
        body: JSON.stringify({
          tenant_id: tenantId, user_name: userName || '—',
          action, table_name: 'products',
          record_id: String(recordId || ''), record_label: recordLabel || '',
          old_values: oldValues || null, new_values: newValues || null,
        })
      });
    } catch(e) { console.warn('監査ログ書き込み失敗:', e); }
  }

  async function saveProduct() {
    const name  = document.getElementById('formProductName').value.trim();
    const price = document.getElementById('formPrice').value;
    if (!name)    { alert('商品名は必須です');   document.getElementById('formProductName').focus(); return; }
    if (price==='') { alert('基本単価は必須です'); document.getElementById('formPrice').focus(); return; }

    const editId = document.getElementById('editRecordId').value;
    const btn = document.getElementById('saveBtn');
    btn.disabled = true; btn.textContent = '保存中...';

    const payload = {
      product_name: name,
      category:     document.getElementById('formCategory').value.trim() || null,
      price:        Number(price),
      is_food:      document.getElementById('formIsFood').checked,
      tenant_id:    tenantId,
      image_url:    document.getElementById('formImageUrl').value.trim() || null,
    };

    const oldProduct = editId ? products.find(x => x.id === editId) : null;

    try {
      if (editId) {
        const res = await sbFetch('/rest/v1/products?id=eq.' + editId, { method: 'PATCH', body: JSON.stringify(payload) });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        await writeAuditLog('update', editId, name,
          oldProduct ? { product_name: oldProduct.name, price: oldProduct.price, is_food: oldProduct.isFood, category: oldProduct.category } : null,
          { product_name: name, price: Number(price), is_food: payload.is_food, category: payload.category }
        );
      } else {
        const res = await sbFetch('/rest/v1/products', { method: 'POST', body: JSON.stringify(payload) });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const created = await res.json();
        const newId = Array.isArray(created) ? created[0]?.id : created?.id;
        await writeAuditLog('create', newId || '', name,
          null,
          { product_name: name, price: Number(price), is_food: payload.is_food, category: payload.category }
        );
      }
      document.getElementById('saveSuccess').classList.add('show');
      setTimeout(() => { closeModal(); loadProducts(); }, 800);
    } catch(e) {
      console.error(e);
      alert('保存に失敗しました。もう一度お試しください。');
    } finally {
      btn.disabled = false; btn.textContent = '保存する';
    }
  }

  async function deleteProduct(id) {
    const p = products.find(x => x.id === id);
    if (!p) return;
    if (!confirm(`「${p.name}」を削除しますか？\nこの操作は元に戻せません。`)) return;
    try {
      const res = await sbFetch('/rest/v1/products?id=eq.' + id, { method: 'DELETE', headers: { 'Prefer': 'return=minimal' } });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      await writeAuditLog('delete', id, p.name,
        { product_name: p.name, price: p.price, is_food: p.isFood, category: p.category },
        null
      );
      loadProducts();
    } catch(e) {
      console.error(e);
      alert('削除に失敗しました。受注データに紐づいている商品は削除できない場合があります。');
    }
  }

  document.getElementById('formImageUrl').addEventListener('input', function() {
    const url = this.value.trim();
    const prev = document.getElementById('imagePreview');
    const img = document.getElementById('imagePreviewImg');
    if (url) { img.src = url; prev.style.display = 'block'; }
    else { prev.style.display = 'none'; img.src = ''; }
  });

  loadProducts();
</script>
<script src="mobile.js"></script>
</body>
</html>
