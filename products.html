<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MeguRee - 商品マスタ管理</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f3ee;
    --surface: #ffffff;
    --border: #e2d9ce;
    --orange: #e8630a;
    --orange-light: #f97316;
    --orange-pale: #fff4ec;
    --green: #1e6641;
    --green-light: #2d9a5f;
    --green-pale: #e8f5ee;
    --text: #1a1208;
    --text-muted: #7a6a55;
    --sidebar-bg: #1a1208;
    --sidebar-text: #e8d5bc;
    --sidebar-active: #e8630a;
  }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
  }

  /* ===== SIDEBAR ===== */
  .sidebar {
    width: 240px; min-height: 100vh; background: var(--sidebar-bg);
    display: flex; flex-direction: column;
    position: fixed; top: 0; left: 0; bottom: 0; z-index: 100;
  }
  .sidebar-logo { padding: 20px 24px; border-bottom: 1px solid rgba(255,255,255,0.08); }
  .sidebar-logo img { width: 140px; margin-bottom: 4px; }
  .sidebar-nav { padding: 16px 12px; flex: 1; }
  .nav-label {
    font-size: 10px; color: rgba(232,213,188,0.3); letter-spacing: 2px;
    text-transform: uppercase; padding: 0 12px; margin-bottom: 8px; margin-top: 16px;
  }
  .nav-item {
    display: flex; align-items: center; gap: 10px; padding: 10px 12px;
    border-radius: 10px; cursor: pointer; color: var(--sidebar-text);
    font-size: 13px; font-weight: 500; transition: all 0.2s;
    text-decoration: none; margin-bottom: 2px;
  }
  .nav-item:hover { background: rgba(255,255,255,0.06); }
  .nav-item.active { background: var(--orange); color: white; }
  .nav-item .icon { font-size: 16px; width: 20px; text-align: center; }
  .sidebar-footer { padding: 16px 12px; border-top: 1px solid rgba(255,255,255,0.08); }
  .user-card {
    display: flex; align-items: center; gap: 10px; padding: 10px 12px;
    border-radius: 10px; background: rgba(255,255,255,0.05);
  }
  .user-avatar {
    width: 32px; height: 32px; border-radius: 8px; background: var(--orange);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; color: white; flex-shrink: 0;
  }
  .user-name { font-size: 12px; color: var(--sidebar-text); font-weight: 500; }
  .user-role { font-size: 10px; color: rgba(232,213,188,0.4); }
  .logout-btn {
    margin-top: 8px; width: 100%; padding: 8px; background: none;
    border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
    color: rgba(232,213,188,0.5); font-size: 12px; cursor: pointer;
    transition: all 0.2s; font-family: 'Noto Sans JP', sans-serif;
  }
  .logout-btn:hover { background: rgba(255,255,255,0.05); color: var(--sidebar-text); }

  /* ===== MAIN ===== */
  .main { margin-left: 240px; flex: 1; min-height: 100vh; display: flex; flex-direction: column; }
  .topbar {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 16px 32px; display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 50;
  }
  .page-title { font-size: 18px; font-weight: 700; }
  .page-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .content { padding: 28px 32px; flex: 1; }

  /* ===== TABLE ===== */
  .section-header {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;
  }
  .section-title { font-size: 15px; font-weight: 700; }
  .table-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; overflow: hidden;
  }
  table { width: 100%; border-collapse: collapse; }
  thead tr { background: var(--bg); border-bottom: 1px solid var(--border); }
  th {
    padding: 12px 16px; text-align: left; font-size: 11px; font-weight: 700;
    color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; white-space: nowrap;
  }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--bg); }
  td { padding: 14px 16px; font-size: 13px; vertical-align: middle; }
  .product-name { font-weight: 700; font-size: 13px; }
  .amount {
    font-family: 'Space Grotesk', sans-serif; font-weight: 700; color: var(--orange);
  }

  .spinner {
    display: inline-block; width: 20px; height: 20px;
    border: 2px solid var(--border); border-top-color: var(--orange);
    border-radius: 50%; animation: spin 0.8s linear infinite;
    vertical-align: middle; margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-row td { text-align: center; padding: 48px; color: var(--text-muted); font-size: 14px; }
  .empty-state { text-align: center; padding: 64px 24px; color: var(--text-muted); }
  .empty-state-icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state-text { font-size: 14px; }

  /* ===== BUTTONS ===== */
  .btn { display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:10px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:all 0.2s;font-family:'Noto Sans JP',sans-serif; }
  .btn:hover { opacity:0.85; }
  .btn-primary { background:var(--orange);color:#fff; }
  .btn-outline { background:var(--surface);border:1.5px solid var(--orange);color:var(--orange); }
  .btn-sm { padding:5px 12px;font-size:12px;border-radius:8px; }

  .btn-secondary {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--bg); color: var(--text); padding: 7px 14px;
    border-radius: 8px; font-size: 12px; font-weight: 500;
    border: 1px solid var(--border); cursor: pointer; transition: all 0.2s;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .btn-secondary:hover { border-color: var(--orange); color: var(--orange); }

  .btn-danger {
    display: inline-flex; align-items: center; gap: 6px;
    background: #fef2f2; color: #dc2626; padding: 7px 14px;
    border-radius: 8px; font-size: 12px; font-weight: 500;
    border: 1px solid #fecaca; cursor: pointer; transition: all 0.2s;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .btn-danger:hover { background: #fee2e2; }

  /* ===== MODAL ===== */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200;
    display: none; align-items: center; justify-content: center;
    padding: 24px; backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); border-radius: 20px; width: 100%; max-width: 520px;
    max-height: 80vh; overflow-y: auto; box-shadow: 0 24px 64px rgba(0,0,0,0.2);
    animation: modalIn 0.3s ease;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.95) translateY(10px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  .modal-header {
    padding: 24px 28px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; background: var(--surface); border-radius: 20px 20px 0 0;
  }
  .modal-title { font-size: 16px; font-weight: 700; }
  .modal-close {
    width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border);
    background: none; cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center; transition: background 0.2s;
  }
  .modal-close:hover { background: var(--bg); }
  .modal-body { padding: 24px 28px; }

  .form-group { margin-bottom: 16px; }
  .form-label {
    display: block; font-size: 12px; font-weight: 600;
    color: var(--text-muted); margin-bottom: 6px; letter-spacing: 0.5px;
  }
  .form-input {
    width: 100%; padding: 10px 14px; border: 1px solid var(--border);
    border-radius: 10px; font-size: 13px; font-family: 'Noto Sans JP', sans-serif;
    color: var(--text); background: var(--bg); outline: none; transition: border-color 0.2s;
  }
  .form-input:focus { border-color: var(--orange); background: white; }
  .form-input::placeholder { color: #bbb; }

  .form-actions { display: flex; gap: 12px; align-items: center; margin-top: 20px; }
  .save-success {
    display: none; align-items: center; gap: 6px;
    font-size: 13px; color: var(--green); font-weight: 600;
  }
  .save-success.show { display: flex; }

.sidebar-footer{padding:12px 12px 16px;border-top:1px solid rgba(255,255,255,0.08);margin-top:auto}
.logout-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;color:rgba(232,213,188,0.5);font-size:13px;font-weight:500;transition:all 0.2s;text-decoration:none}
.logout-item:hover{background:rgba(255,69,0,0.15);color:#ff9a7a}
</style>
<link rel="stylesheet" href="mobile.css">
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <img src="https://raw.githubusercontent.com/oshigowata-sys/order-form/main/meguree_final%20(2).svg" alt="MeguRee">
    <div class="sidebar-logo-sub">受注管理システム</div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-label">メニュー</div>
    <a class="nav-item" href="dashboard.html"><span class="icon">🏠</span>ダッシュボード</a>
    <a class="nav-item" href="orders.html"><span class="icon">📋</span>受注一覧</a>
    <a class="nav-item" href="invoice-list.html"><span class="icon">🧾</span>請求書管理</a>
    <div class="nav-label">マスタ管理</div>
    <a class="nav-item" href="customer.html"><span class="icon">🏢</span>取引先マスタ</a>
    <a class="nav-item active" href="products.html"><span class="icon">📦</span>商品マスタ</a>
    <a class="nav-item" href="pricing.html"><span class="icon">💹</span>掛け率管理</a>
    <div class="nav-label">その他</div>
    <a class="nav-item" href="settings.html"><span class="icon">⚙️</span>設定</a>
  </nav>
  <div class="sidebar-footer">
    <a class="logout-item" href="#" onclick="signOut('login.html'); return false;"><span class="icon">🚪</span>ログアウト</a>
  </div>
</aside>

<!-- MAIN -->
<main class="main">
  <div class="topbar">
    <div>
      <div class="page-title">商品マスタ管理</div>
      <div class="page-sub">商品の追加・編集・基本単価の設定を管理します</div>
    </div>
    <div>
      <button class="btn-primary" onclick="openAddModal()">＋ 新規商品</button>
    </div>
  </div>

  <div class="content">
    <div class="section-header">
      <div class="section-title">商品一覧</div>
    </div>
    <div class="table-card">
      <table>
        <thead>
          <tr>
            <th>商品コード</th>
            <th>商品名</th>
            <th>基本単価</th>
            <th>税率</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="productTableBody">
          <tr class="loading-row"><td colspan="4"><span class="spinner"></span>読み込み中...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</main>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">商品を追加</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editRecordId" />
      <div class="form-group">
        <label class="form-label">商品名 *</label>
        <input type="text" class="form-input" id="formProductName" placeholder="例：琉球ガラスコップ" />
      </div>
      <div class="form-group">
        <label class="form-label">カテゴリ</label>
        <input type="text" class="form-input" id="formCategory" placeholder="例：出汁・ジャム・調味料" />
      </div>
      <div class="form-group">
        <label class="form-label">基本単価（円） *</label>
        <input type="number" class="form-input" id="formPrice" min="0" placeholder="例：1200" />
      </div>
      <div class="form-group" style="display:flex;align-items:center;gap:10px">
        <input type="checkbox" id="formIsFood" style="width:18px;height:18px;accent-color:var(--green);cursor:pointer" />
        <label for="formIsFood" class="form-label" style="margin:0;cursor:pointer">食品フラグ（軽減税率8%対象）</label>
      </div>
      <div class="form-actions">
        <button class="btn-primary" id="saveBtn" onclick="saveProduct()">保存する</button>
        <button class="btn-secondary" onclick="closeModal()">キャンセル</button>
        <div class="save-success" id="saveSuccess">✓ 保存しました</div>
      </div>
    </div>
  </div>
</div>

<script src="auth.js"></script>
<script>
  // ===== ページガード =====
  if (!sessionStorage.getItem('user')) { location.replace('login.html'); }
  const SB_URL = 'https://vrnayxmwcbxblfokveok.supabase.co';
  const SB_KEY = 'sb_publishable_NIKtwat_yat2LxbACHVMbA_PT_8F53O';
  const { tenantId } = JSON.parse(sessionStorage.getItem('user') || '{}');

  function sbFetch(path, options = {}) {
    return fetch(SB_URL + path, {
      ...options,
      headers: {
        'apikey': SB_KEY,
        'Authorization': 'Bearer ' + getAccessToken(),
        'Content-Type': 'application/json',
        'Prefer': 'return=representation',
        ...(options.headers || {})
      }
    });
  }

  let products = [];

  function esc(str) {
    if (str === null || str === undefined) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  async function loadProducts() {
    const tbody = document.getElementById('productTableBody');
    tbody.innerHTML = '<tr class="loading-row"><td colspan="5"><span class="spinner"></span>読み込み中...</td></tr>';
    try {
      const res = await sbFetch(`/rest/v1/products?tenant_id=eq.${tenantId}&select=*&order=product_name`);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      products = data.map(r => ({
        id:       r.id,
        code:     r.product_code || '',
        name:     r.product_name || '',
        price:    Number(r.price) || 0,
        isFood:   !!r.is_food,
        category: r.category || '',
      }));
      renderProducts();
    } catch(e) {
      console.error('商品データ取得失敗:', e);
      tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:20px;color:var(--text-muted)">データ取得に失敗しました</td></tr>';
    }
  }

  function renderProducts() {
    const tbody = document.getElementById('productTableBody');
    if (products.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:20px;color:var(--text-muted)">商品が登録されていません</td></tr>';
      return;
    }
    tbody.innerHTML = products.map(p => `<tr>
      <td style="font-family:'Space Grotesk',sans-serif;font-size:12px;color:var(--text-muted)">${esc(p.code)}</td>
      <td style="font-weight:500">${esc(p.name)}</td>
      <td style="font-size:13px;color:var(--text-muted)">${esc(p.category) || '<span style="opacity:0.4">-</span>'}</td>
      <td style="font-family:'Space Grotesk',sans-serif">¥${p.price.toLocaleString()}</td>
      <td>${p.isFood
        ? '<span style="background:var(--green-pale);color:var(--green);border:1px solid rgba(30,102,65,0.3);padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500">軽減8%</span>'
        : '<span style="background:var(--bg);color:var(--text-muted);border:1px solid var(--border);padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500">標準10%</span>'
      }</td>
      <td>
        <button class="btn btn-outline btn-sm" onclick="openEditModal('${esc(p.id)}')">編集</button>
      </td>
    </tr>`).join('');
  }

  function openAddModal() {
    document.getElementById('editRecordId').value = '';
    document.getElementById('modalTitle').textContent = '商品を追加';
    document.getElementById('formProductName').value = '';
    document.getElementById('formCategory').value = '';
    document.getElementById('formPrice').value = '';
    document.getElementById('formIsFood').checked = false;
    document.getElementById('saveSuccess').classList.remove('show');
    document.getElementById('modalOverlay').classList.add('open');
    setTimeout(() => document.getElementById('formProductName').focus(), 100);
  }

  function openEditModal(id) {
    const p = products.find(x => x.id === id);
    if (!p) return;
    document.getElementById('editRecordId').value = id;
    document.getElementById('modalTitle').textContent = '商品を編集';
    document.getElementById('formProductName').value = p.name;
    document.getElementById('formCategory').value = p.category;
    document.getElementById('formPrice').value = p.price;
    document.getElementById('formIsFood').checked = p.isFood;
    document.getElementById('saveSuccess').classList.remove('show');
    document.getElementById('modalOverlay').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
  }

  async function saveProduct() {
    const name  = document.getElementById('formProductName').value.trim();
    const price = document.getElementById('formPrice').value;
    if (!name)    { alert('商品名は必須です');   document.getElementById('formProductName').focus(); return; }
    if (price==='') { alert('基本単価は必須です'); document.getElementById('formPrice').focus(); return; }

    const editId = document.getElementById('editRecordId').value;
    const btn = document.getElementById('saveBtn');
    btn.disabled = true; btn.textContent = '保存中...';

    const payload = {
      product_name: name,
      category:     document.getElementById('formCategory').value.trim() || null,
      price:        Number(price),
      is_food:      document.getElementById('formIsFood').checked,
      tenant_id:    tenantId,
    };

    try {
      if (editId) {
        const res = await sbFetch('/rest/v1/products?id=eq.' + editId, { method: 'PATCH', body: JSON.stringify(payload) });
        if (!res.ok) throw new Error('HTTP ' + res.status);
      } else {
        const res = await sbFetch('/rest/v1/products', { method: 'POST', body: JSON.stringify(payload) });
        if (!res.ok) throw new Error('HTTP ' + res.status);
      }
      document.getElementById('saveSuccess').classList.add('show');
      setTimeout(() => { closeModal(); loadProducts(); }, 800);
    } catch(e) {
      console.error(e);
      alert('保存に失敗しました。もう一度お試しください。');
    } finally {
      btn.disabled = false; btn.textContent = '保存する';
    }
  }

  loadProducts();
</script>
<script src="mobile.js"></script>
</body>
</html>
