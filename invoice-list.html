<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>請求書管理 | MeguRee</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f3ee;--surface:#fff;--border:#e2d9ce;
  --orange:#e8630a;--orange-light:#f97316;--orange-pale:#fff4ec;
  --green:#1e6641;--green-pale:#e8f5ee;
  --text:#1a1208;--text-muted:#7a6a55;
  --sidebar-bg:#1a1208;--sidebar-text:#e8d5bc;
}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex}
.sidebar{width:240px;min-height:100vh;background:var(--sidebar-bg);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100}
.sidebar-logo{padding:20px 24px;border-bottom:1px solid rgba(255,255,255,0.08)}
.sidebar-logo img{width:140px;margin-bottom:4px;display:block}
.sidebar-logo-sub{font-size:10px;color:rgba(232,213,188,0.4);letter-spacing:2px;text-transform:uppercase}
.sidebar-nav{padding:16px 12px;flex:1}
.nav-label{font-size:10px;color:rgba(232,213,188,0.3);letter-spacing:2px;text-transform:uppercase;padding:0 12px;margin-bottom:8px;margin-top:16px}
.nav-label:first-child{margin-top:0}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;color:var(--sidebar-text);font-size:13px;font-weight:500;transition:all 0.2s;text-decoration:none;margin-bottom:2px}
.nav-item:hover{background:rgba(255,255,255,0.06)}
.nav-item.active{background:var(--orange);color:#fff}
.nav-item .icon{font-size:16px;width:20px;text-align:center}
.main{margin-left:240px;flex:1;min-height:100vh;display:flex;flex-direction:column}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 32px;position:sticky;top:0;z-index:50}
.page-title{font-size:18px;font-weight:700}
.page-sub{font-size:12px;color:var(--text-muted);margin-top:2px}
.content{padding:28px 32px;flex:1}
.card{background:var(--surface);border-radius:16px;border:1px solid var(--border);overflow:hidden}
.filter-tabs{display:flex;gap:2px;padding:16px 20px 0;border-bottom:1px solid var(--border)}
.tab{padding:8px 18px;border:none;background:none;cursor:pointer;font-size:13px;color:var(--text-muted);border-bottom:2px solid transparent;margin-bottom:-1px;font-family:'Noto Sans JP',sans-serif;font-weight:500;transition:all 0.15s}
.tab.active{color:var(--orange);border-bottom-color:var(--orange);font-weight:600}
.tab:hover{color:var(--text)}
.table-wrapper{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead tr{background:var(--bg);border-bottom:1px solid var(--border)}
th{padding:10px 16px;text-align:left;font-size:11px;font-weight:700;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase;white-space:nowrap}
tbody tr{background:var(--bg);border-bottom:1px solid var(--border);transition:background 0.15s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--bg)}
td{padding:13px 16px;font-size:13px;vertical-align:middle;white-space:nowrap}
.num-right{text-align:right}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:10px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:all 0.2s;font-family:'Noto Sans JP',sans-serif}
.btn:hover{opacity:0.85}
.btn-primary{background:var(--orange);color:#fff}
.btn-green{background:var(--green);color:#fff}
.btn-sm{padding:5px 12px;font-size:12px;border-radius:8px}
.badge-issued{background:var(--green-pale);color:var(--green);border:1px solid rgba(30,102,65,0.3);display:inline-block;padding:3px 9px;border-radius:4px;font-size:11px;font-weight:500}
.invoice-num{font-family:'Space Grotesk',sans-serif;font-size:12px;color:var(--text-muted)}

.sidebar-footer{padding:12px 12px 16px;border-top:1px solid rgba(255,255,255,0.08);margin-top:auto}
.logout-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;color:rgba(232,213,188,0.5);font-size:13px;font-weight:500;transition:all 0.2s;text-decoration:none}
.logout-item:hover{background:rgba(255,69,0,0.15);color:#ff9a7a}
</style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-logo">
    <img src="https://raw.githubusercontent.com/oshigowata-sys/order-form/main/meguree_final%20(2).svg" alt="MeguRee">
    <div class="sidebar-logo-sub">受注管理システム</div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-label">メニュー</div>
    <a class="nav-item" href="dashboard.html"><span class="icon">🏠</span>ダッシュボード</a>
    <a class="nav-item" href="orders.html"><span class="icon">📋</span>受注一覧</a>
    <a class="nav-item active" href="invoice-list.html"><span class="icon">🧾</span>請求書管理</a>
    <div class="nav-label">マスタ管理</div>
    <a class="nav-item" href="customer.html"><span class="icon">🏢</span>取引先マスタ</a>
    <a class="nav-item" href="products.html"><span class="icon">📦</span>商品マスタ</a>
    <a class="nav-item" href="pricing.html"><span class="icon">💹</span>掛け率管理</a>
    <div class="nav-label">その他</div>
    <a class="nav-item" href="settings.html"><span class="icon">⚙️</span>設定</a>
  </nav>
  <div class="sidebar-footer">
    <a class="logout-item" href="login.html"><span class="icon">🚪</span>ログアウト</a>
  </div>
</aside>
<main class="main">
  <div class="topbar">
    <div class="page-title">請求書管理</div>
    <div class="page-sub">締め請求の発行・管理を行います</div>
  </div>
  <div class="content">
    <div class="card">
      <div class="filter-tabs">
        <button class="tab active" data-tab="pending">未発行</button>
        <button class="tab" data-tab="issued">発行済み</button>
      </div>
      <div id="pendingView">
        <div class="table-wrapper">
          <table>
            <thead><tr>
              <th>取引先名</th><th>締め日</th><th>対象期間</th>
              <th class="num-right">受注件数</th><th class="num-right">税抜合計</th>
              <th class="num-right">消費税</th><th class="num-right">税込合計</th><th></th>
            </tr></thead>
            <tbody id="pendingTbody"></tbody>
          </table>
        </div>
      </div>
      <div id="issuedView" style="display:none">
        <div class="table-wrapper">
          <table>
            <thead><tr>
              <th>請求書番号</th><th>取引先名</th><th>対象期間</th><th>発行日</th>
              <th class="num-right">税抜合計</th><th class="num-right">消費税</th>
              <th class="num-right">税込合計</th><th></th>
            </tr></thead>
            <tbody id="issuedTbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</main>
<script>
  // ===== ページガード =====
  if (!sessionStorage.getItem('user')) { location.replace('login.html'); }
const SB_URL = 'https://vrnayxmwcbxblfokveok.supabase.co';
const SB_KEY = 'sb_publishable_NIKtwat_yat2LxbACHVMbA_PT_8F53O';
const { tenantId } = JSON.parse(sessionStorage.getItem('user') || '{}');

function sbFetch(path, options = {}) {
  return fetch(SB_URL + path, {
    ...options,
    headers: {
      'apikey': SB_KEY,
      'Authorization': 'Bearer ' + SB_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation',
      ...(options.headers || {})
    }
  });
}

/* ── 未発行：受注を取引先ごとに集計 ── */
async function loadPending() {
  document.getElementById('pendingTbody').innerHTML =
    '<tr><td colspan="8" style="text-align:center;padding:20px;color:var(--text-muted)">読み込み中...</td></tr>';
  try {
    /* invoices に含まれていない orders を全取得 */
    const res = await sbFetch(
      `/rest/v1/orders?tenant_id=eq.${tenantId}&select=id,order_date,customers(id,company_name,closing_day),order_items(quantity,unit_price,products(is_food))&order=order_date.asc`
    );
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const orders = await res.json();

    /* 発行済み請求書の customer_id を取得してフィルタ */
    const invRes = await sbFetch(`/rest/v1/invoices?tenant_id=eq.${tenantId}&select=customer_id`);
    const invoiced = new Set((await invRes.json()).map(i => i.customer_id));

    /* 取引先ごとに集計（発行済みは除外） */
    const map = {};
    orders.forEach(o => {
      const cid = o.customers?.id;
      if (!cid || invoiced.has(cid)) return;
      if (!map[cid]) {
        const cd = o.customers.closing_day || 31;
        const today = new Date('2026-04-15');
        const startD = new Date(today.getFullYear(), today.getMonth() - 1, cd + 1);
        const endD   = new Date(today.getFullYear(), today.getMonth(), cd);
        map[cid] = {
          customerId: cid,
          customer:   o.customers.company_name,
          closingDay: cd,
          periodStart: startD.toISOString().slice(0,10),
          periodEnd:   endD.toISOString().slice(0,10),
          orders: 0, excl: 0, tax: 0
        };
      }
      const items = o.order_items || [];
      items.forEach(it => {
        const sub  = (it.quantity || 0) * (it.unit_price || 0);
        const rate = it.products?.is_food ? 0.08 : 0.10;
        map[cid].excl += sub;
        map[cid].tax  += Math.round(sub * rate);
      });
      map[cid].orders++;
    });

    const pending = Object.values(map).filter(r => r.orders > 0);
    if (pending.length === 0) {
      document.getElementById('pendingTbody').innerHTML =
        '<tr><td colspan="8" style="text-align:center;padding:20px;color:var(--text-muted)">未発行の請求書はありません</td></tr>';
      return;
    }
    document.getElementById('pendingTbody').innerHTML = pending.map((r, i) => {
      const incl = r.excl + r.tax;
      const period = `${r.periodStart.replace(/-/g,'/')}〜${r.periodEnd.replace(/-/g,'/')}`;
      return `<tr>
        <td style="font-weight:600">${r.customer}</td>
        <td>${r.closingDay}日締め</td>
        <td style="font-size:12px;color:var(--text-muted)">${period}</td>
        <td class="num-right" style="font-family:'Space Grotesk',sans-serif">${r.orders}件</td>
        <td class="num-right" style="font-family:'Space Grotesk',sans-serif">¥${r.excl.toLocaleString()}</td>
        <td class="num-right" style="font-family:'Space Grotesk',sans-serif;color:var(--text-muted)">¥${r.tax.toLocaleString()}</td>
        <td class="num-right" style="font-weight:700;font-family:'Space Grotesk',sans-serif">¥${incl.toLocaleString()}</td>
        <td><button class="btn btn-primary btn-sm" onclick="issueInvoice(${JSON.stringify(r).replace(/"/g,'&quot;')}, this)">発行</button></td>
      </tr>`;
    }).join('');

    /* データをグローバルに保持（発行ボタン用） */
    window._pending = pending;
    document.getElementById('pendingTbody').querySelectorAll('button').forEach((btn, i) => {
      btn.onclick = () => issueInvoice(pending[i], btn);
    });
  } catch(e) {
    console.error(e);
    document.getElementById('pendingTbody').innerHTML =
      '<tr><td colspan="8" style="text-align:center;padding:20px;color:#dc2626">データ取得に失敗しました</td></tr>';
  }
}

/* ── 発行済み一覧 ── */
async function loadIssued() {
  document.getElementById('issuedTbody').innerHTML =
    '<tr><td colspan="8" style="text-align:center;padding:20px;color:var(--text-muted)">読み込み中...</td></tr>';
  try {
    const res = await sbFetch(
      `/rest/v1/invoices?tenant_id=eq.${tenantId}&select=invoice_number,period_start,period_end,issued_date,total_excl_tax,tax_amount,total_incl_tax,customers(company_name)&order=issued_date.desc`
    );
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const invoices = await res.json();
    if (invoices.length === 0) {
      document.getElementById('issuedTbody').innerHTML =
        '<tr><td colspan="8" style="text-align:center;padding:20px;color:var(--text-muted)">発行済みの請求書はありません</td></tr>';
      return;
    }
    document.getElementById('issuedTbody').innerHTML = invoices.map(r => {
      const period = `${(r.period_start||'').replace(/-/g,'/')}〜${(r.period_end||'').replace(/-/g,'/')}`;
      return `<tr>
        <td><span class="invoice-num">${r.invoice_number || ''}</span></td>
        <td style="font-weight:600">${r.customers?.company_name || ''}</td>
        <td style="font-size:12px;color:var(--text-muted)">${period}</td>
        <td style="font-size:12px;color:var(--text-muted)">${(r.issued_date||'').replace(/-/g,'/')}</td>
        <td class="num-right" style="font-family:'Space Grotesk',sans-serif">¥${(r.total_excl_tax||0).toLocaleString()}</td>
        <td class="num-right" style="font-family:'Space Grotesk',sans-serif;color:var(--text-muted)">¥${(r.tax_amount||0).toLocaleString()}</td>
        <td class="num-right" style="font-weight:700;font-family:'Space Grotesk',sans-serif">¥${(r.total_incl_tax||0).toLocaleString()}</td>
        <td><button class="btn btn-green btn-sm" onclick="window.open('invoice.html?customer_id=' + encodeURIComponent(r.customer_id||'') + '&period_start=' + encodeURIComponent(r.period_start||'') + '&period_end=' + encodeURIComponent(r.period_end||'') + '&invoice_num=' + encodeURIComponent(r.invoice_number||''), '_blank')">PDF</button></td>
      </tr>`;
    }).join('');
  } catch(e) {
    console.error(e);
    document.getElementById('issuedTbody').innerHTML =
      '<tr><td colspan="8" style="text-align:center;padding:20px;color:#dc2626">データ取得に失敗しました</td></tr>';
  }
}

/* ── 請求書発行 ── */
async function issueInvoice(r, btn) {
  if (!confirm(`「${r.customer}」の請求書を発行しますか？\n税込合計：¥${(r.excl+r.tax).toLocaleString()}`)) return;
  btn.disabled = true; btn.textContent = '発行中...';
  try {
    /* 請求書番号を採番 */
    const today = new Date('2026-04-15');
    const ym = `${today.getFullYear()}${String(today.getMonth()+1).padStart(2,'0')}`;
    const cntRes = await sbFetch(`/rest/v1/invoices?select=id&order=created_at.desc&limit=1`);
    const cnt = (await cntRes.json()).length + 1;
    const seq = String(cnt).padStart(3, '0');
    const num = `INV-${ym}-${seq}`;
    const incl = r.excl + r.tax;

    const res = await sbFetch('/rest/v1/invoices', {
      method: 'POST',
      body: JSON.stringify({
        invoice_number:  num,
        customer_id:     r.customerId,
        period_start:    r.periodStart,
        period_end:      r.periodEnd,
        issued_date:     today.toISOString().slice(0,10),
        total_excl_tax:  r.excl,
        tax_amount:      r.tax,
        total_incl_tax:  incl,
        tenant_id:       tenantId,
      })
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    alert(`請求書を発行しました\n請求書番号: ${num}`);
    await Promise.all([loadPending(), loadIssued()]);
  } catch(e) {
    console.error(e);
    alert('発行に失敗しました。もう一度お試しください。');
    btn.disabled = false; btn.textContent = '発行';
  }
}

/* ── タブ切り替え ── */
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById('pendingView').style.display = t.dataset.tab === 'pending' ? '' : 'none';
    document.getElementById('issuedView').style.display  = t.dataset.tab === 'issued'  ? '' : 'none';
  });
});

loadPending();
loadIssued();
</script>
</body>
</html>
