<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f3ee;--surface:#fff;--border:#e2d9ce;
  --orange:#e8630a;--orange-light:#f97316;--orange-pale:#fff4ec;
  --green:#1e6641;--green-pale:#e8f5ee;
  --text:#1a1208;--text-muted:#7a6a55;
  --sidebar-bg:#1a1208;--sidebar-text:#e8d5bc;
}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex}
.sidebar{width:240px;min-height:100vh;background:var(--sidebar-bg);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100}
.sidebar-logo{padding:20px 24px;border-bottom:1px solid rgba(255,255,255,0.08)}
.sidebar-logo img{width:140px;margin-bottom:4px;display:block}
.sidebar-logo-sub{font-size:10px;color:rgba(232,213,188,0.4);letter-spacing:2px;text-transform:uppercase}
.sidebar-nav{padding:16px 12px;flex:1}
.nav-label{font-size:10px;color:rgba(232,213,188,0.3);letter-spacing:2px;text-transform:uppercase;padding:0 12px;margin-bottom:8px;margin-top:16px}
.nav-label:first-child{margin-top:0}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;color:var(--sidebar-text);font-size:13px;font-weight:500;transition:all 0.2s;text-decoration:none;margin-bottom:2px}
.nav-item:hover{background:rgba(255,255,255,0.06)}
.nav-item.active{background:var(--orange);color:#fff}
.nav-item .icon{font-size:16px;width:20px;text-align:center}
.main{margin-left:240px;flex:1;min-height:100vh;display:flex;flex-direction:column}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 32px;position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between}
.page-title{font-size:18px;font-weight:700}
.page-sub{font-size:12px;color:var(--text-muted);margin-top:2px}
.content{padding:28px 32px;flex:1}
.card{background:var(--surface);border-radius:16px;border:1px solid var(--border);overflow:hidden}
.search-input{padding:6px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:12px;font-family:'Noto Sans JP',sans-serif;color:var(--text);background:var(--surface);outline:none;transition:border-color 0.2s;width:220px}
.search-input:focus{border-color:var(--orange);background:#fff}
.table-wrapper{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead tr{background:var(--bg);border-bottom:1px solid var(--border)}
th{padding:10px 16px;text-align:left;font-size:11px;font-weight:700;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase;white-space:nowrap}
tbody tr{background:var(--bg);border-bottom:1px solid var(--border);transition:background 0.15s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#f0ebe3}
td{padding:13px 16px;font-size:13px;vertical-align:middle;white-space:nowrap}
.num-right{text-align:right}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:10px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:all 0.2s;font-family:'Noto Sans JP',sans-serif}
.btn:hover{opacity:0.85}
.btn-primary{background:var(--orange);color:#fff}
.btn-green{background:var(--green);color:#fff}
.btn-outline{background:none;border:1.5px solid var(--border);color:var(--text-muted)}
.btn-sm{padding:5px 12px;font-size:12px;border-radius:8px}
/* status badges */
.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge::before{content:'';width:6px;height:6px;border-radius:50%;flex-shrink:0}
.badge-issued{background:var(--green-pale);color:var(--green);border:1px solid rgba(30,102,65,0.2)}
.badge-issued::before{background:var(--green)}
.badge-pending{background:var(--orange-pale);color:var(--orange);border:1px solid rgba(232,99,10,0.2)}
.badge-pending::before{background:var(--orange)}
.badge-inprogress{background:#f3f4f6;color:#6b7280;border:1px solid rgba(107,114,128,0.2)}
.badge-inprogress::before{background:#9ca3af}
/* filter bar */
.filter-bar{display:flex;align-items:center;gap:8px;padding:14px 20px;border-bottom:1px solid var(--border)}
.filter-btn{padding:5px 14px;border:1.5px solid var(--border);border-radius:20px;background:none;cursor:pointer;font-size:12px;font-weight:600;color:var(--text-muted);font-family:'Noto Sans JP',sans-serif;transition:all 0.15s}
.filter-btn:hover{border-color:var(--orange);color:var(--orange)}
.filter-btn.active{background:var(--orange);color:#fff;border-color:var(--orange)}
/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.kpi-card{background:var(--surface);border-radius:14px;border:1px solid var(--border);padding:18px 20px;position:relative;overflow:hidden}
.kpi-card::after{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:var(--orange)}
.kpi-card.green::after{background:var(--green)}
.kpi-card.yellow::after{background:#d97706}
.kpi-card.blue::after{background:#3b82f6}
.kpi-label{font-size:11px;color:var(--text-muted);font-weight:600;margin-bottom:6px;letter-spacing:0.5px;text-transform:uppercase}
.kpi-value{font-family:'Space Grotesk',sans-serif;font-size:24px;font-weight:700;color:var(--text);line-height:1.2}
.kpi-value.warn{color:var(--orange)}
.kpi-value.green{color:var(--green)}
.kpi-sub{font-size:12px;color:var(--text-muted);margin-top:3px}
/* topbar user */
.topbar-user{display:flex;align-items:center;gap:10px}
.topbar-user-name{font-size:13px;font-weight:600;color:var(--text)}
.topbar-user-role{font-size:11px;color:var(--text-muted)}
.topbar-avatar{width:34px;height:34px;border-radius:10px;background:var(--orange);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}
.sidebar-footer{padding:12px 12px 16px;border-top:1px solid rgba(255,255,255,0.08);margin-top:auto}
.logout-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;color:rgba(232,213,188,0.5);font-size:13px;font-weight:500;transition:all 0.2s;text-decoration:none}
.logout-item:hover{background:rgba(255,69,0,0.15);color:#ff9a7a}
/* modal */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;align-items:flex-start;justify-content:center;padding-top:80px;backdrop-filter:blur(4px)}
.overlay.open{display:flex}
.modal{background:var(--surface);border-radius:20px;width:480px;max-width:95vw;overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,0.18)}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:20px 24px;border-bottom:1px solid var(--border)}
.modal-title{font-size:16px;font-weight:700}
.modal-close{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:none;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:var(--bg)}
.modal-body{padding:20px 24px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;background:var(--bg)}
.form-label{font-size:11px;font-weight:700;color:var(--text-muted);letter-spacing:0.5px;text-transform:uppercase;display:block;margin-bottom:5px}
.form-input{padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:'Noto Sans JP',sans-serif;color:var(--text);background:var(--bg);outline:none;width:100%}
.form-input:focus{border-color:var(--orange);background:#fff}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
/* toast */
.toast{position:fixed;bottom:28px;right:28px;background:#1a1208;color:#fff;padding:13px 20px;border-radius:12px;font-size:13px;font-weight:500;z-index:9999;box-shadow:0 8px 32px rgba(0,0,0,0.25);opacity:0;transform:translateY(8px);transition:opacity 0.25s,transform 0.25s;pointer-events:none;font-family:'Noto Sans JP',sans-serif}
.toast.show{opacity:1;transform:translateY(0)}
/* in-progress row muted */
tr.row-inprogress td{color:var(--text-muted)}
</style>

<script>
checkAuth();

const SB_URL = 'https://vrnayxmwcbxblfokveok.supabase.co';
const SB_KEY = 'sb_publishable_NIKtwat_yat2LxbACHVMbA_PT_8F53O';
const userData = JSON.parse(sessionStorage.getItem('user') || '{}');
const { tenantId, name: userName, role: userRole } = userData;

(() => {
  const nameEl = document.getElementById('topbarUserName');
  const roleEl = document.getElementById('topbarUserRole');
  const avatarEl = document.getElementById('topbarAvatar');
  if (userName) {
    nameEl.textContent = userName;
    roleEl.textContent = userRole === 'admin' ? '管理者' : 'スタッフ';
    avatarEl.textContent = userName.charAt(0);
  }
})();

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function sbFetch(path, options = {}) {
  return fetch(SB_URL + path, {
    ...options,
    headers: {
      'apikey': SB_KEY,
      'Authorization': 'Bearer ' + getAccessToken(),
      'Content-Type': 'application/json',
      'Prefer': 'return=representation',
      ...(options.headers || {})
    }
  });
}

// ── toast ──
let _toastTimer = null;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  if (_toastTimer) clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 3500);
}

// ── 統合データ ──
let _allRows = [];
let _renderedRows = [];
let currentFilter = 'all';
let currentSearch = '';

function onSearchInput(val) {
  currentSearch = val.trim();
  renderAll();
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderAll();
  });
});

// ── 締め日から完了済み期間・進行中期間を算出 ──
function calcBillingPeriods(closingDay, today = new Date()) {
  const cd = closingDay || 31;
  const todayStr   = today.toISOString().slice(0, 10);
  const todayDay   = today.getDate();
  const todayMonth = today.getMonth();
  const todayYear  = today.getFullYear();

  let endYear, endMonth;
  if (todayDay <= cd) {
    endMonth = todayMonth - 1;
    endYear  = todayYear;
    if (endMonth < 0) { endMonth = 11; endYear = todayYear - 1; }
  } else {
    endMonth = todayMonth;
    endYear  = todayYear;
  }
  const daysInEnd = new Date(endYear, endMonth + 1, 0).getDate();
  const endDay    = Math.min(cd, daysInEnd);
  const endD      = new Date(endYear, endMonth, endDay);

  let prevMonth = endMonth - 1, prevYear = endYear;
  if (prevMonth < 0) { prevMonth = 11; prevYear = endYear - 1; }
  const daysInPrev   = new Date(prevYear, prevMonth + 1, 0).getDate();
  const prevCloseDay = Math.min(cd, daysInPrev);
  const startD = new Date(prevYear, prevMonth, prevCloseDay + 1);

  const inProgressStart = new Date(endD);
  inProgressStart.setDate(inProgressStart.getDate() + 1);

  return [
    { periodStart: startD.toISOString().slice(0,10), periodEnd: endD.toISOString().slice(0,10), isInProgress: false },
    { periodStart: inProgressStart.toISOString().slice(0,10), periodEnd: todayStr, isInProgress: true },
  ];
}

// ── 全データ読み込み ──
async function loadAll() {
  document.getElementById('unifiedTbody').innerHTML =
    '<tr><td colspan="7" style="text-align:center;padding:24px;color:var(--text-muted)">読み込み中...</td></tr>';
  try {
    const today = new Date();
    const [ordersRes, invoicesRes] = await Promise.all([
      sbFetch(`/rest/v1/orders?tenant_id=eq.${tenantId}&select=id,order_date,customers(id,company_name,closing_day),order_items(quantity,unit_price,products(is_food))&order=order_date.asc`),
      sbFetch(`/rest/v1/invoices?tenant_id=eq.${tenantId}&select=invoice_number,customer_id,period_start,period_end,issued_date,total_excl_tax,tax_amount,total_incl_tax,customers(company_name)&order=issued_date.desc`)
    ]);
    if (!ordersRes.ok || !invoicesRes.ok) throw new Error('データ取得失敗');
    const [orders, invoices] = await Promise.all([ordersRes.json(), invoicesRes.json()]);

    // 発行済みセット（customer_id:period_end）
    const invoicedSet = new Set(invoices.map(i => `${i.customer_id}:${i.period_end}`));

    // 発行済み行
    const issuedRows = invoices.map(inv => ({
      status: 'issued',
      customer: inv.customers?.company_name || '',
      customerId: inv.customer_id || '',
      periodStart: inv.period_start || '',
      periodEnd: inv.period_end || '',
      orders: 0,
      excl: inv.total_excl_tax || 0,
      tax: inv.tax_amount || 0,
      invoiceNumber: inv.invoice_number || '',
      issuedDate: (inv.issued_date || '').slice(0,10),
    }));

    // 未発行・進行中行の集計
    const map = {};
    orders.forEach(o => {
      const cid = o.customers?.id;
      if (!cid) return;
      const cd = o.customers.closing_day || 31;
      calcBillingPeriods(cd, today).forEach(({ periodStart, periodEnd, isInProgress }) => {
        if (o.order_date < periodStart || o.order_date > periodEnd) return;
        if (invoicedSet.has(`${cid}:${periodEnd}`)) return;
        const key = `${cid}:${periodEnd}`;
        if (!map[key]) {
          map[key] = {
            status: isInProgress ? 'in_progress' : 'pending',
            customer: o.customers.company_name,
            customerId: cid,
            closingDay: cd,
            periodStart, periodEnd,
            orders: 0, excl: 0, tax: 0,
            invoiceNumber: null, issuedDate: null,
          };
        }
        (o.order_items || []).forEach(it => {
          const sub  = (it.quantity || 0) * (it.unit_price || 0);
          const rate = it.products?.is_food ? 0.08 : 0.10;
          map[key].excl += sub;
          map[key].tax  += Math.round(sub * rate);
        });
        map[key].orders++;
      });
    });

    const pendingRows    = Object.values(map).filter(r => r.status === 'pending' && r.orders > 0);
    const inProgressRows = Object.values(map).filter(r => r.status === 'in_progress');

    // 並び順：未発行→発行済み→進行中
    _allRows = [...pendingRows, ...issuedRows, ...inProgressRows];

    updateKPIs(pendingRows, issuedRows);
    renderAll();
  } catch(e) {
    console.error(e);
    document.getElementById('unifiedTbody').innerHTML =
      '<tr><td colspan="7" style="text-align:center;padding:24px;color:#dc2626">データ取得に失敗しました</td></tr>';
  }
}

function updateKPIs(pendingRows, issuedRows) {
  document.getElementById('kpiPending').textContent = pendingRows.length;
  document.getElementById('kpiIssued').textContent  = issuedRows.length;
  document.getElementById('kpiPendingAmount').textContent = '¥' + pendingRows.reduce((s,r) => s + r.excl + r.tax, 0).toLocaleString();
  document.getElementById('kpiIssuedAmount').textContent  = '¥' + issuedRows.reduce((s,r) => s + r.excl + r.tax, 0).toLocaleString();
}

function renderAll() {
  const tbody = document.getElementById('unifiedTbody');
  let rows = _allRows;
  if (currentFilter === 'pending') rows = rows.filter(r => r.status === 'pending');
  else if (currentFilter === 'issued') rows = rows.filter(r => r.status === 'issued');
  const q = currentSearch.toLowerCase();
  if (q) rows = rows.filter(r => r.customer.toLowerCase().includes(q));

  _renderedRows = rows;

  if (!rows.length) {
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:24px;color:var(--text-muted)">該当する請求書はありません</td></tr>';
    return;
  }

  tbody.innerHTML = rows.map((r, idx) => {
    const period = `${r.periodStart.replace(/-/g,'/')}〜${r.periodEnd.replace(/-/g,'/')}`;
    const total  = r.excl + r.tax;

    let badge, action, ordersCell, issuedDateCell;

    if (r.status === 'pending') {
      badge          = '<span class="badge badge-pending">未発行</span>';
      action         = `<button class="btn btn-primary btn-sm issue-btn" data-idx="${idx}">発行</button>`;
      ordersCell     = `${r.orders}件`;
      issuedDateCell = '—';
    } else if (r.status === 'issued') {
      badge          = '<span class="badge badge-issued">発行済み</span>';
      action         = `<button class="btn btn-green btn-sm" onclick="openPdf(${idx})">PDF</button>`;
      ordersCell     = '—';
      issuedDateCell = r.issuedDate ? r.issuedDate.replace(/-/g,'/') : '—';
    } else {
      badge          = '<span class="badge badge-inprogress">進行中</span>';
      action         = '';
      ordersCell     = r.orders > 0 ? `${r.orders}件` : '—';
      issuedDateCell = '—';
    }

    const rowClass = r.status === 'in_progress' ? ' class="row-inprogress"' : '';
    return `<tr${rowClass}>
      <td style="font-weight:600">${esc(r.customer)}</td>
      <td style="font-size:12px;color:var(--text-muted)">${period}</td>
      <td class="num-right" style="font-family:'Space Grotesk',sans-serif">${ordersCell}</td>
      <td class="num-right" style="font-weight:700;font-family:'Space Grotesk',sans-serif">¥${total.toLocaleString()}</td>
      <td style="font-size:12px;color:var(--text-muted)">${issuedDateCell}</td>
      <td>${badge}</td>
      <td>${action}</td>
    </tr>`;
  }).join('');

  tbody.querySelectorAll('.issue-btn').forEach(btn => {
    btn.onclick = () => openIssueModal(_renderedRows[parseInt(btn.dataset.idx)]);
  });
}

function openPdf(idx) {
  const r = _renderedRows[idx];
  if (!r) return;
  const url = 'invoice.html'
    + '?customer_id='   + encodeURIComponent(r.customerId)
    + '&period_start='  + encodeURIComponent(r.periodStart)
    + '&period_end='    + encodeURIComponent(r.periodEnd)
    + '&invoice_num='   + encodeURIComponent(r.invoiceNumber || '');
  window.open(url, '_blank');
}

// ── 発行モーダル ──
let _issueTarget = null;

function openIssueModal(r) {
  _issueTarget = r;
  document.getElementById('issueCustomerName').textContent = r.customer;
  document.getElementById('issuePeriodStart').value = r.periodStart;
  document.getElementById('issuePeriodEnd').value   = r.periodEnd;
  updateIssuePreview();
  document.getElementById('issueModalOverlay').classList.add('open');
}

function closeIssueModal() {
  document.getElementById('issueModalOverlay').classList.remove('open');
  _issueTarget = null;
}

function updateIssuePreview() {
  if (!_issueTarget) return;
  const s    = document.getElementById('issuePeriodStart').value;
  const e    = document.getElementById('issuePeriodEnd').value;
  const incl = _issueTarget.excl + _issueTarget.tax;
  document.getElementById('issuePreview').innerHTML =
    `対象期間：${s.replace(/-/g,'/')}〜${e.replace(/-/g,'/')}　受注${_issueTarget.orders}件　税込合計：<strong>¥${incl.toLocaleString()}</strong>`;
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('issuePeriodStart').addEventListener('input', updateIssuePreview);
  document.getElementById('issuePeriodEnd').addEventListener('input', updateIssuePreview);
});

async function confirmIssue() {
  if (!_issueTarget) return;
  const r          = _issueTarget;
  const periodStart = document.getElementById('issuePeriodStart').value;
  const periodEnd   = document.getElementById('issuePeriodEnd').value;
  if (!periodStart || !periodEnd || periodStart > periodEnd) {
    showToast('⚠️ 期間の開始日・終了日を正しく入力してください');
    return;
  }
  const btn = document.getElementById('issueConfirmBtn');
  btn.disabled = true; btn.textContent = '発行中...';
  try {
    const today = new Date();
    const ym    = `${today.getFullYear()}${String(today.getMonth()+1).padStart(2,'0')}`;
    const cntRes = await sbFetch(`/rest/v1/invoices?tenant_id=eq.${tenantId}&invoice_number=like.INV-${ym}-%25&select=id`);
    const cnt    = (await cntRes.json()).length + 1;
    const num    = `INV-${ym}-${String(cnt).padStart(3,'0')}`;
    const incl   = r.excl + r.tax;

    const res = await sbFetch('/rest/v1/invoices', {
      method: 'POST',
      body: JSON.stringify({
        invoice_number: num,
        customer_id:    r.customerId,
        period_start:   periodStart,
        period_end:     periodEnd,
        issued_date:    today.toISOString().slice(0,10),
        total_excl_tax: r.excl,
        tax_amount:     r.tax,
        total_incl_tax: incl,
        tenant_id:      tenantId,
      })
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    closeIssueModal();
    showToast(`✅ 請求書を発行しました（${num}）`);
    await loadAll();
  } catch(e) {
    console.error(e);
    showToast('❌ 発行に失敗しました。もう一度お試しください。');
  } finally {
    btn.disabled = false; btn.textContent = '発行する';
  }
}

loadAll();
</script>
<script src="mobile.js"></script>
</body>
