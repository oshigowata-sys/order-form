<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f3ee;--surface:#fff;--border:#e2d9ce;
  --orange:#e8630a;--orange-light:#f97316;--orange-pale:#fff4ec;
  --green:#1e6641;--green-pale:#e8f5ee;
  --text:#1a1208;--text-muted:#7a6a55;
  --sidebar-bg:#1a1208;--sidebar-text:#e8d5bc;
}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex}
.sidebar{width:240px;min-height:100vh;background:var(--sidebar-bg);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100}
.sidebar-logo{padding:20px 24px;border-bottom:1px solid rgba(255,255,255,0.08)}
.sidebar-logo img{width:140px;margin-bottom:4px;display:block}
.sidebar-logo-sub{font-size:10px;color:rgba(232,213,188,0.4);letter-spacing:2px;text-transform:uppercase}
.sidebar-nav{padding:16px 12px;flex:1}
.nav-label{font-size:10px;color:rgba(232,213,188,0.3);letter-spacing:2px;text-transform:uppercase;padding:0 12px;margin-bottom:8px;margin-top:16px}
.nav-label:first-child{margin-top:0}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;color:var(--sidebar-text);font-size:13px;font-weight:500;transition:all 0.2s;text-decoration:none;margin-bottom:2px}
.nav-item:hover{background:rgba(255,255,255,0.06)}
.nav-item.active{background:var(--orange);color:#fff}
.nav-item .icon{font-size:16px;width:20px;text-align:center}
.main{margin-left:240px;flex:1;min-height:100vh;display:flex;flex-direction:column}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 32px;position:sticky;top:0;z-index:50}
.page-title{font-size:18px;font-weight:700}
.page-sub{font-size:12px;color:var(--text-muted);margin-top:2px}
.content{padding:28px 32px;flex:1}
.card{background:var(--surface);border-radius:16px;border:1px solid var(--border);overflow:hidden}
.filter-tabs{display:flex;gap:2px;padding:16px 20px 0;border-bottom:1px solid var(--border);align-items:center}
.search-input{padding:6px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:12px;font-family:'Noto Sans JP',sans-serif;color:var(--text);background:var(--surface);outline:none;transition:border-color 0.2s;width:220px}
.search-input:focus{border-color:var(--orange);background:#fff}
.tab{padding:8px 18px;border:none;background:none;cursor:pointer;font-size:13px;color:var(--text-muted);border-bottom:2px solid transparent;margin-bottom:-1px;font-family:'Noto Sans JP',sans-serif;font-weight:500;transition:all 0.15s}
.tab.active{color:var(--orange);border-bottom-color:var(--orange);font-weight:600}
.tab:hover{color:var(--text)}
.table-wrapper{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead tr{background:var(--bg);border-bottom:1px solid var(--border)}
th{padding:10px 16px;text-align:left;font-size:11px;font-weight:700;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase;white-space:nowrap}
tbody tr{background:var(--bg);border-bottom:1px solid var(--border);transition:background 0.15s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--bg)}
td{padding:13px 16px;font-size:13px;vertical-align:middle;white-space:nowrap}
.num-right{text-align:right}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:10px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:all 0.2s;font-family:'Noto Sans JP',sans-serif}
.btn:hover{opacity:0.85}
.btn-primary{background:var(--orange);color:#fff}
.btn-green{background:var(--green);color:#fff}
.btn-sm{padding:5px 12px;font-size:12px;border-radius:8px}
.badge-issued{background:var(--green-pale);color:var(--green);border:1px solid rgba(30,102,65,0.2);display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-issued::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}
.invoice-num{font-family:'Space Grotesk',sans-serif;font-size:12px;color:var(--orange);font-weight:600;cursor:pointer;text-decoration:underline;text-underline-offset:2px;background:none;border:none;padding:0}
.topbar{display:flex;align-items:center;justify-content:space-between}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.kpi-card{background:var(--surface);border-radius:14px;border:1px solid var(--border);padding:18px 20px;position:relative;overflow:hidden}
.kpi-card::after{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:var(--orange)}
.kpi-card.green::after{background:var(--green)}
.kpi-card.yellow::after{background:#d97706}
.kpi-card.blue::after{background:#3b82f6}
.kpi-label{font-size:11px;color:var(--text-muted);font-weight:600;margin-bottom:6px;letter-spacing:0.5px;text-transform:uppercase}
.kpi-value{font-family:'Space Grotesk',sans-serif;font-size:24px;font-weight:700;color:var(--text);line-height:1.2}
.kpi-value.warn{color:var(--orange)}
.kpi-value.green{color:var(--green)}
.kpi-sub{font-size:12px;color:var(--text-muted);margin-top:3px}
.topbar-user{display:flex;align-items:center;gap:10px}
.topbar-user-name{font-size:13px;font-weight:600;color:var(--text)}
.topbar-user-role{font-size:11px;color:var(--text-muted)}
.topbar-avatar{width:34px;height:34px;border-radius:10px;background:var(--orange);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}

.sidebar-footer{padding:12px 12px 16px;border-top:1px solid rgba(255,255,255,0.08);margin-top:auto}
.badge-progress{background:var(--yellow-pale);color:var(--yellow);border:1px solid rgba(217,119,6,0.2);display:inline-flex;align-items:center;gap:5px;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600;margin-left:6px}
.badge-progress::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--yellow);flex-shrink:0}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;align-items:flex-start;justify-content:center;padding-top:80px;backdrop-filter:blur(4px)}
.overlay.open{display:flex}
.modal{background:var(--surface);border-radius:20px;width:480px;max-width:95vw;overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,0.18)}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:20px 24px;border-bottom:1px solid var(--border)}
.modal-title{font-size:16px;font-weight:700}
.modal-close{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:none;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center}

.modal-body{padding:20px 24px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;background:var(--bg)}

.form-input{padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:'Noto Sans JP',sans-serif;color:var(--text);background:var(--bg);outline:none;width:100%}

/* ── 締め日から「完了済み期間」と「進行中期間」の両方を算出 ── */
function calcBillingPeriods(closingDay, today = new Date()) {
  const cd = closingDay || 31;
  const todayStr   = today.toISOString().slice(0, 10);
  const todayDay   = today.getDate();
  const todayMonth = today.getMonth();
  const todayYear  = today.getFullYear();

  // 完了済み期間の終了日を計算
  let endYear, endMonth;
  if (todayDay <= cd) {
    endMonth = todayMonth - 1;
    endYear  = todayYear;
    if (endMonth < 0) { endMonth = 11; endYear = todayYear - 1; }
  } else {
    endMonth = todayMonth;
    endYear  = todayYear;
  }
  const daysInEnd = new Date(endYear, endMonth + 1, 0).getDate();
  const endDay    = Math.min(cd, daysInEnd);
  const endD      = new Date(endYear, endMonth, endDay);

  // 完了済み期間の開始日を計算（前々締め日の翌日）
  let prevMonth = endMonth - 1, prevYear = endYear;
  if (prevMonth < 0) { prevMonth = 11; prevYear = endYear - 1; }
  const daysInPrev   = new Date(prevYear, prevMonth + 1, 0).getDate();
  const prevCloseDay = Math.min(cd, daysInPrev);
  const startD = new Date(prevYear, prevMonth, prevCloseDay + 1);

  const completed = {
    periodStart:  startD.toISOString().slice(0, 10),
    periodEnd:    endD.toISOString().slice(0, 10),
    isInProgress: false,
  };

  // 進行中期間：完了済み期間終了の翌日〜今日
  const inProgressStart = new Date(endD);
  inProgressStart.setDate(inProgressStart.getDate() + 1);
  const inProgress = {
    periodStart:  inProgressStart.toISOString().slice(0, 10),
    periodEnd:    todayStr,
    isInProgress: true,
  };

  return [completed, inProgress];
}

/* ── 未発行：受注を取引先ごとに集計 ── */
async function loadPending() {
  document.getElementById('pendingTbody').innerHTML =
    '<tr><td colspan="8" style="text-align:center;padding:20px;color:var(--text-muted)">読み込み中...</td></tr>';

    const today = new Date();

    /* 全受注を取得 */
    const res = await sbFetch(

    );
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const orders = await res.json();

    /* 発行済み請求書を period_end 単位で管理
       key: "customer_id:period_end" で既発行かどうかチェック */
    const invRes = await sbFetch(`/rest/v1/invoices?tenant_id=eq.${tenantId}&select=customer_id,period_end`);
    const invoiced = new Set((await invRes.json()).map(i => `${i.customer_id}:${i.period_end}`));

    /* 取引先ごと・期間ごとに集計
       key: "customer_id:periodEnd" で一意管理
       完了済み期間と進行中期間の両方を対象にする */
    const map = {};
    orders.forEach(o => {
      const cid = o.customers?.id;
      if (!cid) return;

      const cd = o.customers.closing_day || 31;
      const periods = calcBillingPeriods(cd, today);

      periods.forEach(({ periodStart, periodEnd, isInProgress }) => {
        // 受注日がこの期間外なら無視
        if (o.order_date < periodStart || o.order_date > periodEnd) return;

        // 同期間がすでに発行済みなら無視
        if (invoiced.has(`${cid}:${periodEnd}`)) return;

        const key = `${cid}:${periodEnd}`;
        if (!map[key]) {
          map[key] = {
            customerId:   cid,
            customer:     o.customers.company_name,
            closingDay:   cd,
            periodStart,
            periodEnd,
            isInProgress,
            orders: 0, excl: 0, tax: 0
          };
        }
        const items = o.order_items || [];
        items.forEach(it => {
          const sub  = (it.quantity || 0) * (it.unit_price || 0);
          const rate = it.products?.is_food ? 0.08 : 0.10;
          map[key].excl += sub;
          map[key].tax  += Math.round(sub * rate);
        });
        map[key].orders++;
      });
    });

    _pendingRows = Object.values(map).filter(r => r.orders > 0);
    updateKPIs();
    renderPending();
  } catch(e) {
    console.error(e);
    document.getElementById('pendingTbody').innerHTML =
      '<tr><td colspan="8" style="text-align:center;padding:20px;color:#dc2626">データ取得に失敗しました</td></tr>';
  }
}

/* ── 発行済み一覧 ── */
async function loadIssued() {
  document.getElementById('issuedTbody').innerHTML =
    '<tr><td colspan="8" style="text-align:center;padding:20px;color:var(--text-muted)">読み込み中...</td></tr>';
  try {
    const res = await sbFetch(
      `/rest/v1/invoices?tenant_id=eq.${tenantId}&select=invoice_number,period_start,period_end,issued_date,total_excl_tax,tax_amount,total_incl_tax,customers(company_name)&order=issued_date.desc`
    );
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const invoices = await res.json();
    _issuedRows = invoices;
    updateKPIs();
    renderIssued();
  } catch(e) {
    console.error(e);
    document.getElementById('issuedTbody').innerHTML =
      '<tr><td colspan="8" style="text-align:center;padding:20px;color:#dc2626">データ取得に失敗しました</td></tr>';
  }
}

/* ── 発行確認モーダル ── */
let _issueTarget = null;

function openIssueModal(r) {
  _issueTarget = r;
  document.getElementById('issueCustomerName').textContent = r.customer;
  document.getElementById('issuePeriodStart').value = r.periodStart;
  document.getElementById('issuePeriodEnd').value   = r.periodEnd;
  updateIssuePreview();
  document.getElementById('issueModalOverlay').classList.add('open');
}

function closeIssueModal() {
  document.getElementById('issueModalOverlay').classList.remove('open');
  _issueTarget = null;
}

function updateIssuePreview() {
  if (!_issueTarget) return;
  const s = document.getElementById('issuePeriodStart').value;
  const e = document.getElementById('issuePeriodEnd').value;
  const incl = _issueTarget.excl + _issueTarget.tax;
  document.getElementById('issuePreview').innerHTML =
    `対象期間：${s.replace(/-/g,'/')}〜${e.replace(/-/g,'/')}　受注${_issueTarget.orders}件　税込合計：<strong>¥${incl.toLocaleString()}</strong>`;
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('issuePeriodStart').addEventListener('input', updateIssuePreview);
  document.getElementById('issuePeriodEnd').addEventListener('input', updateIssuePreview);
});

async function confirmIssue() {
  if (!_issueTarget) return;
  const r = _issueTarget;
  const periodStart = document.getElementById('issuePeriodStart').value;
  const periodEnd   = document.getElementById('issuePeriodEnd').value;
  if (!periodStart || !periodEnd || periodStart > periodEnd) {
    alert('期間の開始日・終了日を正しく入力してください');
    return;
  }
  const btn = document.getElementById('issueConfirmBtn');
  btn.disabled = true; btn.textContent = '発行中...';
  try {
    const today = new Date();
    const ym = `${today.getFullYear()}${String(today.getMonth()+1).padStart(2,'0')}`;
    const cntRes = await sbFetch(`/rest/v1/invoices?tenant_id=eq.${tenantId}&invoice_number=like.INV-${ym}-%25&select=id`);
    const cnt = (await cntRes.json()).length + 1;
    const num = `INV-${ym}-${String(cnt).padStart(3,'0')}`;
    const incl = r.excl + r.tax;

    const res = await sbFetch('/rest/v1/invoices', {
      method: 'POST',
      body: JSON.stringify({
        invoice_number: num,
        customer_id:    r.customerId,
        period_start:   periodStart,
        period_end:     periodEnd,
        issued_date:    today.toISOString().slice(0,10),
        total_excl_tax: r.excl,
        tax_amount:     r.tax,
        total_incl_tax: incl,
        tenant_id:      tenantId,
      })
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    closeIssueModal();
    alert(`請求書を発行しました\n請求書番号: ${num}`);
    await Promise.all([loadPending(), loadIssued()]);
  } catch(e) {
    console.error(e);
    alert('発行に失敗しました。もう一度お試しください。');
  } finally {
    btn.disabled = false; btn.textContent = '発行する';
  }
}

/* ── タブ切り替え ── */
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById('pendingView').style.display = t.dataset.tab === 'pending' ? '' : 'none';
    document.getElementById('issuedView').style.display  = t.dataset.tab === 'issued'  ? '' : 'none';
    currentSearch = '';
    document.getElementById('searchInput').value = '';
    renderPending();
    renderIssued();
  });
});

loadPending();
loadIssued();
</script>
<script src="mobile.js"></script>
